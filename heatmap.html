<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cases Heatmap – 2026 Year to Date</title>
<style>
/* Base */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #eef0f4; color: #1a1d23; min-height: 100vh; }

/* Header */
.page-header {
  background: #2B3032; padding: 0 20px; height: 52px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-logo-img {
  height: 30px; width: auto; flex-shrink: 0;
  background: #fff; border-radius: 5px; padding: 2px 8px;
}
.brand-sub { font-size: 10.5px; color: #8A9898; }
.header-right { display: flex; align-items: center; gap: 8px; }
#darkToggle {
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12);
  color: #C8A060; border-radius: 6px; padding: 0 12px; height: 28px;
  cursor: pointer; font-size: 12px; font-weight: 500; font-family: inherit;
  transition: all .15s; white-space: nowrap;
}
#darkToggle:hover { background: rgba(255,255,255,.16); color: #fff; }

/* Filter bar */
.filter-bar {
  background: #fff; border-bottom: 1px solid #dce1e9;
  padding: 8px 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
  position: sticky; top: 52px; z-index: 90;
}
.filter-row {
  display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; overflow-x: auto;
}
.filter-row > * { flex-shrink: 0; }
.filter-spacer { flex: 1 1 8px; min-width: 8px; }
.filter-label {
  font-size: 9.5px; font-weight: 700; color: #8a9ab0;
  text-transform: uppercase; letter-spacing: .6px; white-space: nowrap;
}
.filter-divider {
  width: 1px; height: 22px; background: #dce1e9; flex-shrink: 0;
}

/* Controls — consistent 30px height */
.btn-group { display: flex; border-radius: 6px; overflow: hidden; border: 1px solid #d0d5dd; }
.btn-group button {
  padding: 0 12px; height: 30px; border: none; background: #fff;
  cursor: pointer; font-size: 12px; color: #4a5568; font-family: inherit;
  transition: background .12s, color .12s; white-space: nowrap;
}
.btn-group button:not(:last-child) { border-right: 1px solid #d0d5dd; }
.btn-group button.active { background: #E06820; color: #fff; font-weight: 600; }
.btn-group button:hover:not(.active) { background: #fff8f4; }

select {
  height: 30px; padding: 0 8px;
  border: 1px solid #d0d5dd; border-radius: 6px;
  background: #fff; color: #2d3748; cursor: pointer;
  font-size: 12px; font-family: inherit;
}
select:hover { border-color: #E06820; }

.compare-toggle {
  height: 30px; padding: 0 12px;
  border: 1px solid #d0d5dd; border-radius: 6px;
  background: #fff; color: #4a5568; cursor: pointer;
  font-size: 12px; font-family: inherit; transition: all .12s; white-space: nowrap;
}
.compare-toggle:hover { border-color: #E06820; background: #fff8f4; }
.compare-toggle.active { background: #E06820; color: #fff; border-color: #C05010; font-weight: 600; }

.upload-label {
  display: flex; align-items: center; gap: 5px; height: 30px; padding: 0 11px;
  border-radius: 6px; border: 1px dashed #b8c8d8; background: #f8fafc;
  cursor: pointer; font-size: 11.5px; font-family: inherit;
  color: #6b7a8d; transition: all .12s; white-space: nowrap; user-select: none;
}
.upload-label:hover { border-color: #E06820; background: #fff8f4; color: #C05010; border-style: solid; }
.upload-label.success { border-style: solid; border-color: #27ae60; background: #f0fdf4; color: #1a7a40; }
.upload-label.error   { border-style: solid; border-color: #e74c3c; background: #fff5f5; color: #c0392b; }
.upload-label.loading { border-style: solid; border-color: #3498db; background: #eff8ff; color: #2471a3; animation: upPulse 1s ease-in-out infinite; }
@keyframes upPulse { 0%,100%{opacity:1} 50%{opacity:.55} }
.upload-label input[type=file] { display: none; }

/* Stats bar */
.stats-bar {
  display: flex; background: #fff;
  border-bottom: 1px solid #dce1e9;
  padding: 0 20px; overflow-x: auto;
}
.stat-item {
  padding: 7px 20px 7px 0; margin-right: 20px;
  border-right: 1px solid #e8ecf0;
  display: flex; flex-direction: column; gap: 2px; flex-shrink: 0;
}
.stat-item:last-child { border-right: none; }
.stat-label {
  font-size: 9px; font-weight: 700; color: #8a9ab0;
  text-transform: uppercase; letter-spacing: .6px;
}
.stat-value { font-size: 13px; font-weight: 700; color: #2B3032; white-space: nowrap; }

/* Content area */
.content-area { padding: 14px 20px 20px; }

/* Scroll */
.scroll-wrap {
  overflow: auto; max-height: calc(100vh - 196px);
  border-radius: 8px;
  box-shadow: 0 1px 6px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.06);
}

/* Table */
table {
  border-collapse: collapse; font-size: 11px;
  white-space: nowrap; background: #fff;
  width: 100%; table-layout: fixed;
}
th, td { border: 1px solid #e0e5ec; text-align: center; padding: 0; }
thead th { background: #2B3032; color: #A0AAAA; font-weight: 600; padding: 5px 4px; }
thead th.group-header { font-size: 11.5px; letter-spacing: .4px; color: #C8D0D0; }

td.day-cell {
  background: #2C3335; color: #D8E4E4; font-weight: 600;
  padding: 4px 8px; text-align: left; min-width: 78px; font-size: 11px;
}
td.date-cell {
  background: #2C3335; color: #8A9898; min-width: 58px;
  padding: 4px 6px; font-size: 10.5px;
}
td.heat {
  width: 32px; min-width: 32px; height: 26px;
  font-size: 10px; font-weight: 600; cursor: default; transition: opacity .12s;
}
td.heat:hover { outline: 2px solid #E06820; z-index: 1; position: relative; background: #E06820 !important; color: #fff !important; }
td.heat.empty { background: #f4f6f9; }
tr.weekend td.day-cell, tr.weekend td.date-cell { background: #3A2218; color: #F8C898; }
tr.summary-row td { background: #f4f6f8; font-weight: 700; font-size: 10px; color: #2d3748; }
tr.summary-row td.day-cell, tr.summary-row td.date-cell { background: #2B3032; color: #C8D4D4; }

/* Legend */
.legend {
  display: flex; align-items: center; gap: 6px;
  margin: 10px 0 0; font-size: 11px; color: #6b7a8d;
}
.legend-bar { display: flex; gap: 2px; }
.legend-swatch { width: 22px; height: 12px; border-radius: 2px; }

/* Tooltip */
#tooltip {
  position: fixed; background: #1a1d23; color: #e0e8f0;
  padding: 6px 10px; border-radius: 6px; font-size: 11px;
  pointer-events: none; display: none; z-index: 999;
  box-shadow: 0 2px 10px rgba(0,0,0,.35);
  max-width: 320px; white-space: normal;
  font-family: 'Segoe UI', system-ui, sans-serif;
}

/* Modal */
#modal {
  display: none; position: fixed; inset: 0;
  background: rgba(10,15,25,.65); z-index: 1000;
  align-items: center; justify-content: center;
  backdrop-filter: blur(3px);
}
#modalBox {
  background: #fff; border-radius: 10px; padding: 20px;
  max-width: 520px; width: 92%; max-height: 80vh; overflow-y: auto;
  box-shadow: 0 8px 40px rgba(0,0,0,.28);
}
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  font-weight: 700; margin-bottom: 14px; font-size: 13px;
  padding-bottom: 10px; border-bottom: 2px solid #E06820; color: #2B3032;
}
.modal-header button { background: none; border: none; cursor: pointer; font-size: 18px; color: #8a9ab0; line-height: 1; }
.modal-header button:hover { color: #2d3748; }
.modal-group-header { font-weight: 700; color: #E06820; margin: 14px 0 6px; font-size: 12px; letter-spacing: .3px; border-bottom: 1px solid #F8DEC8; padding-bottom: 4px; }
.modal-analyst { padding: 4px 6px; font-size: 12px; color: #2d3748; border-bottom: 1px solid #f4f6f8; }
.modal-analyst:last-child { border-bottom: none; }
.modal-empty { color: #b0bec8; font-style: italic; font-size: 12px; padding: 4px 6px; }

td.heat.clickable { cursor: pointer; }
td.heat.clickable:hover { outline: 2px solid #e74c3c; }

/* Resolution ratio */
td.heat.ratio-red  { background: #e74c3c; color: #fff; font-weight: 700; }
td.heat.ratio-good { background: #eaf7ee; color: #1a7a40; }
table.ratio-mode td.heat { min-width: 62px; width: 62px; font-size: 9px; }

/* Freeze panes */
td.day-cell  { position: sticky; left: 0;     z-index: 2; }
td.date-cell { position: sticky; left: 90px;  z-index: 2; }
thead tr:first-child th { position: sticky; top: 0;     z-index: 3; }
#hourHeader th           { position: sticky; top: 29px; z-index: 3; }
thead tr:first-child th:first-child { left: 0; z-index: 5; }
#hourHeader th:nth-child(1) { left: 0;    z-index: 5; }
#hourHeader th:nth-child(2) { left: 90px; z-index: 5; }

/* Compare */
.delta-badge { font-size: 7.5px; font-weight: 700; display: block; line-height: 1.1; }
td.delta-pos .delta-badge { color: #1a7a40; }
td.delta-neg .delta-badge { color: #c0392b; }
td.delta-same .delta-badge { color: #b0bec5; }
body.compare-active td.heat { height: 34px; }

/* Peak cell */
td.heat.peak-cell { outline: 2px solid #f39c12 !important; position: relative; z-index: 1; }
td.heat.peak-cell::before {
  content: '★'; position: absolute; top: 0; right: 1px;
  font-size: 7px; color: #f39c12; line-height: 1; pointer-events: none;
}

/* No-data rows */
tr.no-data-row td.day-cell, tr.no-data-row td.date-cell { opacity: 0.35; }

/* Group breakdown */
tr.grp-breakdown-hdr td { background: #f4f6f8; color: #8a9ab0; font-size: 10px; font-style: italic; text-align: center; padding: 3px; border-top: 2px solid #dce1e9; }
tr.grp-filter-row { cursor: pointer; }
tr.grp-filter-row:hover td { background: #f0f4f8 !important; }
td.grp-filter-name { background: #2C3335 !important; color: #D8E4E4 !important; font-weight: 700; font-size: 10px; text-align: left; padding: 3px 8px; }
tr.grp-filter-row:hover td.grp-filter-name { background: #324558 !important; }
td.grp-filter-bar { background: #f8fafc; color: #2d3748; font-size: 10px; font-weight: 600; text-align: left; padding: 3px 8px; }

/* Multi-select */
.multi-select { position: relative; }
.ms-trigger {
  display: flex; align-items: center; justify-content: space-between; gap: 6px;
  height: 30px; padding: 0 10px; min-width: 160px;
  border: 1px solid #d0d5dd; border-radius: 6px;
  background: #fff; color: #2d3748; cursor: pointer;
  font-size: 12px; font-family: inherit; user-select: none; white-space: nowrap;
}
.ms-trigger:hover { border-color: #E06820; }
.ms-arrow { font-size: 9px; color: #8a9ab0; transition: transform .15s; }
.multi-select.open .ms-arrow { transform: rotate(180deg); }
.ms-dropdown {
  display: none; position: fixed;
  min-width: 210px; background: #fff; border: 1px solid #d0d5dd; border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,.12); z-index: 9000; padding: 4px 0;
}
.multi-select.open .ms-dropdown { display: block; }
.ms-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px; cursor: pointer; font-size: 12px; color: #2d3748; transition: background .1s;
}
.ms-item:hover { background: #f4f6f8; }
.ms-item input[type=checkbox] { cursor: pointer; accent-color: #E06820; width: 13px; height: 13px; flex-shrink: 0; }
.ms-item.all-item { border-bottom: 1px solid #e4e8ed; font-weight: 600; margin-bottom: 2px; }

/* ── DARK MODE ── */
body.dark { background: #1A1D1E; color: #E0E8E8; }
body.dark .page-header { background: #141718; box-shadow: 0 2px 10px rgba(0,0,0,.5); }
body.dark .brand-sub { color: #8A9898; }
body.dark #darkToggle { background: rgba(255,255,255,.07); border-color: rgba(255,255,255,.12); color: #FBA832; }
body.dark #darkToggle:hover { background: rgba(255,255,255,.14); color: #F47629; }
body.dark .filter-bar { background: #1E2224; border-bottom-color: #2C3032; box-shadow: none; }
body.dark .filter-divider { background: #2C3032; }
body.dark .filter-label { color: #8A9898; }
body.dark .btn-group { border-color: #3A4042; }
body.dark .btn-group button { background: #1E2224; color: #A0AAAA; border-right-color: #3A4042; }
body.dark .btn-group button.active { background: #E06820; color: #fff; font-weight: 700; }
body.dark .btn-group button:hover:not(.active) { background: #2C3032; color: #E0E8E8; }
body.dark select { background: #1E2224; color: #A0AAAA; border-color: #3A4042; }
body.dark .compare-toggle { background: #1E2224; color: #A0AAAA; border-color: #3A4042; }
body.dark .compare-toggle:hover { background: #2C3032; border-color: #E06820; color: #E0E8E8; }
body.dark .compare-toggle.active { background: #E06820; border-color: #C05010; color: #fff; }
body.dark .upload-label { background: #1E2224; border-color: #3A4042; color: #8A9898; }
body.dark .upload-label:hover { background: #2C3032; border-color: #E06820; color: #E0E8E8; }
body.dark .upload-label.success { background: #122018; border-color: #1a7a40; color: #22c55e; }
body.dark .upload-label.error { background: #201212; border-color: #8a1a1a; color: #f87171; }
body.dark .stats-bar { background: #1E2224; border-bottom-color: #2C3032; }
body.dark .stat-item { border-right-color: #2C3032; }
body.dark .stat-label { color: #8A9898; }
body.dark .stat-value { color: #F47629; }
body.dark table { background: #1A1D1E; }
body.dark th, body.dark td { border-color: #2C3032; }
body.dark thead th { background: #141718; color: #8A9898; }
body.dark thead th.group-header { color: #A0AAAA; }
body.dark td.day-cell { background: #1E2224; color: #D8E4E4; font-weight: 700; }
body.dark td.date-cell { background: #1E2224; color: #8A9898; }
body.dark td.heat.empty { background: #1A1D1E; }
body.dark tr.weekend td.day-cell, body.dark tr.weekend td.date-cell { background: #2A1E14; color: #F8C898; }
body.dark tr.summary-row td { background: #1E2224; color: #A0AAAA; font-weight: 700; }
body.dark tr.summary-row td.day-cell, body.dark tr.summary-row td.date-cell { background: #141718; color: #D8E4E4; }
body.dark tr.no-data-row td.day-cell, body.dark tr.no-data-row td.date-cell { opacity: 0.2; }
body.dark .legend { color: #8A9898; }
body.dark #modal { background: rgba(0,0,0,.8); }
body.dark #modalBox { background: #1E2224; color: #E0E8E8; border: 1px solid #3A4042; }
body.dark .modal-header { color: #F47629; border-bottom-color: #3A2010; }
body.dark .modal-header button { color: #8A9898; }
body.dark .modal-header button:hover { color: #F47629; }
body.dark .modal-group-header { color: #F47629; border-bottom-color: #3A2010; }
body.dark .modal-analyst { color: #C8D0D0; border-bottom-color: #2C3032; }
body.dark .modal-empty { color: #8A9898; }
body.dark tr.grp-breakdown-hdr td { background: #141718; color: #8A9898; border-top-color: #2C3032; }
body.dark tr.grp-filter-row:hover td { background: #2C3032 !important; }
body.dark td.grp-filter-name { background: #141718 !important; color: #D8E4E4 !important; }
body.dark tr.grp-filter-row:hover td.grp-filter-name { background: #1E2224 !important; }
body.dark td.grp-filter-bar { background: #1A1D1E; color: #8A9898; }
body.dark td.heat:hover { outline-color: #E06820; background: #6A2808 !important; color: #FFD4A8 !important; }
body.dark .ms-trigger { background: #1E2224; border-color: #3A4042; color: #A0AAAA; }
body.dark .ms-trigger:hover { border-color: #E06820; }
body.dark .ms-dropdown { background: #1E2224; border-color: #3A4042; box-shadow: 0 4px 16px rgba(0,0,0,.5); }
body.dark .ms-item { color: #A0AAAA; }
body.dark .ms-item:hover { background: #2C3032; }
body.dark .ms-item.all-item { border-bottom-color: #2C3032; }
body.dark td.delta-pos .delta-badge { color: #22c55e; }
body.dark td.delta-neg .delta-badge { color: #f87171; }
body.dark td.delta-same .delta-badge { color: #8A9898; }
body.dark td.heat.ratio-good { background: #122018; color: #22c55e; }

/* ─── Insights Tab ──────────────────────────────────────────────────────── */
#insightsView { padding: 16px 20px; }
.ins-kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 14px; }
.ins-kpi { background: #fff; border: 1px solid #dce1e9; border-radius: 10px; padding: 12px 14px; }
.ins-kpi-val { font-size: 20px; font-weight: 700; color: #E06820; line-height: 1.1; }
.ins-kpi-lbl { font-size: 10px; color: #6b7a8d; margin-top: 3px; text-transform: uppercase; letter-spacing: .4px; }
.ins-charts { display: grid; grid-template-columns: 1fr; gap: 14px; margin-bottom: 14px; }
.ins-chart-full { grid-column: 1 / -1; }
.ins-chart-card { background: #fff; border: 1px solid #dce1e9; border-radius: 10px; padding: 14px 16px; }
.ins-chart-title { font-size: 10.5px; font-weight: 700; color: #2B3032; margin-bottom: 10px; letter-spacing: .3px; }
.ins-legend { display: flex; gap: 14px; margin-top: 6px; font-size: 10px; color: #6b7a8d; }
.ins-legend span { display: flex; align-items: center; gap: 4px; }
.ins-swatch { width: 10px; height: 8px; border-radius: 2px; display: inline-block; }
.ins-bullets { background: #fff; border: 1px solid #dce1e9; border-radius: 10px; padding: 14px 16px; }
.ins-bullets-title { font-size: 10.5px; font-weight: 700; color: #2B3032; margin-bottom: 10px; letter-spacing: .3px; text-transform: uppercase; }
.ins-bullet { display: flex; align-items: flex-start; gap: 10px; padding: 7px 0; border-bottom: 1px solid #f4f6f8; font-size: 12px; color: #2d3748; line-height: 1.45; }
.ins-bullet:last-child { border-bottom: none; }
.ins-bullet-icon { font-size: 14px; flex-shrink: 0; line-height: 1.3; }
body.dark .ins-kpi, body.dark .ins-chart-card, body.dark .ins-bullets { background: #1E2224; border-color: #2C3032; }
body.dark .ins-kpi-val { color: #F47629; }
body.dark .ins-kpi-lbl { color: #8A9898; }
body.dark .ins-chart-title, body.dark .ins-bullets-title { color: #E0E8E8; }
body.dark .ins-bullet { color: #C8D0D0; border-bottom-color: #2C3032; }
body.dark .ins-legend { color: #8A9898; }
#ins-tooltip { position:fixed; z-index:9999; pointer-events:none; display:none; background:rgba(30,34,36,.97); color:#E0E8E8; border:1px solid #3A4042; border-radius:8px; padding:9px 13px; font-size:12px; box-shadow:0 6px 20px rgba(0,0,0,.4); line-height:1.65; max-width:270px; }
#ins-tooltip strong { color:#F47629; }
.ins-detail-panel { background:#fff; border:1px solid #dce1e9; border-radius:10px; padding:16px 18px; margin-top:14px; }
.ins-detail-title { font-size:13px; font-weight:700; color:#2B3032; margin-bottom:12px; padding-bottom:8px; border-bottom:2px solid #E06820; }
.ins-detail-subtitle { font-size:9.5px; font-weight:700; color:#6b7a8d; text-transform:uppercase; letter-spacing:.5px; margin:12px 0 7px; }
.ins-detail-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:8px; margin-bottom:4px; }
.ins-detail-kpi { background:#f4f7fb; border-radius:8px; padding:9px 11px; }
.ins-detail-kpi-val { font-size:16px; font-weight:700; color:#E06820; }
.ins-detail-kpi-lbl { font-size:9px; color:#6b7a8d; margin-top:2px; text-transform:uppercase; letter-spacing:.3px; }
.ins-detail-rows { display:flex; flex-direction:column; gap:3px; }
.ins-detail-row { display:flex; justify-content:space-between; align-items:center; gap:8px; padding:6px 10px; background:#f4f7fb; border-radius:5px; font-size:11.5px; color:#2B3032; }
.ins-detail-row:nth-child(even) { background:#eef1f6; }
.ins-detail-close { float:right; cursor:pointer; font-size:14px; color:#9aabb8; line-height:1; }
.ins-detail-close:hover { color:#E06820; }
body.dark .ins-detail-panel { background:#1E2224; border-color:#2C3032; }
body.dark .ins-detail-title { color:#E0E8E8; }
body.dark .ins-detail-subtitle { color:#8A9898; }
body.dark .ins-detail-kpi { background:#272B2C; }
body.dark .ins-detail-kpi-val { color:#F47629; }
body.dark .ins-detail-kpi-lbl { color:#8A9898; }
body.dark .ins-detail-row { background:#272B2C; color:#C8D0D0; }
body.dark .ins-detail-row:nth-child(even) { background:#222628; }

/* ─── Recommendations Tab ───────────────────────────────────────────────── */
#recsView { padding:16px 20px; }
.rec-impact-bar { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-bottom:14px; }
.rec-impact-kpi { background:#fff; border:1px solid #dce1e9; border-radius:10px; padding:12px 14px; }
.rec-impact-val { font-size:20px; font-weight:700; color:#E06820; line-height:1.1; }
.rec-impact-lbl { font-size:10px; color:#6b7a8d; margin-top:3px; text-transform:uppercase; letter-spacing:.4px; }
.rec-charts { display:grid; grid-template-columns:1fr; gap:14px; margin-bottom:14px; }
.rec-sections { display:flex; flex-direction:column; gap:12px; margin-bottom:14px; }
.rec-section { background:#fff; border:1px solid #dce1e9; border-radius:10px; padding:14px 16px; }
.rec-section-title { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.3px; color:#2B3032; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid #e8ecf0; }
.rec-card { border-radius:8px; padding:11px 14px; margin-bottom:8px; border-left:4px solid transparent; }
.rec-card:last-child { margin-bottom:0; }
.rec-card-header { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
.rec-icon { font-size:14px; flex-shrink:0; }
.rec-card-title { font-size:12px; font-weight:700; color:#2B3032; }
.rec-card-body { font-size:11.5px; color:#4a5568; line-height:1.55; }
.rec-card.rec-critical { background:#fff5f5; border-left-color:#e74c3c; }
.rec-card.rec-high { background:#fffbf0; border-left-color:#FBA832; }
.rec-card.rec-optimize { background:#f0fdf4; border-left-color:#27ae60; }
body.dark #recsView .rec-impact-kpi,
body.dark #recsView .rec-section { background:#1E2224; border-color:#2C3032; }
body.dark .rec-impact-val { color:#F47629; }
body.dark .rec-impact-lbl { color:#8A9898; }
body.dark .rec-section-title { color:#E0E8E8; border-bottom-color:#2C3032; }
body.dark .rec-card-title { color:#E0E8E8; }
body.dark .rec-card-body { color:#A0AAAA; }
body.dark .rec-card.rec-critical { background:#2A1010; border-left-color:#e74c3c; }
body.dark .rec-card.rec-high { background:#2A1E08; border-left-color:#FBA832; }
body.dark .rec-card.rec-optimize { background:#0A1E12; border-left-color:#27ae60; }

/* Peak summary card */
.ins-peak-card { background:linear-gradient(135deg,#2B3032,#363c3f); border-radius:10px; padding:14px 20px; margin-bottom:14px; display:flex; gap:28px; flex-wrap:wrap; align-items:center; }
.ins-peak-item { display:flex; flex-direction:column; gap:3px; }
.ins-peak-label { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:#6A7878; }
.ins-peak-value { font-size:13px; font-weight:700; color:#F47629; }
.ins-peak-sub { font-size:10px; color:#A0AAAA; margin-top:1px; }
.ins-peak-sep { width:1px; height:36px; background:#3A4042; flex-shrink:0; align-self:center; }
body.dark .ins-peak-card { background:linear-gradient(135deg,#141718,#1E2224); }

/* Anomaly section */
.ins-anomaly-section { background:#fff8f4; border:1px solid #f0b090; border-radius:10px; padding:14px 16px; }
.ins-anomaly-title { font-size:10.5px; font-weight:700; color:#C05010; margin-bottom:8px; text-transform:uppercase; letter-spacing:.3px; }
.ins-anomaly-row { display:flex; justify-content:space-between; align-items:center; padding:5px 10px; border-radius:5px; font-size:11.5px; color:#2d3748; background:rgba(231,76,60,.07); margin-bottom:3px; }
.ins-anomaly-row:last-child { margin-bottom:0; }
.ins-anomaly-val { font-weight:700; color:#c0392b; }
body.dark .ins-anomaly-section { background:#2A1610; border-color:#5A2A10; }
body.dark .ins-anomaly-title { color:#F47629; }
body.dark .ins-anomaly-row { color:#C8D0D0; background:rgba(231,76,60,.12); }
body.dark .ins-anomaly-val { color:#f87171; }

/* Cell-detail panel (heatmap click) */
#cell-detail { background:#fff; border:1px solid #dce1e9; border-radius:10px; padding:14px 18px; }

.cdkpi { background:#f4f7fb; border-radius:8px; padding:9px 11px; }
.cdkpi-val { font-size:16px; font-weight:700; color:#E06820; }

.cd-title { font-size:12px; font-weight:700; color:#2B3032; padding-bottom:8px; border-bottom:2px solid #E06820; display:flex; justify-content:space-between; }
.cd-close { cursor:pointer; color:#9aabb8; font-size:14px; }
.cd-close:hover { color:#E06820; }
body.dark #cell-detail { background:#1E2224; border-color:#2C3032; }
body.dark .cd-title { color:#E0E8E8; }
body.dark .cdkpi { background:#272B2C; }
body.dark .cdkpi-val { color:#F47629; }
body.dark .cdkpi-lbl { color:#8A9898; }

const DAY_NAMES = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
function buildDates(month) {
  const MONTH_DAYS = [0,31,28,31,30,31,30];
  const SHORT_MONTHS = ['','Jan','Feb','Mar','Apr','May','Jun'];
  const months = month === 'all' ? [1,2,3,4,5,6] : [parseInt(month)];
  const result = [];
  for (const m of months) {
    for (let d = 1; d <= MONTH_DAYS[m]; d++) {
      const date = new Date(2026, m-1, d);
      const dow = (date.getDay() + 6) % 7;
      result.push({
        day: DAY_NAMES[dow],
        label: `${d}-${SHORT_MONTHS[m]}`,
        key: `2026-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`,
        isWeekend: dow >= 5
      });
    }
  }
  return result;
}

function getColor(count, max) {
  if (!count || !max) return null;
  const idx = Math.min(Math.floor((count / max) * PALETTE.length), PALETTE.length - 1);
  return PALETTE[idx];
}
function getTextColor(count, max) {

}

function isAllGroups() {
  return selectedGroups[0] === 'All' || selectedGroups.length === GROUPS.length;
}

function mergeGroupData(src) {
  if (isAllGroups()) return src['All'] || {};
  const merged = {};
  for (const grp of selectedGroups) {
    for (const [dk, hours] of Object.entries(src[grp] || {})) {
      if (!merged[dk]) merged[dk] = {};
      for (const [hk, v] of Object.entries(hours)) {
        merged[dk][hk] = (merged[dk][hk] || 0) + v;
      }
    }
  }
  return merged;
}

function setGroup(g) {
  if (g === 'All') {
    selectedGroups = ['All'];
    document.getElementById('cbAll').checked = true;
    document.querySelectorAll('.cb-grp').forEach(c => { c.checked = false; });
  } else {

    document.querySelectorAll('.cb-grp').forEach(c => { c.checked = c.value === g; });

}

const TIMEZONES = [
  { label: 'ET (UTC−4)',   abbr: 'ET',  offsetMins: 0    },
  { label: 'GMT (UTC+0)',  abbr: 'GMT', offsetMins: 240  },
  { label: 'IST (UTC+5:30)', abbr: 'IST', offsetMins: 570 },
  { label: 'CT (UTC−5)',   abbr: 'CT',  offsetMins: -60  },
  { label: 'MT (UTC−6)',   abbr: 'MT',  offsetMins: -120 },
  { label: 'PT (UTC−7)',   abbr: 'PT',  offsetMins: -180 },
];
let currentTZIdx = 0;
let compareMode  = false;

function tzHourLabel(h) {
  const totalMins = (h - 1) * 60 + TIMEZONES[currentTZIdx].offsetMins;
  const norm = ((totalMins % 1440) + 1440) % 1440;
  const dispH = Math.floor(norm / 60);
  const dispM = norm % 60;
  return dispM === 0 ? String(dispH) : `${dispH}:${String(dispM).padStart(2,'0')}`;
}

function tzDisp(h) {
  const lbl = tzHourLabel(h);
  return `${lbl.includes(':') ? lbl : lbl + ':00'} ${TIMEZONES[currentTZIdx].abbr}`;
}

function toPriorDateKey(dk) {
  const [y, m, d] = dk.split('-').map(Number);
  if (currentMonth === 'all') return `${y - 1}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const pm = m === 1 ? 12 : m - 1;
  const py = m === 1 ? y - 1 : y;
  return `${py}-${String(pm).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function setTimezone(val) {
  currentTZIdx = parseInt(val);
  rebuildHourHeader();
  document.getElementById('hourTzLabel').textContent = `Hour (${TIMEZONES[currentTZIdx].abbr})`;
  render();
}

    const el = e.target.closest('[data-ins]');

    tipEl.innerHTML = INS_STATE.tips[el.dataset.ins];
    tipEl.style.display = 'block';
  });
  view.addEventListener('mousemove', e => {
    if (tipEl.style.display === 'none') return;
    const tw = tipEl.offsetWidth + 28, th = tipEl.offsetHeight + 12;
    let lx = e.clientX + 16, ly = e.clientY - 12;
    if (lx + tw > window.innerWidth)  lx = e.clientX - tw + 12;
    if (ly + th > window.innerHeight) ly = e.clientY - th - 4;
    if (ly < 4) ly = 4;
    tipEl.style.left = lx + 'px'; tipEl.style.top = ly + 'px';
  });
  view.addEventListener('mouseout', e => {
    if (!e.relatedTarget || !e.relatedTarget.closest('[data-ins]')) tipEl.style.display = 'none';
  });
  view.addEventListener('click', e => {
    const el = e.target.closest('[data-ins]');
    if (!el || !INS_STATE.metas[el.dataset.ins]) return;
    tipEl.style.display = 'none';
    if (INS_STATE.showDetail) INS_STATE.showDetail(INS_STATE.metas[el.dataset.ins]);
    const det = document.getElementById('ins-detail');
    if (det && det.innerHTML) setTimeout(() => det.scrollIntoView({behavior:'smooth', block:'nearest'}), 60);
  });
}

// ── Insights ──────────────────────────────────────────────────────────────
function renderInsights() {
  const view = document.getElementById('insightsView');
  const gOpened   = mergeGroupData(DATA['opened']);
  const gResolved = mergeGroupData(DATA['resolved']);
  const gAvail    = mergeGroupData(AVAIL);
  const isDark    = document.body.classList.contains('dark');
  const gridC  = isDark ? '#2C3032' : '#eef0f4';
  const tickC  = isDark ? '#8A9898' : '#9aabb8';
  const labelC = isDark ? '#8A9898' : '#6b7a8d';

  // ── Current period ───────────────────────────────────────────────────────
  const byHour = {}, byHourRes = {}, byHourAv = {};
  const byDow = {}, byDowDays = {};
  const byMonth = {};
  const byDay = [];
  let totalOpen = 0, totalRes = 0, activeDays = 0;
  for (let h = 1; h <= 24; h++) { byHour[h] = 0; byHourRes[h] = 0; byHourAv[h] = 0; }
  for (let d = 0; d < 7; d++) { byDow[d] = 0; byDowDays[d] = 0; }

  DATES.forEach(({ key, day }) => {
    const dO = gOpened[key] || {}, dR = gResolved[key] || {}, dA = gAvail[key] || {};
    let dayOpen = 0, dayAvail = 0, dayRes = 0;
    for (let h = 1; h <= 24; h++) {
      const o = dO[String(h)] || 0, r = dR[String(h)] || 0, a = dA[h] || 0;
      byHour[h] += o; byHourRes[h] += r; byHourAv[h] += a;
      dayOpen += o; totalOpen += o; totalRes += r; dayAvail += a; dayRes += r;
    }
    if (dayOpen > 0 || dayAvail > 0) { activeDays++; byDay.push({ v: dayOpen, key, label: key.slice(8)+'/'+key.slice(5,7), tip: '<strong>'+key+'</strong><br>Opened: '+dayOpen.toLocaleString()+' | Resolved: '+dayRes.toLocaleString()+'<br>Rate: '+(dayOpen>0?(dayRes/dayOpen*100).toFixed(0):0)+'% | Staff slots: '+dayAvail, meta: {type:'day',key,cases:dayOpen,res:dayRes,avail:dayAvail} }); }
    const dow = DAY_NAMES.indexOf(day);
    if (dow >= 0) { byDow[dow] += dayOpen; byDowDays[dow]++; }
    byMonth[key.slice(5,7)] = (byMonth[key.slice(5,7)] || 0) + dayOpen;
  });

  // ── Prior period (compare mode) ──────────────────────────────────────────
  const prByHour = {}, prByHourAv = {}, prByDow = {}, prByDowDays = {};
  let prTotalOpen = 0, prTotalRes = 0, prActiveDays = 0;
  for (let h = 1; h <= 24; h++) { prByHour[h] = 0; prByHourAv[h] = 0; }
  for (let d = 0; d < 7; d++) { prByDow[d] = 0; prByDowDays[d] = 0; }
  if (compareMode) {
    DATES.forEach(({ key, day }) => {
      const pk = toPriorDateKey(key);
      const dO = gOpened[pk] || {}, dR = gResolved[pk] || {}, dA = gAvail[pk] || {};
      let dayOpen = 0;
      for (let h = 1; h <= 24; h++) {
        const o = dO[String(h)] || 0, r = dR[String(h)] || 0, a = dA[h] || 0;
        prByHour[h] += o; prByHourAv[h] += a;
        dayOpen += o; prTotalOpen += o; prTotalRes += r;
      }
      if (dayOpen > 0) prActiveDays++;
      const dow = DAY_NAMES.indexOf(day);
      if (dow >= 0) { prByDow[dow] += dayOpen; prByDowDays[dow]++; }
    });
  }

  // ── Derived stats ────────────────────────────────────────────────────────
  const avgPerDay   = activeDays > 0 ? totalOpen / activeDays : 0;
  const resRate     = totalOpen > 0 ? totalRes / totalOpen * 100 : 0;
  const prAvgPerDay = prActiveDays > 0 ? prTotalOpen / prActiveDays : 0;
  const prResRate   = prTotalOpen > 0 ? prTotalRes / prTotalOpen * 100 : 0;

  let peakH = 1, peakHVal = 0;
  for (let h = 1; h <= 24; h++) { if (byHour[h] > peakHVal) { peakHVal = byHour[h]; peakH = h; } }

  const dowAvg = {};
  for (let d = 0; d < 7; d++) dowAvg[d] = byDowDays[d] > 0 ? byDow[d] / byDowDays[d] : 0;
  const peakDowEntry = Object.entries(dowAvg).sort((a, b) => b[1] - a[1])[0];
  const peakDowName  = DAY_NAMES[parseInt(peakDowEntry[0])];

  const orByHour = {};
  for (let h = 1; h <= 24; h++) orByHour[h] = byHourAv[h] > 0 ? byHour[h] / byHourAv[h] : 0;
  const activeORHours = Object.values(orByHour).filter(v => v > 0);
  const avgOR = activeORHours.length > 0 ? activeORHours.reduce((a,b) => a+b, 0) / activeORHours.length : 0;
  let understaffedHours = 0;
  for (let h = 1; h <= 24; h++) { if (byHourAv[h] > 0 && orByHour[h] > 1) understaffedHours++; }

  const afterHoursOpen = [1,2,3,4,5,6,7,8,19,20,21,22,23,24].reduce((s,h) => s + byHour[h], 0);
  const afterHoursPct  = totalOpen > 0 ? afterHoursOpen / totalOpen * 100 : 0;
  const wkdayDays = [0,1,2,3,4].reduce((s,d) => s + byDowDays[d], 0);
  const wkendDays = [5,6].reduce((s,d) => s + byDowDays[d], 0);
  const wkdayAvg  = wkdayDays > 0 ? [0,1,2,3,4].reduce((s,d) => s + byDow[d], 0) / wkdayDays : 0;
  const wkendAvg  = wkendDays > 0 ? [5,6].reduce((s,d) => s + byDow[d], 0) / wkendDays : 0;
  const wkendDiff = wkdayAvg > 0 ? (wkendAvg - wkdayAvg) / wkdayAvg * 100 : 0;

  let trendHTML = '';
  if (currentMonth === 'all') {
    const mks = Object.keys(byMonth).sort();
    if (mks.length >= 2) {
      const last = byMonth[mks[mks.length-1]], prev = byMonth[mks[mks.length-2]];
      const MN = {'01':'Jan','02':'Feb','03':'Mar','04':'Apr','05':'May','06':'Jun'};
      if (prev > 0) {
        const pct = (last - prev) / prev * 100;
        trendHTML = `<div class="ins-bullet"><span class="ins-bullet-icon">📈</span><span>Month-over-month: <strong>${pct >= 0 ? '▲' : '▼'} ${Math.abs(pct).toFixed(0)}%</strong> from ${MN[mks[mks.length-2]]} to ${MN[mks[mks.length-1]]} (${prev.toLocaleString()} → ${last.toLocaleString()} cases)</span></div>`;
      }
    }
  }

  // ── Peak summary card ────────────────────────────────────────────────────
  function longestRun(arr) {
    const s = [...arr].sort((a,b)=>a-b); let best=[], cur=[];
    s.forEach((h,i)=>{ if(i===0||h!==s[i-1]+1){if(cur.length>best.length)best=[...cur];cur=[h];}else cur.push(h); });
    if(cur.length>best.length)best=cur; return best;
  }
  const hourAvg = Object.values(byHour).filter(v=>v>0).reduce((a,b)=>a+b,0) / Math.max(Object.values(byHour).filter(v=>v>0).length,1);
  const busyHourList = []; for(let h=1;h<=24;h++){if(byHour[h]>hourAvg*0.6)busyHourList.push(h);}
  const peakHourRun  = longestRun(busyHourList);
  const peakHourRange = peakHourRun.length>=2 ? tzHourLabel(peakHourRun[0])+'–'+tzHourLabel(peakHourRun[peakHourRun.length-1])
    : peakHourRun.length===1 ? tzHourLabel(peakHourRun[0]) : '—';
  const busyDowSorted = [0,1,2,3,4].map(d=>({d,v:dowAvg[d]})).filter(x=>x.v>0).sort((a,b)=>b.v-a.v);
  const topDowIdx = busyDowSorted.slice(0,3).map(x=>x.d).sort((a,b)=>a-b);
  const dowShort = ['Mon','Tue','Wed','Thu','Fri'];
  const dowRangeStr = topDowIdx.length>=2 ? dowShort[topDowIdx[0]]+'–'+dowShort[topDowIdx[topDowIdx.length-1]]
    : topDowIdx.length===1 ? dowShort[topDowIdx[0]] : '—';
  const understaffedList=[]; for(let h=1;h<=24;h++){if(byHourAv[h]>0&&orByHour[h]>=1)understaffedList.push(h);}
  const understaffedRun=longestRun(understaffedList);
  const understaffedRange = understaffedRun.length>=2
    ? tzHourLabel(understaffedRun[0])+'–'+tzHourLabel(understaffedRun[understaffedRun.length-1])
    : understaffedRun.length===1 ? tzHourLabel(understaffedRun[0]) : null;

  // ── Anomaly detection (>1.5× avg) ────────────────────────────────────────
  const anomHours=[]; for(let h=1;h<=24;h++){if(byHour[h]>hourAvg*1.5)anomHours.push({label:tzHourLabel(h)+' (hour '+h+')',v:byHour[h],ratio:(byHour[h]/hourAvg).toFixed(1)});}
  anomHours.sort((a,b)=>b.v-a.v);
  const dowAvgMean = Object.values(dowAvg).filter(v=>v>0).reduce((a,b)=>a+b,0)/Math.max(Object.values(dowAvg).filter(v=>v>0).length,1);
  const anomDows=[]; for(let d=0;d<7;d++){if(dowAvg[d]>dowAvgMean*1.5)anomDows.push({label:DAY_NAMES[d],v:dowAvg[d].toFixed(1),ratio:(dowAvg[d]/dowAvgMean).toFixed(1)});}

  // ── Week-over-week aggregation ────────────────────────────────────────────
  const weekBuckets={};
  byDay.forEach(d=>{
    const dt=new Date(d.key+'T00:00:00'), jan4=new Date(dt.getFullYear(),0,4);
    const wn=Math.ceil(((dt-jan4)/86400000+jan4.getDay()+1)/7);
    const wk='W'+String(wn).padStart(2,'0');
    if(!weekBuckets[wk]){weekBuckets[wk]={v:0,days:0};}
    weekBuckets[wk].v+=d.v; weekBuckets[wk].days++;
  });
  const weekItems=Object.entries(weekBuckets).sort(([a],[b])=>a.localeCompare(b)).map(([wk,data])=>({
    v:data.v, l:wk, c:'#E06820',
    tip:`<strong>${wk}</strong><br>Total: ${data.v.toLocaleString()} cases (${data.days} day${data.days!==1?'s':''})`,
    meta:null
  }));

  // ── Forecast (14-day rolling avg for remaining days in month) ─────────────
  const forecastPts=[];
  if(byDay.length>=7 && currentMonth!=='all'){
    const lastKey=byDay[byDay.length-1].key;
    const [fy,fm,fd]=lastKey.split('-').map(Number);
    const daysInMonth=new Date(fy,fm,0).getDate();
    const rolling=byDay.slice(-14);
    const rollingAvg=Math.round(rolling.reduce((s,d)=>s+d.v,0)/rolling.length);
    for(let dd=fd+1;dd<=daysInMonth;dd++){
      forecastPts.push({v:rollingAvg,label:String(dd)+'/'+String(fm).padStart(2,'0'),tip:null,meta:null});
    }
  }

  // ── Interactive tip registry ──────────────────────────────────────────────
  INS_STATE.tips = {}; INS_STATE.metas = {};
  let _tipIdx = 0;
  function mkTip(tip, meta) {
    if (!tip) return '';
    const k = 'i' + (++_tipIdx);
    INS_STATE.tips[k] = tip;
    if (meta) INS_STATE.metas[k] = meta;
    return ' data-ins="' + k + '" style="cursor:pointer"';
  }

  // ── SVG helpers ──────────────────────────────────────────────────────────
  function svgBar(items, opts) {
    opts = opts || {};
    const W = 700, H = opts.h || 120, PL = 50, PB = 22, PT = 12, PR = 14;
    const pw = W - PL - PR, ph = H - PT - PB;
    const sec = opts.secondary || [], hasSec = sec.length > 0;
    const maxV = Math.max(...items.map(d => d.v).concat(hasSec ? sec : []), 1);
    const bw = pw / items.length;
    const barW = hasSec ? bw * .42 : bw * .65;
    let s = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:${opts.dH || 260}px;display:block">`;
    for (let t = 0; t <= 4; t++) {
      const y = PT + ph - (t / 4) * ph;
      s += `<line x1="${PL}" y1="${y.toFixed(1)}" x2="${W-PR}" y2="${y.toFixed(1)}" stroke="${gridC}" stroke-width=".5"/>`;
      s += `<text x="${(PL-3)}" y="${y.toFixed(1)}" text-anchor="end" dominant-baseline="middle" font-size="4.5" fill="${tickC}">${Math.round(maxV * t / 4)}</text>`;
    }
    items.forEach((d, i) => {
      const bh = Math.max((d.v / maxV) * ph, 0);
      const x  = PL + i * bw + (hasSec ? bw * .04 : (bw - barW) / 2);
      s += `<rect x="${x.toFixed(1)}" y="${(PT+ph-bh).toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(bh,.5).toFixed(1)}" fill="${d.c || '#E06820'}" rx="1.5"${mkTip(d.tip, d.meta)}/>`;
      if (opts.showVals && bh > 8) s += `<text x="${(x+barW/2).toFixed(1)}" y="${(PT+ph-bh-2).toFixed(1)}" text-anchor="middle" font-size="5" fill="${d.c || '#E06820'}">${d.v > 0 ? (Number.isInteger(d.v) ? d.v : d.v.toFixed(1)) : ''}</text>`;
      if (hasSec && sec[i] !== undefined) {
        const sh = Math.max((sec[i] / maxV) * ph, 0);
        const sx = x + barW + bw * .04;
        s += `<rect x="${sx.toFixed(1)}" y="${(PT+ph-sh).toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(sh,.5).toFixed(1)}" fill="${opts.secColor || '#A0AAAA'}" rx="1.5" opacity=".75"/>`;
      }
      if (d.l) s += `<text x="${(PL+(i+.5)*bw).toFixed(1)}" y="${(H-PB+7).toFixed(1)}" text-anchor="middle" font-size="5" fill="${labelC}">${d.l}</text>`;
    });
    s += '</svg>';
    return s;
  }

  function svgOR(orItems, opts) {
    opts = opts || {};
    const W = 700, H = opts.h || 120, PL = 50, PB = 22, PT = 12, PR = 28;
    const pw = W - PL - PR, ph = H - PT - PB;
    const maxV = Math.max(...orItems.map(d => d.v), 1.5);
    const bw = pw / orItems.length;
    let s = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:${opts.dH || 260}px;display:block">`;
    for (let t = 0; t <= 4; t++) {
      const v = maxV * t / 4, y = PT + ph - (v / maxV) * ph;
      s += `<line x1="${PL}" y1="${y.toFixed(1)}" x2="${W-PR}" y2="${y.toFixed(1)}" stroke="${gridC}" stroke-width=".5"/>`;
      s += `<text x="${(PL-3)}" y="${y.toFixed(1)}" text-anchor="end" dominant-baseline="middle" font-size="4.5" fill="${tickC}">${v.toFixed(1)}</text>`;
    }
    if (maxV >= 1) {
      const y1 = PT + ph - (1 / maxV) * ph;
      s += `<line x1="${PL}" y1="${y1.toFixed(1)}" x2="${W-PR}" y2="${y1.toFixed(1)}" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3,2"/>`;
      s += `<text x="${W-PR+2}" y="${y1.toFixed(1)}" dominant-baseline="middle" font-size="4.5" fill="#e74c3c" font-weight="600">1.0</text>`;
    }
    orItems.forEach((d, i) => {
      if (!d.v) return;
      const bh = (d.v / maxV) * ph;
      const barW = bw * .7, x = PL + i * bw + (bw - barW) / 2;
      const fill = d.v >= 1 ? '#e74c3c' : d.v >= 0.7 ? '#FBA832' : '#2ecc71';
      s += `<rect x="${x.toFixed(1)}" y="${(PT+ph-bh).toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(bh,.5).toFixed(1)}" fill="${fill}" rx="1.5" opacity=".9"${mkTip(d.tip, d.meta)}/>`;
      if (d.l) s += `<text x="${(PL+(i+.5)*bw).toFixed(1)}" y="${(H-PB+7).toFixed(1)}" text-anchor="middle" font-size="5" fill="${labelC}">${d.l}</text>`;
    });
    s += '</svg>';
    return s;
  }

  function svgTrend(pts, opts) {
    opts = opts || {};
    const W = 700, H = opts.h || 120, PL = 50, PB = 22, PT = 12, PR = 14;
    const pw = W - PL - PR, ph = H - PT - PB;
    if (pts.length < 2) return `<p style="color:${tickC};font-size:10px;padding:16px 0">Not enough data</p>`;
    const forecast = opts.forecast || [];
    const pr2 = opts.prior || [];
    const totalPts = pts.length + forecast.length;
    const maxV = Math.max(...pts.map(d=>d.v), ...forecast.map(d=>d.v), ...pr2.map(d=>d.v), 1);
    const step = pw / Math.max(totalPts - 1, 1);
    const cx = (i) => PL + i * step, cy = (v) => PT + ph - (v / maxV) * ph;
    let s = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:${opts.dH || 260}px;display:block">`;
    for (let t = 0; t <= 4; t++) {
      const y = PT + ph - (t / 4) * ph;
      s += `<line x1="${PL}" y1="${y.toFixed(1)}" x2="${W-PR}" y2="${y.toFixed(1)}" stroke="${gridC}" stroke-width=".5"/>`;
      s += `<text x="${(PL-3)}" y="${y.toFixed(1)}" text-anchor="end" dominant-baseline="middle" font-size="4.5" fill="${tickC}">${Math.round(maxV * t / 4)}</text>`;
    }
    if (forecast.length > 0) {
      const fx = cx(pts.length - 1);
      s += `<line x1="${fx.toFixed(1)}" y1="${PT}" x2="${fx.toFixed(1)}" y2="${(PT+ph).toFixed(1)}" stroke="${gridC}" stroke-width="1" stroke-dasharray="3,2"/>`;
      s += `<text x="${(fx+2).toFixed(1)}" y="${(PT+5).toFixed(1)}" font-size="4" fill="${labelC}">▸ forecast</text>`;
    }
    const areaPath = `M${cx(0).toFixed(1)},${PT+ph} ` + pts.map((d,i) => `L${cx(i).toFixed(1)},${cy(d.v).toFixed(1)}`).join(' ') + ` L${cx(pts.length-1).toFixed(1)},${PT+ph} Z`;
    s += `<path d="${areaPath}" fill="${opts.areaC || 'rgba(224,104,32,.12)'}"/>`;
    const linePath = pts.map((d,i) => (i?'L':'M') + cx(i).toFixed(1) + ',' + cy(d.v).toFixed(1)).join(' ');
    s += `<path d="${linePath}" stroke="${opts.lineC || '#E06820'}" stroke-width="1.8" fill="none" stroke-linejoin="round" stroke-linecap="round"/>`;
    if (forecast.length > 0) {
      const lastR = pts[pts.length - 1];
      const fPath = [lastR, ...forecast].map((d, i) => (i?'L':'M') + cx(pts.length-1+i).toFixed(1) + ',' + cy(d.v).toFixed(1)).join(' ');
      s += `<path d="${fPath}" stroke="#8A9898" stroke-width="1.5" fill="none" stroke-dasharray="5,3" stroke-linejoin="round"/>`;
    }
    if (pr2.length > 1) {
      const prPath = pr2.map((d,i) => (i?'L':'M') + cx(i).toFixed(1) + ',' + cy(d.v).toFixed(1)).join(' ');
      s += `<path d="${prPath}" stroke="#A0AAAA" stroke-width="1.3" fill="none" stroke-dasharray="4,2" stroke-linejoin="round"/>`;
    }
    const lInt = Math.max(1, Math.ceil(totalPts / 10));
    pts.forEach((d, i) => {
      s += `<circle cx="${cx(i).toFixed(1)}" cy="${cy(d.v).toFixed(1)}" r="1.8" fill="${opts.lineC || '#E06820'}" pointer-events="none"/>`;
      s += `<circle cx="${cx(i).toFixed(1)}" cy="${cy(d.v).toFixed(1)}" r="4" fill="transparent"${mkTip(d.tip, d.meta)}/>`;
      if (i % lInt === 0 && d.label) s += `<text x="${cx(i).toFixed(1)}" y="${H-PB+7}" text-anchor="middle" font-size="5" fill="${labelC}">${d.label}</text>`;
    });
    forecast.forEach((d, i) => {
      const fi = pts.length + i;
      s += `<circle cx="${cx(fi).toFixed(1)}" cy="${cy(d.v).toFixed(1)}" r="1.5" fill="#8A9898" opacity=".7" pointer-events="none"/>`;
      if (fi % lInt === 0 && d.label) s += `<text x="${cx(fi).toFixed(1)}" y="${H-PB+7}" text-anchor="middle" font-size="5" fill="${labelC}" opacity=".7">${d.label}</text>`;
    });
    s += '</svg>';
    return s;
  }

  // ── Chart data ───────────────────────────────────────────────────────────
  const prDowAvg = {};
  for (let d = 0; d < 7; d++) prDowAvg[d] = prByDowDays[d] > 0 ? prByDow[d] / prByDowDays[d] : 0;

  const orItems = Array.from({length:24}, (_, i) => {
    const h = i + 1, orV = byHourAv[h] > 0 ? Math.round(orByHour[h]*100)/100 : 0;
    const st = orV>=1?'🔴 Over Capacity':orV>=0.7?'🟡 Busy':orV>0?'🟢 Comfortable':null;
    return { v: orV, l: (h===1||h%3===0) ? tzHourLabel(h) : '',
      tip: st ? '<strong>'+tzHourLabel(h)+'</strong><br>OR: '+orV.toFixed(2)+' '+st+'<br>Cases: '+byHour[h].toLocaleString()+' | Staff: '+byHourAv[h] : null,
      meta: st ? {type:'hour',h,cases:byHour[h],res:byHourRes[h],staff:byHourAv[h],or:orV} : null };
  });
  const hourItems = Array.from({length:24}, (_, i) => {
    const h = i+1, orV = byHourAv[h]>0 ? orByHour[h] : 0;
    const pct = totalOpen>0 ? (byHour[h]/totalOpen*100).toFixed(1) : '0';
    return { v: byHour[h], c: h===peakH?'#F47629':'#E06820',
      l: h===1||h%4===0 ? tzHourLabel(h) : '',
      tip: '<strong>'+tzHourLabel(h)+'</strong><br>Cases: '+byHour[h].toLocaleString()+' ('+pct+'% of total)<br>Resolved: '+byHourRes[h].toLocaleString()+' | Staff: '+byHourAv[h]+(orV>0?'<br>OR: '+orV.toFixed(2):''),
      meta: {type:'hour',h,cases:byHour[h],res:byHourRes[h],staff:byHourAv[h],or:orV} };
  });
  const staffSec      = Array.from({length:24}, (_, i) => byHourAv[i+1]);
