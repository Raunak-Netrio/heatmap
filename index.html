  <div class="ins-bullets-title">AUTO-INSIGHTS — ${SCOPE}${compareMode ? ' ⚡ COMPARE MODE' : ''}</div>
  <div class="ins-bullet"><span class="ins-bullet-icon">🔥</span><span>Peak hour is <strong>${tzHourLabel(peakH)}</strong> with ${peakHVal.toLocaleString()} cases total${activeDays > 0 ? ` (avg ${(peakHVal/activeDays).toFixed(1)}/day)` : ''}</span></div>
  <div class="ins-bullet"><span class="ins-bullet-icon">📅</span><span>Busiest day is <strong>${peakDowName}</strong> averaging ${peakDowEntry[1].toFixed(1)} cases/day</span></div>
  <div class="ins-bullet"><span class="ins-bullet-icon">📊</span><span>Avg occupancy ratio <strong>${avgOR.toFixed(2)}</strong> — ${understaffedHours > 0 ? `<strong style="color:#e74c3c">${understaffedHours} hour${understaffedHours>1?'s':''}</strong> exceed capacity (OR &gt; 1.0)` : 'all hours within capacity'}</span></div>
  <div class="ins-bullet"><span class="ins-bullet-icon">✅</span><span>Resolution rate <strong>${resRate.toFixed(0)}%</strong> — ${totalRes.toLocaleString()} of ${totalOpen.toLocaleString()} cases resolved</span></div>
  <div class="ins-bullet"><span class="ins-bullet-icon">🌙</span><span>After-hours (before 9:00 & after 18:00) accounts for <strong>${afterHoursPct.toFixed(0)}%</strong> of all opened cases</span></div>
  ${wkendDays > 0 ? `<div class="ins-bullet"><span class="ins-bullet-icon">${wkendDiff < -10?'📉':'📊'}</span><span>Weekends avg <strong>${wkendAvg.toFixed(1)} cases/day</strong> vs ${wkdayAvg.toFixed(1)} on weekdays (${Math.abs(wkendDiff).toFixed(0)}% ${wkendDiff<0?'lower':'higher'})</span></div>` : ''}
  ${compareMode && prTotalOpen > 0 ? `<div class="ins-bullet"><span class="ins-bullet-icon">⚡</span><span>vs prior period: case volume <strong>${totalOpen > prTotalOpen ? '▲' : '▼'} ${Math.abs((totalOpen-prTotalOpen)/prTotalOpen*100).toFixed(0)}%</strong> (${prTotalOpen.toLocaleString()} → ${totalOpen.toLocaleString()}), resolution ${prResRate.toFixed(0)}% → <strong>${resRate.toFixed(0)}%</strong></span></div>` : ''}
  ${trendHTML}
</div>
<div id="ins-detail"></div>`;
  _setupInsightEvents();
}

function renderRecommendations() {
  const view = document.getElementById('recsView');
  const gOpened   = mergeGroupData(DATA['opened']);
  const gResolved = mergeGroupData(DATA['resolved']);
  const gAvail    = mergeGroupData(AVAIL);
  const isDark = document.body.classList.contains('dark');
  const gridC  = isDark ? '#2C3032' : '#eef0f4';
  const tickC  = isDark ? '#8A9898' : '#9aabb8';
  const labelC = isDark ? '#8A9898' : '#6b7a8d';

  // ── Base aggregation (mirrors renderInsights) ─────────────────────────────
  const byHour = {}, byHourRes = {}, byHourAv = {};
  const byDow  = {}, byDowDays = {};
  for (let h = 1; h <= 24; h++) { byHour[h] = 0; byHourRes[h] = 0; byHourAv[h] = 0; }
  for (let d = 0; d < 7; d++)   { byDow[d]  = 0; byDowDays[d] = 0; }
  let activeDays = 0, totalOpen = 0;

  DATES.forEach(({ key, day }) => {
    const dO = gOpened[key] || {}, dR = gResolved[key] || {}, dA = gAvail[key] || {};
    let dayOpen = 0, dayAvail = 0;
    for (let h = 1; h <= 24; h++) {
      const o = dO[String(h)]||0, r = dR[String(h)]||0, a = dA[h]||0;
      byHour[h]+=o; byHourRes[h]+=r; byHourAv[h]+=a;
      dayOpen+=o; totalOpen+=o; dayAvail+=a;
    }
    if (dayOpen>0||dayAvail>0) activeDays++;
    const dow = DAY_NAMES.indexOf(day);
    if (dow>=0) { byDow[dow]+=dayOpen; byDowDays[dow]++; }
  });

  const orByHour = {};
  for (let h=1;h<=24;h++) orByHour[h] = byHourAv[h]>0 ? byHour[h]/byHourAv[h] : 0;

  // ── Staffing analysis ─────────────────────────────────────────────────────
  const TARGET_OR = 0.85;
  const avgCasesPerDay = {}, avgStaffPerDay = {}, recommendedStaff = {}, staffGap = {}, projectedOR = {};
  let totalGapSlots = 0, totalSurplusSlots = 0, hoursOverCap = 0, projHoursOverCap = 0;
  let casesOverCapacity = 0, casesProjectedOver = 0;

  for (let h=1;h<=24;h++) {
    avgCasesPerDay[h] = activeDays>0 ? byHour[h]/activeDays : 0;
    avgStaffPerDay[h] = activeDays>0 ? byHourAv[h]/activeDays : 0;
    if (avgCasesPerDay[h]>0) {
      recommendedStaff[h] = Math.ceil(avgCasesPerDay[h]/TARGET_OR);
      projectedOR[h]      = avgCasesPerDay[h]/recommendedStaff[h];
    } else {
      recommendedStaff[h] = 0;
      projectedOR[h]      = 0;
    }
    staffGap[h] = recommendedStaff[h] - avgStaffPerDay[h];
    if (staffGap[h]>0.3)  totalGapSlots     += staffGap[h];
    if (staffGap[h]<-0.5) totalSurplusSlots += Math.abs(staffGap[h]);
    if (orByHour[h]>1)    { hoursOverCap++; casesOverCapacity += byHour[h]-byHourAv[h]; }
    if (projectedOR[h]>1) { projHoursOverCap++; casesProjectedOver += avgCasesPerDay[h]-recommendedStaff[h]; }
  }
  casesOverCapacity   = Math.max(0, Math.round(casesOverCapacity));
  casesProjectedOver  = Math.max(0, Math.round(casesProjectedOver * activeDays));

  // ── DOW averages ──────────────────────────────────────────────────────────
  const dowAvg = {}, dowAvgStaff = {};
  for (let d=0;d<7;d++) {
    dowAvg[d]      = byDowDays[d]>0 ? byDow[d]/byDowDays[d] : 0;
    let tot=0, cnt=0;
    DATES.forEach(({key,day})=>{
      if (DAY_NAMES.indexOf(day)===d) {
        const dA=gAvail[key]||{}; let s=0; for(let h=1;h<=24;h++) s+=dA[h]||0;
        if(s>0){tot+=s;cnt++;}
      }
    });
    dowAvgStaff[d] = cnt>0 ? tot/cnt : 0;
  }
  const peakDow = Object.entries(dowAvg).sort((a,b)=>b[1]-a[1])[0];

  // ── Recommendation generation ─────────────────────────────────────────────
  function toRanges(hours) {
    const sorted=[...hours].sort((a,b)=>a-b), ranges=[];
    let start=null, prev=null;
    sorted.forEach(h=>{ if(prev===null||h>prev+1){if(start!==null)ranges.push({from:start,to:prev});start=h;} prev=h; });
    if(start!==null) ranges.push({from:start,to:prev});
    return ranges;
  }
  const understaffedH = [], overstaffedH = [];
  for(let h=1;h<=24;h++){
    if(staffGap[h]>0.5&&byHour[h]>0)  understaffedH.push(h);
    if(staffGap[h]<-1&&byHourAv[h]>0) overstaffedH.push(h);
  }
  const criticalRecs=[], highRecs=[], optimizeRecs=[];
  toRanges(understaffedH).forEach(r=>{
    const hrs = r.to-r.from+1;
    const avgOR  = Array.from({length:hrs},(_,i)=>orByHour[r.from+i]).reduce((a,b)=>a+b,0)/hrs;
    const maxGap = Math.ceil(Math.max(...Array.from({length:hrs},(_,i)=>staffGap[r.from+i])));
    const addedRes = Array.from({length:hrs},(_,i)=>{ const h=r.from+i; return recommendedStaff[h]-avgStaffPerDay[h]; }).reduce((a,b)=>a+b,0);
    const item = { from:r.from, to:r.to, label:tzHourLabel(r.from)+'–'+tzHourLabel(r.to), maxGap, avgOR, addedRes:Math.ceil(addedRes) };
    (avgOR>=1.5 ? criticalRecs : highRecs).push(item);
  });
  toRanges(overstaffedH).forEach(r=>{
    const hrs=r.to-r.from+1;
    const avgSurp=Math.abs(Array.from({length:hrs},(_,i)=>staffGap[r.from+i]).reduce((a,b)=>a+b,0)/hrs);
    optimizeRecs.push({from:r.from,to:r.to,label:tzHourLabel(r.from)+'–'+tzHourLabel(r.to),surplus:avgSurp.toFixed(1)});
  });

  // ── SVG helpers ───────────────────────────────────────────────────────────
  function svgBarR(items, opts) {
    opts=opts||{};
    const W=700,H=opts.h||120,PL=50,PB=22,PT=12,PR=14,pw=W-PL-PR,ph=H-PT-PB;
    const sec=opts.secondary||[], hasSec=sec.length>0;
    const maxV=Math.max(...items.map(d=>d.v).concat(hasSec?sec:[]),1);
    const bw=pw/items.length, barW=hasSec?bw*.42:bw*.65;
    let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:${opts.dH||260}px;display:block">`;
    for(let t=0;t<=4;t++){
      const y=PT+ph-(t/4)*ph;
      s+=`<line x1="${PL}" y1="${y.toFixed(1)}" x2="${W-PR}" y2="${y.toFixed(1)}" stroke="${gridC}" stroke-width=".5"/>`;
      s+=`<text x="${PL-3}" y="${y.toFixed(1)}" text-anchor="end" dominant-baseline="middle" font-size="4.5" fill="${tickC}">${(maxV*t/4).toFixed(1)}</text>`;
    }
    items.forEach((d,i)=>{
      const bh=Math.max((d.v/maxV)*ph,0), x=PL+i*bw+(hasSec?bw*.04:(bw-barW)/2);
      s+=`<rect x="${x.toFixed(1)}" y="${(PT+ph-bh).toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(bh,.5).toFixed(1)}" fill="${d.c||'#E06820'}" rx="1.5"/>`;
      if(hasSec&&sec[i]!==undefined){
        const sh=Math.max((sec[i]/maxV)*ph,0), sx=x+barW+bw*.04;
        s+=`<rect x="${sx.toFixed(1)}" y="${(PT+ph-sh).toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(sh,.5).toFixed(1)}" fill="${opts.secColor||'#27ae60'}" rx="1.5" opacity=".8"/>`;
      }
      if(d.l) s+=`<text x="${(PL+(i+.5)*bw).toFixed(1)}" y="${(H-PB+7).toFixed(1)}" text-anchor="middle" font-size="5" fill="${labelC}">${d.l}</text>`;
    });
    return s+'</svg>';
  }

  function svgORR(orItems, opts) {
    opts=opts||{};
    const W=700,H=opts.h||120,PL=50,PB=22,PT=12,PR=32,pw=W-PL-PR,ph=H-PT-PB;
    const maxV=Math.max(...orItems.map(d=>d.v),1.5);
    const bw=pw/orItems.length;
    let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:${opts.dH||260}px;display:block">`;
    for(let t=0;t<=4;t++){
      const v=maxV*t/4,y=PT+ph-(v/maxV)*ph;
      s+=`<line x1="${PL}" y1="${y.toFixed(1)}" x2="${W-PR}" y2="${y.toFixed(1)}" stroke="${gridC}" stroke-width=".5"/>`;
      s+=`<text x="${PL-3}" y="${y.toFixed(1)}" text-anchor="end" dominant-baseline="middle" font-size="4.5" fill="${tickC}">${v.toFixed(1)}</text>`;
    }
    // capacity limit
    const y1=PT+ph-(1/maxV)*ph;
    s+=`<line x1="${PL}" y1="${y1.toFixed(1)}" x2="${W-PR}" y2="${y1.toFixed(1)}" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3,2"/>`;
    s+=`<text x="${W-PR+2}" y="${y1.toFixed(1)}" dominant-baseline="middle" font-size="4" fill="#e74c3c" font-weight="600">1.0</text>`;
    // target line
    const yt=PT+ph-(TARGET_OR/maxV)*ph;
    s+=`<line x1="${PL}" y1="${yt.toFixed(1)}" x2="${W-PR}" y2="${yt.toFixed(1)}" stroke="#27ae60" stroke-width="1" stroke-dasharray="3,2"/>`;
    s+=`<text x="${W-PR+2}" y="${yt.toFixed(1)}" dominant-baseline="middle" font-size="4" fill="#27ae60" font-weight="600">0.85</text>`;
    orItems.forEach((d,i)=>{
      if(!d.v&&d.v!==0) return;
      const bh=(Math.max(d.v,0)/maxV)*ph, barW=bw*.7, x=PL+i*bw+(bw-barW)/2;
      const fill=d.projected ? (d.v>=1?'#e74c3c':d.v>=TARGET_OR?'#FBA832':'#27ae60')
                              : (d.v>=1?'#e74c3c':d.v>=0.7?'#FBA832':'#2ecc71');
      s+=`<rect x="${x.toFixed(1)}" y="${(PT+ph-bh).toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(bh,.5).toFixed(1)}" fill="${fill}" rx="1.5" opacity="${d.projected?.75:.9}"/>`;
      if(d.l) s+=`<text x="${(PL+(i+.5)*bw).toFixed(1)}" y="${(H-PB+7).toFixed(1)}" text-anchor="middle" font-size="5" fill="${labelC}">${d.l}</text>`;
    });
    return s+'</svg>';
  }

  // ── Chart data ─────────────────────────────────────────────────────────────
  const lbl = h => (h===1||h%3===0)?tzHourLabel(h):'';
  const currentORItems  = Array.from({length:24},(_,i)=>{ const h=i+1; return {v:byHourAv[h]>0?Math.round(orByHour[h]*100)/100:0, l:lbl(h)}; });
  const projectedORItems= Array.from({length:24},(_,i)=>{ const h=i+1; return {v:recommendedStaff[h]>0?Math.round(projectedOR[h]*100)/100:0, projected:true, l:lbl(h)}; });
  const staffCurItems   = Array.from({length:24},(_,i)=>{ const h=i+1; return {v:Math.round(avgStaffPerDay[h]*10)/10, c:'#5A9DA8', l:lbl(h)}; });
  const staffRecSec     = Array.from({length:24},(_,i)=>Math.round(recommendedStaff[i+1]*10)/10);
  const dowShort        = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const dowCasesItems   = dowShort.map((l,i)=>({v:Math.round(dowAvg[i]*10)/10||0,l,c:i>=5?'#FBA832':'#E06820'}));
  const dowStaffSec     = Array.from({length:7},(_,i)=>Math.round(dowAvgStaff[i]*10)/10||0);

  // ── Rec card builder ──────────────────────────────────────────────────────
  const recCard=(cls,icon,title,body)=>
    `<div class="rec-card rec-${cls}"><div class="rec-card-header"><span class="rec-icon">${icon}</span><span class="rec-card-title">${title}</span></div><div class="rec-card-body">${body}</div></div>`;
  const impKpi=(val,lbl,col)=>
    `<div class="rec-impact-kpi"><div class="rec-impact-val" style="${col?'color:'+col:''}">${val}</div><div class="rec-impact-lbl">${lbl}</div></div>`;

  const critHtml = criticalRecs.length
    ? criticalRecs.map(r=>recCard('critical','🔴',`Add staff: ${r.label}`,
        `Hours ${r.label} average OR <strong>${r.avgOR.toFixed(2)}</strong>. Add <strong>+${r.maxGap} staff slot${r.maxGap!==1?'s':''}</strong> at peak to reach OR ≤ 0.85. ` +
        `This block accounts for roughly <strong>${Math.round(r.maxGap/Math.max(totalGapSlots,1)*100)}%</strong> of total staffing gap.`)).join('')
    : '<p style="color:#8a9ab0;font-size:12px;padding:4px 0">No critical understaffing detected in current data.</p>';

  const highHtml = highRecs.length
    ? highRecs.map(r=>recCard('high','🟡',`Increase coverage: ${r.label}`,
        `Hours ${r.label} run at OR <strong>${r.avgOR.toFixed(2)}</strong>. Adding <strong>+${r.maxGap} slot${r.maxGap!==1?'s':''}</strong> brings within target. ` +
        `Consider extending adjacent shifts by 1–2 hours rather than adding a standalone shift.`)).join('')
    : '<p style="color:#8a9ab0;font-size:12px;padding:4px 0">No high-priority gaps detected.</p>';

  const optHtml = optimizeRecs.length
    ? optimizeRecs.map(r=>recCard('optimize','🟢',`Reallocate from: ${r.label}`,
        `Hours ${r.label} have an average surplus of <strong>${r.surplus} staff slots</strong> vs case volume. Shifting this capacity earlier/later covers peak hours without adding net headcount.`)).join('')
    : '<p style="color:#8a9ab0;font-size:12px;padding:4px 0">No significant overstaffing detected — staffing appears well-matched to off-peak hours.</p>';

  const SCOPE = {'1':'January','2':'February','3':'March','4':'April','5':'May','6':'June','all':'Full Year'}[currentMonth]||'';

  view.innerHTML = `
<div class="rec-impact-bar">
  ${impKpi(hoursOverCap,'Hours Over Capacity — Current','#e74c3c')}
  ${impKpi(projHoursOverCap===0?'0':projHoursOverCap,'Hours Over Capacity — Projected',projHoursOverCap===0?'#27ae60':'#FBA832')}
  ${impKpi('+'+Math.round(totalGapSlots*10)/10,'Avg Staff Slots to Add','#E06820')}
  ${impKpi(Math.round(totalSurplusSlots*10)/10+' reroutable','Slots Available to Reallocate','#5A9DA8')}
  ${impKpi(casesOverCapacity.toLocaleString(),'Cases Handled Over Capacity (Period)','#e74c3c')}
  ${impKpi(casesProjectedOver===0?'0':casesProjectedOver.toLocaleString(),'Projected Overflow After Fix',casesProjectedOver===0?'#27ae60':'#FBA832')}
</div>

<div class="rec-charts">
  <div class="ins-chart-card">
    <div class="ins-chart-title">CURRENT OCCUPANCY RATIO BY HOUR
      <span style="float:right;font-weight:400;color:#9aabb8;font-size:9px">red dashed = capacity limit (1.0) &nbsp; green dashed = target (0.85)</span>
    </div>
    ${svgORR(currentORItems,{h:120,dH:260})}
  </div>
  <div class="ins-chart-card">
    <div class="ins-chart-title">PROJECTED OR WITH RECOMMENDED STAFFING
      <span style="float:right;font-weight:400;color:#9aabb8;font-size:9px">green bars = within target &nbsp; amber = near limit &nbsp; red = still over</span>
    </div>
    ${svgORR(projectedORItems,{h:120,dH:260})}
  </div>
  <div class="ins-chart-card">
    <div class="ins-chart-title">CURRENT vs RECOMMENDED STAFF — AVG PER DAY BY HOUR</div>
    ${svgBarR(staffCurItems,{h:120,dH:260,secondary:staffRecSec,secColor:'#27ae60'})}
    <div class="ins-legend">
      <span><span class="ins-swatch" style="background:#5A9DA8"></span>Current avg staff</span>
      <span><span class="ins-swatch" style="background:#27ae60;opacity:.8"></span>Recommended staff</span>
    </div>
  </div>
  <div class="ins-chart-card">
    <div class="ins-chart-title">AVG CASES vs AVG STAFF ON SHIFT — BY DAY OF WEEK</div>
    ${svgBarR(dowCasesItems,{h:120,dH:260,secondary:dowStaffSec,secColor:'#5A9DA8'})}
    <div class="ins-legend">
      <span><span class="ins-swatch" style="background:#E06820"></span>Avg cases/day</span>
      <span><span class="ins-swatch" style="background:#5A9DA8;opacity:.8"></span>Avg staff on shift (total daily slots)</span>
    </div>
  </div>
</div>

<div class="rec-sections">
  <div class="rec-section">
    <div class="rec-section-title">🔴 CRITICAL — Understaffed hours (OR &gt; 1.5×): add staff immediately</div>
    ${critHtml}
  </div>
  <div class="rec-section">
    <div class="rec-section-title">🟡 HIGH PRIORITY — Understaffed hours (OR 1.0–1.5): increase coverage</div>
    ${highHtml}
  </div>
  <div class="rec-section">
    <div class="rec-section-title">🟢 OPTIMISE — Overstaffed hours: reallocate to peak windows</div>
    ${optHtml}
  </div>
</div>

<div class="ins-bullets" style="margin-top:0">
  <div class="ins-bullets-title">METHODOLOGY — ${SCOPE} · ${activeDays} active days analysed</div>
  <div class="ins-bullet"><span class="ins-bullet-icon">📐</span><span>Target OR set at <strong>0.85</strong> — each staff slot handles up to ~1.18 cases/hour, leaving headroom for response time variation and complex cases</span></div>
  <div class="ins-bullet"><span class="ins-bullet-icon">🔁</span><span>Check <strong>reallocation opportunities</strong> first — shifting surplus capacity from low-traffic hours to peak windows may achieve target OR without net headcount additions</span></div>
  <div class="ins-bullet"><span class="ins-bullet-icon">📅</span><span>Busiest day is <strong>${DAY_NAMES[parseInt(peakDow[0])]}</strong> at ${Number(peakDow[1]).toFixed(1)} avg cases/day — Mon–Thu core shift coverage should be prioritised</span></div>
  <div class="ins-bullet"><span class="ins-bullet-icon">⚠</span><span>Recommendations reflect <em>period averages</em> — single-day spikes may require additional flex capacity; review daily trend and anomaly data in the Insights tab for outliers</span></div>
  <div class="ins-bullet"><span class="ins-bullet-icon">🔄</span><span>This view updates automatically when new data or roster files are uploaded via the filter bar</span></div>
</div>`;
}

function toggleCompare() {
  compareMode = !compareMode;
  document.getElementById('compareBtn').classList.toggle('active', compareMode);
  document.body.classList.toggle('compare-active', compareMode);
  render();
}

// ── Build hour header ─────────────────────────────────────────────────────
const hourHeader = document.getElementById('hourHeader');
function rebuildHourHeader() {
  // remove old hour cells (keep first two: Day, Date)
  while (hourHeader.children.length > 2) hourHeader.removeChild(hourHeader.lastChild);
  for (let h = 1; h <= 24; h++) {
    const th = document.createElement('th');
    th.textContent = tzHourLabel(h);
    hourHeader.appendChild(th);
  }
}
rebuildHourHeader();

// ── Legend ────────────────────────────────────────────────────────────────
const legendBar = document.getElementById('legendBar');
PALETTE.forEach(c => {
  const s = document.createElement('div');
  s.className = 'legend-swatch';
  s.style.background = c;
  legendBar.appendChild(s);
});

// ── Render ────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function render() {
  if (currentType === 'insights') { renderInsights(); return; }
  if (currentType === 'recs')     { renderRecommendations(); return; }
  const isAvail  = currentType === 'avail';
  const isRatio  = currentType === 'ratio';
  const isOrMap  = currentType === 'or-map';
  const isResMap = currentType === 'res-map';
  const needsRatio = isRatio || isOrMap || isResMap;

  document.getElementById('heatTable').classList.toggle('ratio-mode', isRatio);

  // Data sources
  const groupData    = (!needsRatio && !isAvail) ? mergeGroupData(DATA[currentType]) : null;
  const availForCalc = (needsRatio || isAvail)   ? mergeGroupData(AVAIL)             : null;
  const openedData   = needsRatio ? mergeGroupData(DATA['opened'])                    : null;
  const resolvedData = needsRatio ? mergeGroupData(DATA['resolved'])                  : null;

  // ── First pass: stats ───────────────────────────────────────────────────
  let globalMax = 1;
  const hourTotals = {}, dayTotals = {};
  let peakDayKey = null, peakDayVal = 0;
  let peakHourKey = null, peakHourVal = 0;
  let grandTotal = 0;
  const emptyDates = new Set();
  let peakCellKey = null, peakCellH = 0, peakCellVal = 0;

  // Ratio accumulators
  const hrOp = {}, hrRv = {}, hrAv = {};
  const dyOp = {}, dyAv = {};
  let totOp = 0, totRv = 0, totAv = 0;

  DATES.forEach(({ key }) => {
    if (needsRatio) {
      const dO = openedData[key]   || {};
      const dR = resolvedData[key] || {};
      const dA = availForCalc[key] || {};
      let op = 0, av = 0;
      for (let h = 1; h <= 24; h++) {
        const o = dO[String(h)] || 0;
        const r = dR[String(h)] || 0;
        const a = dA[h] || 0;
        hrOp[h] = (hrOp[h] || 0) + o;
        hrRv[h] = (hrRv[h] || 0) + r;
        hrAv[h] = (hrAv[h] || 0) + a;
        op += o; av += a;
        totOp += o; totRv += r; totAv += a;
      }
      dyOp[key] = op; dyAv[key] = av;
    } else {
      const d = isAvail ? (availForCalc[key] || {}) : (groupData[key] || {});
      let daySum = 0;
      for (let h = 1; h <= 24; h++) {
        const v = d[String(h)] || 0;
        if (v > globalMax) globalMax = v;
        if (v > peakCellVal) { peakCellVal = v; peakCellKey = key; peakCellH = h; }
        hourTotals[h] = (hourTotals[h] || 0) + v;
        if (hourTotals[h] > peakHourVal) { peakHourVal = hourTotals[h]; peakHourKey = String(h); }
        daySum += v;
      }
      dayTotals[key] = daySum;
      grandTotal += daySum;
      if (daySum > peakDayVal) { peakDayVal = daySum; peakDayKey = key; }
      if (daySum === 0) emptyDates.add(key);
    }
  });

  document.getElementById('legendMax').textContent = needsRatio ? '' : `max: ${globalMax}`;

  // ── Stats badges ────────────────────────────────────────────────────────
  if (needsRatio) {
    const oOR = totAv > 0 ? (totOp / totAv).toFixed(2) : '—';
    const oRR = totAv > 0 ? (totRv / totAv * 100).toFixed(0) + '%' : '—';
    document.getElementById('totalLabel').textContent = isResMap ? 'Avg Resolution Rate' : 'Overall OR | Res%';
    document.getElementById('totalCount').textContent = totAv > 0 ? (isResMap ? oRR : `${oOR} | ${oRR}`) : '—';

    let bestH = null, bestHOR = 0;
    for (let h = 1; h <= 24; h++) {
      const a = hrAv[h] || 0;
      if (a > 0) { const or = hrOp[h] / a; if (or > bestHOR) { bestHOR = or; bestH = h; } }
    }
    document.getElementById('peakHourLabel').textContent = 'Peak Load Hour';
    document.getElementById('peakHour').textContent = bestH ? `Hour ${bestH - 1} (OR ${bestHOR.toFixed(2)})` : '—';

    let bestDK = null, bestDOR = 0;
    DATES.forEach(({ key }) => {
      const a = dyAv[key] || 0;
      if (a > 0) { const or = dyOp[key] / a; if (or > bestDOR) { bestDOR = or; bestDK = key; } }
    });
    const bestDObj = bestDK ? DATES.find(d => d.key === bestDK) : null;
    document.getElementById('peakDayLabel').textContent = 'Highest OR Day';
    document.getElementById('peakDay').textContent = bestDObj ? `${bestDObj.label} (${bestDOR.toFixed(2)})` : '—';
  } else {
    const peakDayObj = peakDayKey ? DATES.find(d => d.key === peakDayKey) : null;
    document.getElementById('totalCount').textContent = grandTotal.toLocaleString();
    document.getElementById('totalLabel').textContent  = isAvail ? 'Staff-Hours' : 'Total Cases';
    document.getElementById('peakHour').textContent   = peakHourKey && peakHourVal > 0 ? `Hour ${parseInt(peakHourKey) - 1} (${peakHourVal})` : '—';
    document.getElementById('peakHourLabel').textContent = isAvail ? 'Busiest Hour' : 'Peak Hour';
    document.getElementById('peakDay').textContent    = peakDayObj && peakDayVal > 0 ? `${peakDayObj.label} (${peakDayVal})` : '—';
    document.getElementById('peakDayLabel').textContent  = isAvail ? 'Busiest Day' : 'Peak Day';
  }

  // ── Table body ──────────────────────────────────────────────────────────
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  DATES.forEach(({ day, label, key, isWeekend }) => {
    const tr = document.createElement('tr');
    const rowClasses = [];
    if (isWeekend) rowClasses.push('weekend');
    if (emptyDates.has(key)) rowClasses.push('no-data-row');
    if (rowClasses.length) tr.className = rowClasses.join(' ');
    const tdDay  = document.createElement('td'); tdDay.className  = 'day-cell';  tdDay.textContent  = day;
    const tdDate = document.createElement('td'); tdDate.className = 'date-cell'; tdDate.textContent = label;
    tr.appendChild(tdDay);
    tr.appendChild(tdDate);

    if (isRatio) {
      const dO = openedData[key]   || {};
      const dR = resolvedData[key] || {};
      const dA = availForCalc[key] || {};
      const priorDO = compareMode ? (openedData[toPriorDateKey(key)]   || {}) : {};
      const priorDR = compareMode ? (resolvedData[toPriorDateKey(key)] || {}) : {};
      const priorDA = compareMode ? (availForCalc[toPriorDateKey(key)] || {}) : {};
      for (let h = 1; h <= 24; h++) {
        const op = dO[String(h)] || 0;
        const rv = dR[String(h)] || 0;
        const av = dA[String(h)] || 0;
        const td = document.createElement('td');
        let OR = 0, RR = 0;
        if (av === 0) {
          td.className = 'heat empty';
        } else {
          OR = op / av; RR = rv / av;
          td.className = 'heat ' + (OR > RR ? 'ratio-red' : 'ratio-good');
          td.textContent = `${OR.toFixed(1)} | ${RR.toFixed(1)}`;
        }
        if (compareMode && av > 0) {
          const pAv = priorDA[String(h)] || 0;
          if (pAv > 0) {
            const pOR = (priorDO[String(h)] || 0) / pAv;
            const orD = OR - pOR;
            const badge = document.createElement('span');
            badge.className = 'delta-badge';
            badge.textContent = Math.abs(orD) >= 0.05
              ? (orD > 0 ? `▲${orD.toFixed(1)}` : `▼${Math.abs(orD).toFixed(1)}`)
              : '≈';
            badge.style.color = orD >= 0.05 ? '#c0392b' : orD <= -0.05 ? '#1a7a40' : '#b0bec5';
            td.appendChild(badge);
          }
        }
        td.addEventListener('mouseenter', e => {
          tooltip.style.display = 'block';
          const a = dA[String(h)] || 0;
          if (a === 0) {
            tooltip.textContent = `${label} · ${day} · ${tzDisp(h)}: No availability data`;
          } else {
            const curOR = (dO[String(h)] || 0) / a, curRR = (dR[String(h)] || 0) / a;
            const pAv2 = priorDA[String(h)] || 0;
            const priorStr = (compareMode && pAv2 > 0)
              ? ` | prior OR: ${((priorDO[String(h)]||0)/pAv2).toFixed(2)}, RR: ${((priorDR[String(h)]||0)/pAv2).toFixed(2)}`
              : '';
            tooltip.textContent = `${label} · ${day} · ${tzDisp(h)} — OR: ${curOR.toFixed(2)}, RR: ${curRR.toFixed(2)} (${a} staff)${priorStr}`;
          }
        });
        td.addEventListener('mousemove', e => {
          tooltip.style.left = (e.clientX + 12) + 'px';
          tooltip.style.top  = (e.clientY + 12) + 'px';
        });
        td.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
        tr.appendChild(td);
      }
    } else if (isOrMap || isResMap) {
      const dO = openedData[key]   || {};
      const dR = resolvedData[key] || {};
      const dA = availForCalc[key] || {};
      for (let h = 1; h <= 24; h++) {
        const op = dO[String(h)] || 0;
        const rv = dR[String(h)] || 0;
        const av = dA[h] || 0;
        const td = document.createElement('td');
        if (av === 0 && op === 0) {
          td.className = 'heat empty';
        } else if (isOrMap) {
          const orV = av > 0 ? op / av : 0;
          const cls = orV >= 1 ? 'orm-red' : orV >= 0.7 ? 'orm-amber' : 'orm-green';
          td.className = 'heat ' + cls;
          if (av > 0) td.textContent = orV.toFixed(2);
        } else {
          const rr = op > 0 ? rv / op * 100 : 0;
          const cls = rr >= 70 ? 'rrm-high' : rr >= 30 ? 'rrm-mid' : 'rrm-low';
          td.className = 'heat ' + cls;
          if (op > 0) td.textContent = Math.round(rr) + '%';
        }
        const orTip = av > 0 ? (op/av).toFixed(2) : '—';
        const rrTip = op > 0 ? Math.round(rv/op*100) + '%' : '—';
        td.title = '';
        td.style.cursor = (op > 0 || av > 0) ? 'pointer' : '';
        td.addEventListener('mouseenter', () => {
          tooltip.style.display = 'block';
          tooltip.textContent = `${label} · ${day} · ${tzDisp(h)} — Opened: ${op} | Resolved: ${rv} | OR: ${orTip} | Res: ${rrTip} | Staff: ${av}`;
        });
        td.addEventListener('mousemove', e => {
          tooltip.style.left = (e.clientX + 12) + 'px';
          tooltip.style.top  = (e.clientY + 12) + 'px';
        });
        td.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
        if (op > 0 || av > 0) td.addEventListener('click', () => showCellDetail(key, h, label, day));
        tr.appendChild(td);
      }
    } else {
      const d = isAvail ? (availForCalc[key] || {}) : (groupData[key] || {});
      const priorD = compareMode ? ((isAvail ? availForCalc : groupData)[toPriorDateKey(key)] || {}) : {};
      for (let h = 1; h <= 24; h++) {
        const count = d[String(h)] || 0;
        const td = document.createElement('td');
        const isPeak = count > 0 && key === peakCellKey && h === peakCellH;
        const priorCount = compareMode ? (priorD[String(h)] || 0) : 0;
        const delta = count - priorCount;
        let deltaClass = '';
        if (compareMode) deltaClass = delta > 0 ? ' delta-pos' : delta < 0 ? ' delta-neg' : ' delta-same';
        td.className = 'heat' + (count === 0 ? ' empty' : '') + (isPeak ? ' peak-cell' : '') + deltaClass;
        if (count > 0) {
          td.style.background = getColor(count, globalMax);
          td.style.color = getTextColor(count, globalMax);
          td.textContent = count;
          td.classList.add('clickable');
          td.addEventListener('click', () => showDetailModal(key, h, label, day));
        }
        if (compareMode) {
          const badge = document.createElement('span');
          badge.className = 'delta-badge';
          badge.textContent = delta > 0 ? `▲${delta}` : delta < 0 ? `▼${Math.abs(delta)}` : '=';
          td.appendChild(badge);
        }
        td.addEventListener('mouseenter', e => {
          tooltip.style.display = 'block';
          const base = isAvail
            ? `${label} · ${day} · ${tzDisp(h)}: ${count} staff on shift`
            : `${label} · ${day} · ${tzDisp(h)}: ${count} case${count !== 1 ? 's' : ''}`;
          tooltip.textContent = compareMode
            ? `${base} (prior: ${priorCount}, Δ${delta >= 0 ? '+' : ''}${delta})`
            : base;
        });
        td.addEventListener('mousemove', e => {
          tooltip.style.left = (e.clientX + 12) + 'px';
          tooltip.style.top  = (e.clientY + 12) + 'px';
        });
        td.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
        tr.appendChild(td);
      }
    }
    tbody.appendChild(tr);
  });

  // ── Summary row ─────────────────────────────────────────────────────────
  const trTot = document.createElement('tr');
  trTot.className = 'summary-row';
  const tdTotLabel = document.createElement('td'); tdTotLabel.className = 'day-cell';  tdTotLabel.textContent = 'Total';
  const tdTotDate  = document.createElement('td'); tdTotDate.className  = 'date-cell'; tdTotDate.textContent  = '—';
  trTot.appendChild(tdTotLabel);
  trTot.appendChild(tdTotDate);

  if (needsRatio) {
    for (let h = 1; h <= 24; h++) {
      const av = hrAv[h] || 0, op = hrOp[h] || 0, rv = hrRv[h] || 0;
      const td = document.createElement('td');
      if (isRatio) {
        if (av === 0) { td.className = 'heat empty'; }
        else { const OR = op/av, RR = rv/av; td.className='heat '+(OR>RR?'ratio-red':'ratio-good'); td.textContent=`${OR.toFixed(1)} | ${RR.toFixed(1)}`; }
      } else if (isOrMap) {
        const orV = av>0 ? op/av : 0;
        td.className = 'heat ' + (av===0&&op===0 ? 'empty' : orV>=1 ? 'orm-red' : orV>=0.7 ? 'orm-amber' : 'orm-green');
        if (av>0) td.textContent = orV.toFixed(2);
      } else {
        const rr = op>0 ? rv/op*100 : 0;
        td.className = 'heat ' + (op===0 ? 'empty' : rr>=70 ? 'rrm-high' : rr>=30 ? 'rrm-mid' : 'rrm-low');
        if (op>0) td.textContent = Math.round(rr)+'%';
      }
      td.addEventListener('mouseenter', () => {
        tooltip.style.display = 'block';
        tooltip.textContent = av===0&&op===0 ? `${tzDisp(h)}: No data`
          : `${tzDisp(h)} total — Opened:${op} | Resolved:${rv} | OR:${av>0?(op/av).toFixed(2):'—'} | Res:${op>0?Math.round(rv/op*100)+'%':'—'} | Staff:${av}`;
      });
      td.addEventListener('mousemove', e => {
        tooltip.style.left = (e.clientX + 12) + 'px';
        tooltip.style.top  = (e.clientY + 12) + 'px';
      });
      td.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
      trTot.appendChild(td);
    }
  } else {
    const totMax = Math.max(...Object.values(hourTotals), 1);
    for (let h = 1; h <= 24; h++) {
      const v = hourTotals[h] || 0;
      const td = document.createElement('td');
      td.className = 'heat' + (v === 0 ? ' empty' : '');
      if (v > 0) {
        td.style.background = getColor(v, totMax);
        td.style.color = getTextColor(v, totMax);
        td.textContent = v;
      }
      td.addEventListener('mouseenter', () => {
        tooltip.style.display = 'block';
        tooltip.textContent = isAvail
          ? `${tzDisp(h)} total: ${v} staff-hours`
          : `${tzDisp(h)} total: ${v} cases`;
      });
      td.addEventListener('mousemove', e => {
        tooltip.style.left = (e.clientX + 12) + 'px';
        tooltip.style.top  = (e.clientY + 12) + 'px';
      });
      td.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
      trTot.appendChild(td);
    }
  }
  tbody.appendChild(trTot);

  // ── Group breakdown (All view only) ────────────────────────────────────
  if (isAllGroups() && !needsRatio) {
    const trHdr = document.createElement('tr');
    trHdr.className = 'grp-breakdown-hdr';
    const tdHdr = document.createElement('td');
    tdHdr.colSpan = 26;
    tdHdr.textContent = 'Click a group row to zoom in ↓';
    trHdr.appendChild(tdHdr);
    tbody.appendChild(trHdr);

    const shortName = g => g.replace('Netrio - ', '').replace(' [AgioNow]', '');

    for (const grp of GROUPS) {
      const gSrc = isAvail ? (AVAIL[grp] || {}) : (DATA[currentType][grp] || {});
      const hourCounts = {};
      let gTotal = 0;
      DATES.forEach(({ key }) => {
        const d = gSrc[key] || {};
        for (let h = 1; h <= 24; h++) {
          const v = isAvail ? (d[h] || 0) : (d[String(h)] || 0);
          hourCounts[h] = (hourCounts[h] || 0) + v;
          gTotal += v;
        }
      });

      const trG = document.createElement('tr');
      trG.className = 'grp-filter-row';
      trG.title = `Click to filter to ${grp}`;

      const tdName = document.createElement('td');
      tdName.className = 'grp-filter-name';
      tdName.colSpan = 2;
      tdName.textContent = shortName(grp);
      trG.appendChild(tdName);

      const gMax = Math.max(...Object.values(hourCounts), 1);
      for (let h = 1; h <= 24; h++) {
        const v = hourCounts[h] || 0;
        const td = document.createElement('td');
        td.className = 'heat grp-filter-bar' + (v === 0 ? ' empty' : '');
        if (v > 0) {
          td.style.background = getColor(v, gMax);
          td.style.color = getTextColor(v, gMax);
          td.textContent = v;
        }
        trG.appendChild(td);
      }

      trG.addEventListener('click', () => setGroup(grp));

      tbody.appendChild(trG);
    }
  }
}

const GROUPS = [
  'Netrio - Help Desk [AgioNow]',
  'Netrio - Help Desk Technical Support [AgioNow]',
  'Netrio - End User Engineering [AgioNow]',
  'Netrio - Endpoint Experience [AgioNow]'
];

function showDetailModal(date, hour, label, day) {
  const isAvail = currentType === 'avail';
  const groups = isAllGroups() ? GROUPS : selectedGroups;
  const modeLabel = isAvail ? 'Staff on Shift' : 'Cases Resolved';

  let html = `<div class="modal-header"><span>${label} &middot; ${day} &middot; ${tzDisp(hour)} &mdash; ${modeLabel}</span><button onclick="closeModal()">&#x2715;</button></div>`;

  for (const grp of groups) {
    if (groups.length > 1) {
      html += `<div class="modal-group-header">${grp}</div>`;
    }
    if (isAvail) {
      const names = ((STAFF_DETAIL[grp] || {})[date] || {})[hour] || [];
      if (names.length > 0) {
        html += names.map(n => `<div class="modal-analyst">${n}</div>`).join('');
      } else {
        html += `<div class="modal-empty">No staff on shift</div>`;
      }
    } else {
      const analystMap = ((RESOLVED_BY[grp] || {})[date] || {})[hour] || {};
      const entries = Object.entries(analystMap).sort((a, b) => b[1] - a[1]);
      if (entries.length > 0) {
        html += entries.map(([name, count]) => `<div class="modal-analyst">${name}: <strong>${count}</strong></div>`).join('');
      } else {
        html += `<div class="modal-empty">No resolutions recorded</div>`;
      }
    }
  }

  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

function showCellDetail(dateKey, hour, label, day) {
  const allOpened   = mergeGroupData(DATA['opened']);
  const allResolved = mergeGroupData(DATA['resolved']);
  const allAvail    = mergeGroupData(AVAIL);
  const dO = allOpened[dateKey]   || {};
  const dR = allResolved[dateKey] || {};
  const dA = allAvail[dateKey]    || {};
  const op = dO[String(hour)] || 0;
  const rv = dR[String(hour)] || 0;
  const av = dA[hour] || 0;
  const orV  = av > 0 ? op / av : null;
  const rrPct = op > 0 ? Math.round(rv / op * 100) : null;
  const orColor = orV === null ? '#6b7a8d' : orV >= 1 ? '#e74c3c' : orV >= 0.7 ? '#FBA832' : '#2ecc71';
  const kpi = (val, lbl, color) =>
    `<div class="cdkpi"><div class="cdkpi-val" style="${color?'color:'+color:''}">${val}</div><div class="cdkpi-lbl">${lbl}</div></div>`;
  const html = `
    <div class="cd-title">
      <span>📍 ${label} &middot; ${day} &middot; ${tzDisp(hour)}</span>
      <span class="cd-close" onclick="document.getElementById('cell-detail-wrap').style.display='none'">✕</span>
    </div>
    <div class="cdkpi-grid">
      ${kpi(op.toLocaleString(), 'Cases Opened')}
      ${kpi(rv.toLocaleString(), 'Cases Resolved')}
      ${kpi(rrPct !== null ? rrPct + '%' : '—', 'Resolution Rate')}
      ${kpi(orV !== null ? orV.toFixed(2) : '—', 'Occupancy Ratio', orColor)}
      ${kpi(av, 'Staff Slots')}
    </div>`;
  document.getElementById('cell-detail').innerHTML = html;
  const wrap = document.getElementById('cell-detail-wrap');
  wrap.style.display = '';
  setTimeout(() => wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 60);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Upload helpers ────────────────────────────────────────────────────────
function setUploadState(which, state, text) {
  const id = which === 'xlsx' ? 'Xlsx' : 'Pdf';
  document.getElementById('up' + id + 'Label').className = 'upload-label ' + state;
  document.getElementById('up' + id + 'Text').textContent = text;
}

// ── Excel upload (ServiceNow data) ────────────────────────────────────────
document.getElementById('upXlsx').addEventListener('change', function(e) {
  const file = e.target.files[0]; if (!file) return;
  setUploadState('xlsx', 'loading', 'Parsing…');
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(ev.target.result, {type:'array', cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      const r = parseServiceNowRows(rows);
      setUploadState('xlsx', 'success', `✓ ${r.opened} opened · ${r.resolved} resolved`);
      render();
    } catch(err) {
      setUploadState('xlsx', 'error', '✗ ' + err.message.slice(0,50));
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
});

function parseServiceNowRows(rows) {
  if (!rows.length) throw new Error('Empty spreadsheet');
  const cols = Object.keys(rows[0]);
  const findCol = (...terms) => cols.find(c => terms.some(t => c.toLowerCase().includes(t.toLowerCase())));
  const openedCol = findCol('opened at','opened_at','open date','open_at','sys_created','opened','created');
  // Prioritise datetime columns; explicitly exclude person/note columns (resolved by, resolver, notes)
  const resolvedCol = findCol('resolved at','resolved_at','resolve date','closed at','closed_at','resolve_at','resolution date')
    || cols.find(c => {
         const lc = c.toLowerCase();
         return (lc.includes('resolved') || lc.includes('closed') || lc.includes('resolve'))
           && !lc.includes('by') && !lc.includes('note') && !lc.includes('comment') && !lc.includes('code') && !lc.includes('reason');
       });
  const groupCol = findCol('assignment group','assignment_group','group','team','queue');
  if (!openedCol) throw new Error('Cannot find Opened column');
  console.log('[upload] cols:', cols.join(' | '));
  console.log('[upload] openedCol:', openedCol, '| resolvedCol:', resolvedCol, '| groupCol:', groupCol);

  const GROUP_MAP = {
    'netrio - help desk [agionow]':                   'Netrio - Help Desk [AgioNow]',
    'netrio - help desk technical support [agionow]': 'Netrio - Help Desk Technical Support [AgioNow]',
    'netrio - end user engineering [agionow]':        'Netrio - End User Engineering [AgioNow]',
    'netrio - endpoint experience [agionow]':         'Netrio - Endpoint Experience [AgioNow]',
  };

  function parseDT(val) {
    // Times in the file are already ET — parse as-is, no offset conversion
    if (val == null || val === '') return null;
    let dateKey = '', hour = -1;
    if (val instanceof Date) {
      // SheetJS with cellDates:true stores the raw cell time as UTC values
      dateKey = `${val.getUTCFullYear()}-${String(val.getUTCMonth()+1).padStart(2,'0')}-${String(val.getUTCDate()).padStart(2,'0')}`;
      hour = val.getUTCHours();
    } else if (typeof val === 'number') {
      const d = new Date(Math.round((val - 25569) * 86400000));
      dateKey = d.toISOString().slice(0,10);
      hour = d.getUTCHours();
    } else {
      const s = String(val);
      let m = s.match(/^(\d{4})-(\d{2})-(\d{2})[T ]\s*(\d{1,2}):/);
      if (m) { dateKey=`${m[1]}-${m[2]}-${m[3]}`; hour=parseInt(m[4]); }
      else {
        m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{1,2}):/);
        if (m) { dateKey=`${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`; hour=parseInt(m[4]); }
      }
    }
    if (!dateKey || hour < 0) return null;
    return { dateKey, hourKey: String(hour + 1) }; // 1-based key
  }

  function inc(obj, grp, date, hour) {
    if (!obj[grp]) obj[grp] = {};
    if (!obj[grp][date]) obj[grp][date] = {};
    obj[grp][date][hour] = (obj[grp][date][hour]||0) + 1;
  }

  let cntO = 0, cntR = 0;
  const newOpened = {}, newResolved = {};

  for (const row of rows) {
    const rawGroup = String(row[groupCol]||'').trim();
    const grp = GROUP_MAP[rawGroup.toLowerCase()] || rawGroup;

    const op = parseDT(row[openedCol]);
    if (op) { inc(newOpened,'All',op.dateKey,op.hourKey); inc(newOpened,grp,op.dateKey,op.hourKey); cntO++; }

    if (resolvedCol) {
      const rv = parseDT(row[resolvedCol]);
      if (rv) { inc(newResolved,'All',rv.dateKey,rv.hourKey); inc(newResolved,grp,rv.dateKey,rv.hourKey); cntR++; }
    }
  }

  // Merge into DATA — replace affected dates per group
  for (const [g, dates] of Object.entries(newOpened)) {
    if (!DATA.opened[g]) DATA.opened[g] = {};
    Object.assign(DATA.opened[g], dates);
  }
  for (const [g, dates] of Object.entries(newResolved)) {
    if (!DATA.resolved[g]) DATA.resolved[g] = {};
    Object.assign(DATA.resolved[g], dates);
  }

  // Persist delta so it survives refresh
  try {
    const stored = JSON.parse(localStorage.getItem('hm_excel') || '{"opened":{},"resolved":{}}');
    for (const [g, dates] of Object.entries(newOpened)) {
      if (!stored.opened[g]) stored.opened[g] = {};
      Object.assign(stored.opened[g], dates);
    }
    for (const [g, dates] of Object.entries(newResolved)) {
      if (!stored.resolved[g]) stored.resolved[g] = {};
      Object.assign(stored.resolved[g], dates);
    }
    localStorage.setItem('hm_excel', JSON.stringify(stored));
  } catch(e) { console.warn('localStorage save failed:', e); }

  return {opened:cntO, resolved:cntR};
}

function shiftToHours(text) {
  text = text.trim();
  if (/^(PTO|Sick|Off|OT|O\/T|Overtime|Training|Comp|Holiday|Moving|Day off|DELETED|\d+\.?\d*\s*Hrs?|Mon|Tue|Wed|Thu|Fri|Sat|Sun|June|July|Aug|Week:|NYC|Help|End User|Centiva|Endpoint|Technical|On.?[Ss]ite|Regional|Open shift)/i.test(text)) return null;
  for (const [pat, hrs] of SHIFT_TO_HOURS) {
    if (pat.test(text)) return hrs;
  }
  // Generic HH AM/PM - HH AM/PM
  const m = text.match(/(\d{1,2})(?::(\d{2}))?\s*(AM|PM)\s*[-–]\s*(\d{1,2})(?::(\d{2}))?\s*(AM|PM)/i);
  if (m) {
    let sh = parseInt(m[1]), eh = parseInt(m[4]);
    if (m[3].toUpperCase()==='PM' && sh!==12 && sh<12) sh+=12;
    if (m[3].toUpperCase()==='AM' && sh===12) sh=0;
    if (m[6].toUpperCase()==='PM' && eh!==12 && eh<13) eh+=12;
    if (m[6].toUpperCase()==='AM' && eh===12) eh=0;
    const hrs=[]; let h=sh, safety=0;
    while (h!==eh && safety++<25) { hrs.push((h%24)+1); h=(h+1)%24; }
    return hrs.length ? hrs : null;
  }
  return null;
}

function availInc(target, grp, dateKey, hourKey) {
  const hk = String(hourKey);
  if (!target['All']) target['All']={};
  if (!target['All'][dateKey]) target['All'][dateKey]={};
  target['All'][dateKey][hk] = (target['All'][dateKey][hk]||0)+1;
  if (!target[grp]) target[grp]={};
  if (!target[grp][dateKey]) target[grp][dateKey]={};
  target[grp][dateKey][hk] = (target[grp][dateKey][hk]||0)+1;
}

function addShift(person, dateKey, hours, target) {
  if (DELETED_STAFF.has(person)) return;
  const grp = PERSON_GROUP[person]; if (!grp) return;
  const [y,mo,d] = dateKey.split('-').map(Number);
  for (const hk of hours) {
    if (typeof hk === 'string' && hk.startsWith('n')) {
      const nextH = parseInt(hk.slice(1));
      const nd = new Date(y, mo-1, d+1);
      const ndk = nd.toISOString().slice(0,10);
      availInc(target, grp, ndk, nextH);
    } else {
      availInc(target, grp, dateKey, hk);
    }
  }
}

async function parseRosterPDF(arrayBuffer) {
  if (typeof pdfjsLib === 'undefined') throw new Error('PDF.js library not loaded');
  const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
  console.log(`[PDF] ${pdf.numPages} page(s)`);
  let pagesParsed = 0, totalSlots = 0;
  const tempAvail = {};

  for (let pn = 1; pn <= pdf.numPages; pn++) {
    const page = await pdf.getPage(pn);
    const tc = await page.getTextContent();

    const items = tc.items
      .filter(it => it.str && it.str.trim().length)
      .map(it => ({str: it.str.trim(), x: Math.round(it.transform[4]), y: Math.round(it.transform[5])}))
      .sort((a,b) => b.y - a.y || a.x - b.x);

    if (!items.length) continue;

    // Log first page items for debugging
    if (pn === 1) console.log(`[PDF p1] items:`, items.slice(0,40).map(i=>`"${i.str}"@(${i.x},${i.y})`).join(' '));

    // Group items into rows (±8px y-tolerance)
    const rows = [];
    for (const item of items) {
      const row = rows.find(r => Math.abs(r.y - item.y) <= 8);
      if (row) row.items.push(item);
      else rows.push({y: item.y, items:[item]});
    }
    rows.forEach(r => r.items.sort((a,b) => a.x - b.x));

    // Find row containing >= 3 day-name words (handles "21 Mon" combined items)
    let headerRow = null, weekDates = [], year = 2026, month = 6;
    for (const row of rows) {
      const combined = row.items.map(i=>i.str).join(' ');
      if ((combined.match(/\b(Mon|Tue|Wed|Thu|Fri|Sat|Sun)\b/gi)||[]).length >= 3) { headerRow = row; break; }
    }

    // Find year/month from any row on this page
    for (const row of rows) {
      const full = row.items.map(i=>i.str).join(' ');
      const mm = full.match(/(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\w*\s+(\d{4})/i);
      if (mm) {
        year = parseInt(mm[2]);
        month = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12}[mm[1].toLowerCase().slice(0,3)];
        break;
      }
    }

    if (!headerRow) { console.log(`[PDF p${pn}] no day-header → skip`); continue; }

    // Parse header items left-to-right to extract day columns and their calendar dates.
    // Format: "DD [HH] DayName DD [HH] DayName ..."  (DD=date 1-31, HH=headcount)
    // Items may be split ("27","21","Mon") or combined ("21 Mon" or "27 21 Mon").
    const DAY_WORD = /\b(Mon|Tue|Wed|Thu|Fri|Sat|Sun)\b/i;
    const colItems = []; // {x, str (day abbrev), dateNum}
    let pendingNums = [];
    for (const item of headerRow.items) {
      const dm = item.str.match(DAY_WORD);
      if (dm) {
        const inline = [...item.str.matchAll(/\b(\d{1,2})\b/g)].map(m=>+m[1]).filter(n=>n>=1&&n<=31);
        const all = [...pendingNums, ...inline];
        colItems.push({x: item.x, str: dm[1], dateNum: all.length ? all[0] : null});
        pendingNums = [];
      } else {
        pendingNums.push(...[...item.str.matchAll(/\b(\d{1,2})\b/g)].map(m=>+m[1]).filter(n=>n>=1&&n<=31));
      }
    }
    weekDates = colItems.map(c=>c.dateNum).filter(n=>n!=null);

    // Fallback: dates may be in a separate row just above the header (different y-band).
    // In Teams Shifts PDFs, dates (y=740) and day names (y=731) are ~9px apart — just outside
    // the 8px row-grouping tolerance — so they land in separate rows. Use x-proximity to match.
    if (weekDates.length < 3) {
      const nearNums = rows
        .filter(r => r !== headerRow && Math.abs(r.y - headerRow.y) <= 25)
        .flatMap(r => r.items)
        .filter(i => /^\d{1,2}$/.test(i.str) && +i.str >= 1 && +i.str <= 31);
      colItems.forEach(col => {
        if (col.dateNum != null) return;
        const byX = nearNums.slice().sort((a,b) => Math.abs(a.x-col.x) - Math.abs(b.x-col.x));
        if (byX.length) col.dateNum = +byX[0].str;
      });
      weekDates = colItems.map(c=>c.dateNum).filter(n=>n!=null);
    }

    console.log(`[PDF p${pn}] ${month}/${year} cols=[${colItems.map(c=>c.str)}] dates=[${weekDates}]`);
    if (weekDates.length < 3) { console.log(`[PDF p${pn}] too few dates → skip`); continue; }

    // Column x-bounds for mapping shift items to dates
    const colBounds = colItems.map((ci, idx) => ({
      x0: idx===0 ? 0 : Math.floor((colItems[idx-1].x + ci.x)/2),
      x1: idx===colItems.length-1 ? 9999 : Math.floor((ci.x + colItems[idx+1].x)/2),
    }));
    function dayIdxOf(x) { return colBounds.findIndex(b => x>=b.x0 && x<b.x1); }

    // Precompute date keys — count ALL previous rollovers so Sat/Sun after a month-boundary
    // week (e.g. Apr30→May1) get the correct month, not just the base month.
    const dateKeys = weekDates.map((d, dayIdx) => {
      let m = month, y = year;
      for (let i = 1; i <= dayIdx; i++) {
        if (weekDates[i] < weekDates[i-1]) { m++; if (m>12){m=1;y++;} }
      }
      const leap = y%4===0&&(y%100!==0||y%400===0);
      const dMax=[0,31,leap?29:28,31,30,31,30,31,31,30,31,30,31];
      return (d>=1&&d<=dMax[m]) ? `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}` : null;
    });
    function dateKeyFor(dayIdx) { return (dayIdx>=0&&dayIdx<dateKeys.length) ? dateKeys[dayIdx] : null; }

    // Walk rows below header: identify person name rows then their shift rows
    const belowHeader = rows.filter(r => r.y < headerRow.y - 8);
    const KNOWN_NAMES = Object.keys(PERSON_GROUP);
    let curPerson = null;
    let pageShifts = 0;

    for (const row of belowHeader) {
      const rowText = row.items.map(i=>i.str).join(' ');

      // "(DELETED)" on the hours row → mark person as deleted
      if (/\(DELETED\)/i.test(rowText)) { curPerson = null; continue; }

      // Exact name match, then fuzzy first+last word fallback
      let matched = null;
      for (const name of KNOWN_NAMES) {
        const parts = name.split(' ');
        const startItems = row.items.slice(0, parts.length).map(i=>i.str).join(' ');
        if (startItems === name || rowText === name || rowText.startsWith(name + ' ')) { matched = name; break; }
      }
      if (!matched) {
        const rowWords = row.items.map(i=>i.str);
        for (const name of KNOWN_NAMES) {
          const parts = name.split(' ');
          if (parts.length < 2) continue;
          if (rowWords[0] === parts[0] && rowWords.some(w => w === parts[parts.length-1])) { matched = name; break; }
        }
      }

      if (matched) {
        curPerson = DELETED_STAFF.has(matched) ? null : matched;
        if (curPerson) console.log(`[PDF p${pn}] person: ${curPerson} → ${PERSON_GROUP[curPerson]}`);
      } else if (row.items.length >= 2 && /^[A-Z]/.test(row.items[0].str) && row.items.some(i => /^[A-Z][a-z]/.test(i.str))) {
        const candidate = row.items.slice(0, 3).map(i => i.str).join(' ');
        if (!/^\d|^(Mon|Tue|Wed|Thu|Fri|Sat|Sun|Week|Help|End|Endpoint|Technical|Netrio)/i.test(candidate)) {
          console.log(`[PDF p${pn}] UNRECOGNIZED NAME candidate: "${candidate}" — add to PERSON_GROUP if real`);
        }
      }
      if (!curPerson) continue;

      const skipCount = matched ? curPerson.split(' ').length : 0;
      for (const item of row.items.slice(skipCount)) {
        const hrs = shiftToHours(item.str);
        if (!hrs) continue;
        const di = dayIdxOf(item.x);
        const dk = dateKeyFor(di);
        if (dk) { addShift(curPerson, dk, hrs, tempAvail); pageShifts++; }
        else console.log(`[PDF p${pn}] shift "${item.str}" x=${item.x} → col=${di} → no date`);
      }
    }
    console.log(`[PDF p${pn}] ${pageShifts} shift-slots`);
    if (pageShifts > 0) pagesParsed++;
    totalSlots += pageShifts;
  }

  // Merge tempAvail into AVAIL (only replace affected dates)
  const affectedDates = new Set(Object.values(tempAvail).flatMap(d => Object.keys(d)));
  for (const grp of Object.keys(AVAIL)) {
    for (const dk of affectedDates) { if (AVAIL[grp][dk]) delete AVAIL[grp][dk]; }
  }
  for (const [grp, dates] of Object.entries(tempAvail)) {
    if (!AVAIL[grp]) AVAIL[grp] = {};
    for (const [dk, hours] of Object.entries(dates)) AVAIL[grp][dk] = hours;
  }

  // Persist to localStorage
  try {
    const stored = JSON.parse(localStorage.getItem('hm_avail') || '{}');
    for (const grp of Object.keys(stored)) {
      for (const dk of affectedDates) { if (stored[grp][dk]) delete stored[grp][dk]; }
    }
    for (const [grp, dates] of Object.entries(tempAvail)) {
      if (!stored[grp]) stored[grp] = {};
      Object.assign(stored[grp], dates);
    }
    localStorage.setItem('hm_avail', JSON.stringify(stored));
  } catch(e) { console.warn('localStorage avail save failed:', e); }

  console.log(`[PDF] done: ${pagesParsed} pages parsed, ${totalSlots} staff-hour slots across ${affectedDates.size} dates`);
  return {pages: pagesParsed, slots: totalSlots};
}

function restoreUploads() {
  try {
    const excel = JSON.parse(localStorage.getItem('hm_excel') || 'null');
    if (excel) {
      for (const [g, dates] of Object.entries(excel.opened || {})) {
        if (!DATA.opened[g]) DATA.opened[g] = {};
        Object.assign(DATA.opened[g], dates);
      }
      for (const [g, dates] of Object.entries(excel.resolved || {})) {
        if (!DATA.resolved[g]) DATA.resolved[g] = {};
        Object.assign(DATA.resolved[g], dates);
      }
    }
  } catch(e) { console.warn('localStorage excel restore failed:', e); }

  try {
    const avail = JSON.parse(localStorage.getItem('hm_avail') || 'null');
    if (avail) {
      for (const [grp, dates] of Object.entries(avail)) {
        if (!AVAIL[grp]) AVAIL[grp] = {};
        Object.assign(AVAIL[grp], dates);
      }
    }
  } catch(e) { console.warn('localStorage avail restore failed:', e); }
}

// ── Dark mode ─────────────────────────────────────────────────────────────
let isDark = localStorage.getItem('hm_dark') === '1';
function applyDark() {
  document.body.classList.toggle('dark', isDark);
  document.getElementById('darkToggle').textContent = isDark ? '☀️ Light' : '🌙 Dark';
}
function toggleDark() {
  isDark = !isDark;
  localStorage.setItem('hm_dark', isDark ? '1' : '0');
  applyDark();
}
applyDark();

restoreUploads();
render();
</script>
</body>
