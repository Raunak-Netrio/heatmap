<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cases Heatmap – 2026 Year to Date</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; }

  h2 { text-align: center; margin-bottom: 5px; font-size: 16px; color: #222; }
  p.subtitle { text-align: center; font-size: 11px; color: #666; margin-bottom: 14px; }

  /* Filters */
  .filters {
    display: flex; gap: 24px; align-items: center; justify-content: center;
    margin-bottom: 16px; flex-wrap: wrap;
  }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-group label { font-size: 11px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: .4px; }
  .filter-group select, .filter-group .btn-group { font-size: 12px; }

  .btn-group { display: flex; border-radius: 6px; overflow: hidden; border: 1px solid #bbb; }
  .btn-group button {
    padding: 5px 14px; border: none; background: #fff; cursor: pointer;
    font-size: 12px; color: #444; transition: background .15s, color .15s;
  }
  .btn-group button:not(:last-child) { border-right: 1px solid #bbb; }
  .btn-group button.active { background: #2c3e50; color: #fff; font-weight: 600; }
  .btn-group button:hover:not(.active) { background: #eee; }

  select {
    padding: 5px 10px; border: 1px solid #bbb; border-radius: 6px;
    background: #fff; color: #333; cursor: pointer; min-width: 240px;
  }

  /* Scroll */
  .scroll-wrap { overflow: auto; max-height: calc(100vh - 220px); }

  table {
    border-collapse: collapse; font-size: 11px;
    white-space: nowrap; background: #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,.12);
    width: 100%; table-layout: fixed;
  }

  th, td { border: 1px solid #d0d0d0; text-align: center; padding: 0; }

  thead th {
    background: #2c3e50; color: #fff; font-weight: 600; padding: 5px 4px;
  }
  thead th.group-header { font-size: 12px; letter-spacing: .5px; }

  td.day-cell {
    background: #34495e; color: #ecf0f1; font-weight: 600;
    padding: 4px 8px; text-align: left; min-width: 78px;
  }
  td.date-cell {
    background: #34495e; color: #bdc3c7; min-width: 58px;
    padding: 4px 6px; font-size: 10.5px;
  }

  td.heat {
    width: 32px; min-width: 32px; height: 26px;
    font-size: 10px; font-weight: 600; cursor: default;
    transition: opacity .12s;
  }
  td.heat:hover { outline: 2px solid #2c3e50; z-index: 1; position: relative; }
  td.heat.empty { background: #f0f0f0; }

  tr.weekend td.day-cell,
  tr.weekend td.date-cell { background: #4a235a; color: #e8daef; }

  /* Summary row */
  tr.summary-row td { background: #ecf0f1; font-weight: 700; font-size: 10px; color: #2c3e50; }
  tr.summary-row td.day-cell, tr.summary-row td.date-cell { background: #2c3e50; color: #ecf0f1; }

  /* Legend */
  .legend { display: flex; align-items: center; gap: 6px; margin: 14px auto 0; width: max-content; font-size: 11px; color: #444; }
  .legend-bar { display: flex; gap: 2px; }
  .legend-swatch { width: 22px; height: 14px; border-radius: 2px; }

  /* Totals badge */
  .totals-bar {
    display: flex; gap: 20px; justify-content: center;
    margin-bottom: 12px; flex-wrap: wrap;
  }
  .total-badge {
    background: #2c3e50; color: #fff; border-radius: 8px;
    padding: 5px 14px; font-size: 12px; font-weight: 600;
  }
  .total-badge span { opacity: .75; font-weight: 400; }

  /* Tooltip */
  #tooltip {
    position: fixed; background: rgba(0,0,0,.82); color: #fff;
    padding: 5px 9px; border-radius: 4px; font-size: 11px;
    pointer-events: none; display: none; z-index: 999;
  }

  /* Modal */
  #modal {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.5); z-index: 1000;
    align-items: center; justify-content: center;
  }
  #modalBox {
    background: #fff; border-radius: 8px; padding: 20px;
    max-width: 520px; width: 92%; max-height: 80vh;
    overflow-y: auto; box-shadow: 0 4px 24px rgba(0,0,0,.35);
  }
  .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    font-weight: 700; margin-bottom: 14px; font-size: 13px;
    padding-bottom: 10px; border-bottom: 2px solid #2c3e50; color: #2c3e50;
  }
  .modal-header button {
    background: none; border: none; cursor: pointer;
    font-size: 18px; color: #888; line-height: 1;
  }
  .modal-header button:hover { color: #333; }
  .modal-group-header {
    font-weight: 700; color: #2171b5; margin: 14px 0 6px;
    font-size: 12px; letter-spacing: .3px;
    border-bottom: 1px solid #cde; padding-bottom: 4px;
  }
  .modal-analyst {
    padding: 3px 6px; font-size: 12px; color: #333;
    border-bottom: 1px solid #f0f0f0;
  }
  .modal-analyst:last-child { border-bottom: none; }
  .modal-empty { color: #aaa; font-style: italic; font-size: 12px; padding: 4px 6px; }
  td.heat.clickable { cursor: pointer; }
  td.heat.clickable:hover { outline: 2px solid #e74c3c; }

  /* Resolution Ratio tab */
  td.heat.ratio-red  { background: #e74c3c; color: #fff; font-weight: 700; }
  td.heat.ratio-good { background: #eaf7ee; color: #2d6a3f; }
  table.ratio-mode td.heat { min-width: 62px; width: 62px; font-size: 9px; }

  /* Freeze panes */
  td.day-cell  { position: sticky; left: 0;    z-index: 2; }
  td.date-cell { position: sticky; left: 90px; z-index: 2; }
  thead tr:first-child th { position: sticky; top: 0;    z-index: 3; }
  #hourHeader th          { position: sticky; top: 28px; z-index: 3; }
  thead tr:first-child th:first-child { left: 0; z-index: 5; }
  #hourHeader th:nth-child(1) { left: 0;    z-index: 5; }
  #hourHeader th:nth-child(2) { left: 90px; z-index: 5; }

  /* Upload section */
  .upload-section {
    display: flex; gap: 12px; justify-content: center; align-items: center;
    margin-bottom: 10px; flex-wrap: wrap;
  }
  .upload-label {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 16px; border-radius: 6px; border: 2px dashed #bbb;
    background: #f8f9fa; cursor: pointer; font-size: 11px;
    color: #555; transition: all .15s; font-family: Arial, sans-serif;
    white-space: nowrap; user-select: none;
  }
  .upload-label:hover { border-color: #2c3e50; background: #eef0f3; color: #2c3e50; }
  .upload-label.success { border-color: #27ae60; background: #eafaf1; color: #1e8449; border-style: solid; }
  .upload-label.error   { border-color: #e74c3c; background: #fdedec; color: #c0392b; border-style: solid; }
  .upload-label.loading { border-color: #2980b9; background: #eaf3fb; color: #2471a3; border-style: solid; animation: upPulse 1s ease-in-out infinite; }
  @keyframes upPulse { 0%,100%{opacity:1} 50%{opacity:.55} }
  .upload-label input[type=file] { display: none; }

  /* Dark mode toggle */
  #darkToggle {
    position: fixed; top: 12px; right: 16px; z-index: 200;
    background: #2c3e50; color: #ecf0f1; border: none; border-radius: 20px;
    padding: 5px 14px; cursor: pointer; font-size: 12px; font-weight: 600;
    transition: background .2s; box-shadow: 0 1px 4px rgba(0,0,0,.25);
  }
  #darkToggle:hover { background: #3d5166; }

  /* No-data row dimming */
  tr.no-data-row td.day-cell,
  tr.no-data-row td.date-cell { opacity: 0.35; }

  /* Peak cell callout */
  td.heat.peak-cell { outline: 2px solid #f39c12 !important; position: relative; z-index: 1; }
  td.heat.peak-cell::before {
    content: '★'; position: absolute; top: 0; right: 1px;
    font-size: 7px; color: #f39c12; line-height: 1; pointer-events: none;
  }

  /* Group breakdown rows */
  tr.grp-breakdown-hdr td {
    background: #eef; color: #888; font-size: 10px; font-style: italic;
    text-align: center; padding: 3px; border-top: 2px solid #c8c8e0; cursor: default;
  }
  tr.grp-filter-row { cursor: pointer; }
  tr.grp-filter-row:hover td { background: #f0f4f8 !important; }
  td.grp-filter-name {
    background: #34495e !important; color: #ecf0f1 !important;
    font-weight: 700; font-size: 10px; text-align: left; padding: 3px 8px;
  }
  tr.grp-filter-row:hover td.grp-filter-name { background: #3d5166 !important; }
  td.grp-filter-bar {
    background: #f8f9fa; color: #333; font-size: 10px; font-weight: 600; text-align: left; padding: 3px 8px;
  }

  /* ── Dark mode ── */
  body.dark { background: #12121f; color: #dde; }
  body.dark h2 { color: #ecf0f1; }
  body.dark p.subtitle { color: #888; }
  body.dark .filter-group label { color: #999; }
  body.dark .btn-group { border-color: #444; }
  body.dark .btn-group button { background: #1e1e2e; color: #bbb; border-right-color: #444; }
  body.dark .btn-group button.active { background: #3a80d2; color: #fff; }
  body.dark .btn-group button:hover:not(.active) { background: #2a2a3e; }
  body.dark select { background: #1e1e2e; color: #ccc; border-color: #444; }
  body.dark table { background: #1a1a2a; box-shadow: 0 1px 6px rgba(0,0,0,.5); }
  body.dark th, body.dark td { border-color: #333; }
  body.dark thead th { background: #16213e; }
  body.dark td.day-cell { background: #1c2d40; color: #a8bcd0; }
  body.dark td.date-cell { background: #1c2d40; color: #7090a8; }
  body.dark td.heat.empty { background: #1f1f30; }
  body.dark tr.weekend td.day-cell,
  body.dark tr.weekend td.date-cell { background: #2a1535; color: #c0a8d0; }
  body.dark tr.summary-row td { background: #1f1f35; color: #a8c0d8; }
  body.dark tr.summary-row td.day-cell,
  body.dark tr.summary-row td.date-cell { background: #16213e; color: #ecf0f1; }
  body.dark tr.no-data-row td.day-cell,
  body.dark tr.no-data-row td.date-cell { opacity: 0.25; }
  body.dark .total-badge { background: #16213e; }
  body.dark .legend { color: #aaa; }
  body.dark .upload-label { background: #1e1e2e; border-color: #444; color: #888; }
  body.dark .upload-label:hover { background: #252535; border-color: #666; color: #ccc; }
  body.dark .upload-label.success { background: #0d2e1e; border-color: #27ae60; color: #2ecc71; }
  body.dark .upload-label.error { background: #2e0d0d; border-color: #c0392b; color: #e74c3c; }
  body.dark #modal { background: rgba(0,0,0,.7); }
  body.dark #modalBox { background: #1a1a2a; color: #dde; }
  body.dark .modal-header { color: #5a9fff; border-bottom-color: #3a6aaa; }
  body.dark .modal-header button { color: #666; }
  body.dark .modal-header button:hover { color: #ccc; }
  body.dark .modal-group-header { color: #5a9fff; border-bottom-color: #253a5e; }
  body.dark .modal-analyst { color: #bbb; border-bottom-color: #2a2a3a; }
  body.dark .modal-empty { color: #555; }
  body.dark tr.grp-breakdown-hdr td { background: #1c1c30; color: #666; border-top-color: #333; }
  body.dark tr.grp-filter-row:hover td { background: #22223a !important; }
  body.dark td.grp-filter-name { background: #16213e !important; color: #a8c8f0 !important; }
  body.dark tr.grp-filter-row:hover td.grp-filter-name { background: #1e2e50 !important; }
  body.dark td.grp-filter-bar { background: #1a1a2a; color: #aaa; }
  body.dark #darkToggle { background: #3a80d2; }
  body.dark #darkToggle:hover { background: #4a90e2; }
</style>

<div id="modal" onclick="if(event.target===this)closeModal()">
  <div id="modalBox">
    <div id="modalBody"></div>
  </div>
</div>

<button id="darkToggle" onclick="toggleDark()">🌙 Dark</button>
<h2>Cases Heatmap – 2026 Year to Date</h2>
<p class="subtitle">Count of cases per hour (Eastern Time · UTC−4). Hover a cell for details.</p>

<div class="filters">
  <div class="filter-group">
    <label>Date Type</label>
    <div class="btn-group">
      <button id="btnOpened" class="active" onclick="setType('opened')">Opened</button>
      <button id="btnResolved" onclick="setType('resolved')">Resolved</button>
      <button id="btnAvail" onclick="setType('avail')">User Availability</button>
      <button id="btnRatio" onclick="setType('ratio')">Resolution Ratio</button>
    </div>
  </div>
  <div class="filter-group">
    <label>Month</label>
    <select id="monthSelect" onchange="setMonth(this.value)">
      <option value="all">Entire Year</option>
      <option value="1">January</option>
      <option value="2">February</option>
      <option value="3">March</option>
      <option value="4">April</option>
      <option value="5">May</option>
      <option value="6" selected>June</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Assignment Group</label>
    <select id="groupSelect" onchange="setGroup(this.value)">
      <option value="All">All Groups</option>
      <option value="Netrio - End User Engineering [AgioNow]">Netrio - End User Engineering</option>
      <option value="Netrio - Endpoint Experience [AgioNow]">Netrio - Endpoint Experience</option>
      <option value="Netrio - Help Desk [AgioNow]">Netrio - Help Desk</option>
      <option value="Netrio - Help Desk Technical Support [AgioNow]">Netrio - Help Desk Technical Support</option>
    </select>
  </div>
</div>

<div class="upload-section">
  <label class="upload-label" id="upXlsxLabel">
    <span>📊</span><span id="upXlsxText">Upload ServiceNow Data (.xlsx)</span>
    <input type="file" id="upXlsx" accept=".xlsx,.xls,.csv">
  </label>
  <label class="upload-label" id="upPdfLabel">
    <span>📋</span><span id="upPdfText">Upload Roster Schedule (.pdf)</span>
    <input type="file" id="upPdf" accept=".pdf" multiple>
  </label>
</div>

<div class="totals-bar">
  <div class="total-badge"><span id="totalLabel">Total Cases: </span><span id="totalCount">—</span></div>
  <div class="total-badge"><span id="peakHourLabel">Peak Hour: </span><span id="peakHour">—</span></div>
  <div class="total-badge"><span id="peakDayLabel">Peak Day: </span><span id="peakDay">—</span></div>
</div>

<div class="scroll-wrap">
<table id="heatTable">
  <colgroup>
    <col style="width:90px">
    <col style="width:60px">
  </colgroup>
  <thead>
    <tr>
      <th class="group-header" colspan="2">Date</th>
      <th class="group-header" colspan="24">Hour (EST)</th>
    </tr>
    <tr id="hourHeader">
      <th>Day</th>
      <th>Date</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
</div>

<div class="legend">
  <span>0</span>
  <div class="legend-bar" id="legendBar"></div>
  <span id="legendMax">—</span>
</div>

<div id="tooltip"></div>

const DAY_NAMES = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
function buildDates(month) {
  const MONTH_DAYS = [0,31,28,31,30,31,30];
  const SHORT_MONTHS = ['','Jan','Feb','Mar','Apr','May','Jun'];
  const months = month === 'all' ? [1,2,3,4,5,6] : [parseInt(month)];
  const result = [];
  for (const m of months) {
    for (let d = 1; d <= MONTH_DAYS[m]; d++) {
      const date = new Date(2026, m-1, d);
      const dow = (date.getDay() + 6) % 7;
      result.push({
        day: DAY_NAMES[dow],
        label: `${d}-${SHORT_MONTHS[m]}`,
        key: `2026-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`,
        isWeekend: dow >= 5
      });
    }
  }
  return result;
}
let DATES = buildDates('6');
const PALETTE_BLUE  = ['#eaf3fb','#aed4f0','#5ba3d9','#2171b5','#084594'];
const PALETTE_GREEN = ['#eaf7ee','#a8ddb5','#41ab5d','#238b45','#00441b'];
let PALETTE = PALETTE_BLUE;

function getColor(count, max) {
  if (!count || !max) return null;
  const idx = Math.min(Math.floor((count / max) * PALETTE.length), PALETTE.length - 1);
  return PALETTE[idx];
}
function getTextColor(count, max) {
  return (count / max) > 0.45 ? '#fff' : '#1a1a1a';
}

}

// ── Render ────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function render() {
  const isAvail = currentType === 'avail';
  const isRatio = currentType === 'ratio';

  document.getElementById('heatTable').classList.toggle('ratio-mode', isRatio);

  // Data sources
  const groupData    = (!isRatio && !isAvail) ? (DATA[currentType][currentGroup] || {}) : null;
  const availForCalc = (isRatio || isAvail)   ? (AVAIL[currentGroup] || {}) : null;
  const openedData   = isRatio ? (DATA['opened'][currentGroup]   || {}) : null;
  const resolvedData = isRatio ? (DATA['resolved'][currentGroup] || {}) : null;

  // ── First pass: stats ───────────────────────────────────────────────────
  let globalMax = 1;
  const hourTotals = {}, dayTotals = {};
  let peakDayKey = null, peakDayVal = 0;
  let peakHourKey = null, peakHourVal = 0;
  let grandTotal = 0;
  const emptyDates = new Set();
  let peakCellKey = null, peakCellH = 0, peakCellVal = 0;

  // Ratio accumulators
  const hrOp = {}, hrRv = {}, hrAv = {};
  const dyOp = {}, dyAv = {};
  let totOp = 0, totRv = 0, totAv = 0;

  DATES.forEach(({ key }) => {
    if (isRatio) {
      const dO = openedData[key]   || {};
      const dR = resolvedData[key] || {};
      const dA = availForCalc[key] || {};
      let op = 0, av = 0;
      for (let h = 1; h <= 24; h++) {
        const o = dO[String(h)] || 0;
        const r = dR[String(h)] || 0;
        const a = dA[h] || 0;
        hrOp[h] = (hrOp[h] || 0) + o;
        hrRv[h] = (hrRv[h] || 0) + r;
        hrAv[h] = (hrAv[h] || 0) + a;
        op += o; av += a;
        totOp += o; totRv += r; totAv += a;
      }
      dyOp[key] = op; dyAv[key] = av;
    } else {
      const d = isAvail ? (availForCalc[key] || {}) : (groupData[key] || {});
      let daySum = 0;
      for (let h = 1; h <= 24; h++) {
        const v = d[String(h)] || 0;
        if (v > globalMax) globalMax = v;
        if (v > peakCellVal) { peakCellVal = v; peakCellKey = key; peakCellH = h; }
        hourTotals[h] = (hourTotals[h] || 0) + v;
        if (hourTotals[h] > peakHourVal) { peakHourVal = hourTotals[h]; peakHourKey = String(h); }
        daySum += v;
      }
      dayTotals[key] = daySum;
      grandTotal += daySum;
      if (daySum > peakDayVal) { peakDayVal = daySum; peakDayKey = key; }
      if (daySum === 0) emptyDates.add(key);
    }
  });

  document.getElementById('legendMax').textContent = isRatio ? '' : `max: ${globalMax}`;

  // ── Stats badges ────────────────────────────────────────────────────────
  if (isRatio) {
    const oOR = totAv > 0 ? (totOp / totAv).toFixed(2) : '—';
    const oRR = totAv > 0 ? (totRv / totAv).toFixed(2) : '—';
    document.getElementById('totalLabel').textContent = 'Overall OR | RR: ';
    document.getElementById('totalCount').textContent = totAv > 0 ? `${oOR} | ${oRR}` : '—';

    let bestH = null, bestHOR = 0;
    for (let h = 1; h <= 24; h++) {
      const a = hrAv[h] || 0;
      if (a > 0) { const or = hrOp[h] / a; if (or > bestHOR) { bestHOR = or; bestH = h; } }
    }
    document.getElementById('peakHourLabel').textContent = 'Peak Load Hour: ';
    document.getElementById('peakHour').textContent = bestH ? `Hour ${bestH - 1} (OR ${bestHOR.toFixed(2)})` : '—';

    let bestDK = null, bestDOR = 0;
    DATES.forEach(({ key }) => {
      const a = dyAv[key] || 0;
      if (a > 0) { const or = dyOp[key] / a; if (or > bestDOR) { bestDOR = or; bestDK = key; } }
    });
    const bestDObj = bestDK ? DATES.find(d => d.key === bestDK) : null;
    document.getElementById('peakDayLabel').textContent = 'Highest OR Day: ';
    document.getElementById('peakDay').textContent = bestDObj ? `${bestDObj.label} (${bestDOR.toFixed(2)})` : '—';
  } else {
    const peakDayObj = peakDayKey ? DATES.find(d => d.key === peakDayKey) : null;
    document.getElementById('totalCount').textContent = grandTotal.toLocaleString();
    document.getElementById('totalLabel').textContent  = isAvail ? 'Staff-Hours: ' : 'Total Cases: ';
    document.getElementById('peakHour').textContent   = peakHourKey && peakHourVal > 0 ? `Hour ${parseInt(peakHourKey) - 1} (${peakHourVal})` : '—';
    document.getElementById('peakHourLabel').textContent = isAvail ? 'Busiest Hour: ' : 'Peak Hour: ';
    document.getElementById('peakDay').textContent    = peakDayObj && peakDayVal > 0 ? `${peakDayObj.label} (${peakDayVal})` : '—';
    document.getElementById('peakDayLabel').textContent  = isAvail ? 'Busiest Day: ' : 'Peak Day: ';
  }

  // ── Table body ──────────────────────────────────────────────────────────
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  DATES.forEach(({ day, label, key, isWeekend }) => {
    const tr = document.createElement('tr');
    const rowClasses = [];
    if (isWeekend) rowClasses.push('weekend');
    if (emptyDates.has(key)) rowClasses.push('no-data-row');
    if (rowClasses.length) tr.className = rowClasses.join(' ');
    const tdDay  = document.createElement('td'); tdDay.className  = 'day-cell';  tdDay.textContent  = day;
    const tdDate = document.createElement('td'); tdDate.className = 'date-cell'; tdDate.textContent = label;
    tr.appendChild(tdDay);
    tr.appendChild(tdDate);

    if (isRatio) {
      const dO = openedData[key]   || {};
      const dR = resolvedData[key] || {};
      const dA = availForCalc[key] || {};
      for (let h = 1; h <= 24; h++) {
        const op = dO[String(h)] || 0;
        const rv = dR[String(h)] || 0;
        const av = dA[h] || 0;
        const td = document.createElement('td');
        if (av === 0) {
          td.className = 'heat empty';
        } else {
          const OR = op / av, RR = rv / av;
          td.className = 'heat ' + (OR > RR ? 'ratio-red' : 'ratio-good');
          td.textContent = `${OR.toFixed(1)} | ${RR.toFixed(1)}`;
        }

function parseServiceNowRows(rows) {
  if (!rows.length) throw new Error('Empty spreadsheet');
  const cols = Object.keys(rows[0]);
  const findCol = (...terms) => cols.find(c => terms.some(t => c.toLowerCase().includes(t.toLowerCase())));
  const openedCol = findCol('opened at','opened_at','open date','open_at','sys_created','opened','created');
  // Prioritise datetime columns; explicitly exclude person/note columns (resolved by, resolver, notes)
  const resolvedCol = findCol('resolved at','resolved_at','resolve date','closed at','closed_at','resolve_at','resolution date')
    || cols.find(c => {
         const lc = c.toLowerCase();
         return (lc.includes('resolved') || lc.includes('closed') || lc.includes('resolve'))
           && !lc.includes('by') && !lc.includes('note') && !lc.includes('comment') && !lc.includes('code') && !lc.includes('reason');
       });
  const groupCol = findCol('assignment group','assignment_group','group','team','queue');
  if (!openedCol) throw new Error('Cannot find Opened column');
  console.log('[upload] cols:', cols.join(' | '));
  console.log('[upload] openedCol:', openedCol, '| resolvedCol:', resolvedCol, '| groupCol:', groupCol);

  const GROUP_MAP = {
    'netrio - help desk [agionow]':                   'Netrio - Help Desk [AgioNow]',
    'netrio - help desk technical support [agionow]': 'Netrio - Help Desk Technical Support [AgioNow]',
    'netrio - end user engineering [agionow]':        'Netrio - End User Engineering [AgioNow]',
    'netrio - endpoint experience [agionow]':         'Netrio - Endpoint Experience [AgioNow]',
  };

  function parseDT(val) {
    // Times in the file are already ET — parse as-is, no offset conversion
    if (val == null || val === '') return null;
    let dateKey = '', hour = -1;
    if (val instanceof Date) {
      // SheetJS with cellDates:true stores the raw cell time as UTC values
      dateKey = `${val.getUTCFullYear()}-${String(val.getUTCMonth()+1).padStart(2,'0')}-${String(val.getUTCDate()).padStart(2,'0')}`;
      hour = val.getUTCHours();
    } else if (typeof val === 'number') {
      const d = new Date(Math.round((val - 25569) * 86400000));
      dateKey = d.toISOString().slice(0,10);
      hour = d.getUTCHours();
    } else {
      const s = String(val);
      let m = s.match(/^(\d{4})-(\d{2})-(\d{2})[T ]\s*(\d{1,2}):/);
      if (m) { dateKey=`${m[1]}-${m[2]}-${m[3]}`; hour=parseInt(m[4]); }
      else {
        m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{1,2}):/);
        if (m) { dateKey=`${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`; hour=parseInt(m[4]); }
      }
    }
    if (!dateKey || hour < 0) return null;
    return { dateKey, hourKey: String(hour + 1) }; // 1-based key
  }

  function inc(obj, grp, date, hour) {
    if (!obj[grp]) obj[grp] = {};
    if (!obj[grp][date]) obj[grp][date] = {};
    obj[grp][date][hour] = (obj[grp][date][hour]||0) + 1;
  }

  let cntO = 0, cntR = 0;
  const newOpened = {}, newResolved = {};

  for (const row of rows) {
    const rawGroup = String(row[groupCol]||'').trim();
    const grp = GROUP_MAP[rawGroup.toLowerCase()] || rawGroup;

    const op = parseDT(row[openedCol]);
    if (op) { inc(newOpened,'All',op.dateKey,op.hourKey); inc(newOpened,grp,op.dateKey,op.hourKey); cntO++; }

    if (resolvedCol) {
      const rv = parseDT(row[resolvedCol]);
      if (rv) { inc(newResolved,'All',rv.dateKey,rv.hourKey); inc(newResolved,grp,rv.dateKey,rv.hourKey); cntR++; }
    }
  }

  // Merge into DATA — replace affected dates per group
  for (const [g, dates] of Object.entries(newOpened)) {
    if (!DATA.opened[g]) DATA.opened[g] = {};
    Object.assign(DATA.opened[g], dates);
  }
  for (const [g, dates] of Object.entries(newResolved)) {
    if (!DATA.resolved[g]) DATA.resolved[g] = {};
    Object.assign(DATA.resolved[g], dates);
  }

  // Persist delta so it survives refresh
  try {
    const stored = JSON.parse(localStorage.getItem('hm_excel') || '{"opened":{},"resolved":{}}');
    for (const [g, dates] of Object.entries(newOpened)) {
      if (!stored.opened[g]) stored.opened[g] = {};
      Object.assign(stored.opened[g], dates);
    }
    for (const [g, dates] of Object.entries(newResolved)) {
      if (!stored.resolved[g]) stored.resolved[g] = {};
      Object.assign(stored.resolved[g], dates);
    }
    localStorage.setItem('hm_excel', JSON.stringify(stored));
  } catch(e) { console.warn('localStorage save failed:', e); }

  return {opened:cntO, resolved:cntR};
}

function shiftToHours(text) {
  text = text.trim();
  if (/^(PTO|Sick|Off|OT|O\/T|Overtime|Training|Comp|Holiday|Moving|Day off|DELETED|\d+\s*Hrs?|Mon|Tue|Wed|Thu|Fri|Sat|Sun|June|July|Aug|Week:|NYC|Help|End User|Centiva|Endpoint|Technical|On.?[Ss]ite|Regional|Open shift)/i.test(text)) return null;
  for (const [pat, hrs] of SHIFT_TO_HOURS) {
    if (pat.test(text)) return hrs;
  }
  // Generic HH AM/PM - HH AM/PM
  const m = text.match(/(\d{1,2})(?::(\d{2}))?\s*(AM|PM)\s*[-–]\s*(\d{1,2})(?::(\d{2}))?\s*(AM|PM)/i);
  if (m) {
    let sh = parseInt(m[1]), eh = parseInt(m[4]);
    if (m[3].toUpperCase()==='PM' && sh!==12) sh+=12;
    if (m[3].toUpperCase()==='AM' && sh===12) sh=0;
    if (m[6].toUpperCase()==='PM' && eh!==12) eh+=12;
    if (m[6].toUpperCase()==='AM' && eh===12) eh=0;
    const hrs=[]; let h=sh, safety=0;
    while (h!==eh && safety++<25) { hrs.push((h%24)+1); h=(h+1)%24; }
    return hrs.length ? hrs : null;
  }
  return null;
}

function availInc(target, grp, dateKey, hourKey) {
  const hk = String(hourKey);
  if (!target['All']) target['All']={};
  if (!target['All'][dateKey]) target['All'][dateKey]={};
  target['All'][dateKey][hk] = (target['All'][dateKey][hk]||0)+1;
  if (!target[grp]) target[grp]={};
  if (!target[grp][dateKey]) target[grp][dateKey]={};
  target[grp][dateKey][hk] = (target[grp][dateKey][hk]||0)+1;
}

function addShift(person, dateKey, hours, target) {
  if (DELETED_STAFF.has(person)) return;
  const grp = PERSON_GROUP[person]; if (!grp) return;
  const [y,mo,d] = dateKey.split('-').map(Number);
  for (const hk of hours) {
    if (typeof hk === 'string' && hk.startsWith('n')) {
      const nextH = parseInt(hk.slice(1));
      const nd = new Date(y, mo-1, d+1);
      const ndk = nd.toISOString().slice(0,10);
      availInc(target, grp, ndk, nextH);
    } else {
      availInc(target, grp, dateKey, hk);
    }
  }
}

async function parseRosterPDF(arrayBuffer) {
  if (typeof pdfjsLib === 'undefined') throw new Error('PDF.js library not loaded');
  const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
  let pagesParsed = 0;
  const tempAvail = {}; // collect here; merge at end per-date

  for (let pn = 1; pn <= Math.min(pdf.numPages, 2); pn++) {
    const page = await pdf.getPage(pn);
    const tc = await page.getTextContent();

    // Collect items with coordinates
    const items = tc.items
      .filter(it => it.str && it.str.trim().length)
      .map(it => ({str: it.str.trim(), x: Math.round(it.transform[4]), y: Math.round(it.transform[5])}))
      .sort((a,b) => b.y - a.y || a.x - b.x);

    if (!items.length) continue;

    // Group into rows (±6px y-tolerance)
    const rows = [];
    for (const item of items) {
      const row = rows.find(r => Math.abs(r.y - item.y) <= 6);
      if (row) row.items.push(item);
      else rows.push({y: item.y, items:[item]});
    }
    rows.forEach(r => r.items.sort((a,b) => a.x - b.x));

    // Find header row with day names
    const DAY_RE = /^(Mon|Tue|Wed|Thu|Fri|Sat|Sun)$/i;
    let headerRow = null, weekDates = [], year = 2026, month = 6;

    for (const row of rows) {
      const texts = row.items.map(i => i.str);
      if (texts.filter(t => DAY_RE.test(t)).length >= 3) { headerRow = row; break; }
    }
    // Find year/month from any row
    for (const row of rows) {
      const full = row.items.map(i=>i.str).join(' ');
      const mMatch = full.match(/(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\w*\s+(\d{4})/i);
      if (mMatch) {
        year = parseInt(mMatch[2]);
        const mn = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
        month = mn[mMatch[1].toLowerCase().slice(0,3)];
        break;
      }
    }
    if (!headerRow) continue;

    // Extract week day numbers (integers 1-31 near header)
    const colItems = headerRow.items.filter(i => DAY_RE.test(i.str));
    // Look for numbers in rows within 30px above header
    const nearHeader = rows.filter(r => r.y > headerRow.y - 30 && r.y <= headerRow.y + 5);
    const numItems = nearHeader.flatMap(r => r.items).filter(i => /^\d{1,2}$/.test(i.str) && parseInt(i.str)>=1 && parseInt(i.str)<=31);

    // Map each day column to its date number by closest x
    const dayDates = colItems.map(col => {
      const closest = numItems.sort((a,b) => Math.abs(a.x-col.x)-Math.abs(b.x-col.x))[0];
      return closest ? parseInt(closest.str) : null;
    }).filter(Boolean);

    if (dayDates.length >= 3) weekDates = dayDates;

    // Column x bounds
    const colBounds = colItems.map((ci, idx) => ({
      x0: idx===0 ? 0 : Math.floor((colItems[idx-1].x + ci.x)/2),
      x1: idx===colItems.length-1 ? 9999 : Math.floor((ci.x + colItems[idx+1].x)/2),
    }));
    function dayIdxOf(x) { return colBounds.findIndex(b => x>=b.x0 && x<b.x1); }

    function dateKeyFor(dayIdx) {
      if (dayIdx<0||dayIdx>=weekDates.length) return null;
      let d=weekDates[dayIdx], m=month, y=year;
      // handle month rollover (e.g. Jun29,Jun30,Jul1...)
      if (dayIdx>0 && weekDates[dayIdx-1] && d<weekDates[dayIdx-1]) { m++; if(m>12){m=1;y++;} }
      const dMax=[0,31,28,31,30,31,30,31,31,30,31,30,31];
      if (d<1||d>dMax[m]) return null;
      return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }

    // Walk rows below header, identify person rows then their shifts
    const belowHeader = rows.filter(r => r.y < headerRow.y - 8);
    const KNOWN_NAMES = Object.keys(PERSON_GROUP);
    let curPerson = null;

    for (const row of belowHeader) {
      const rowText = row.items.map(i=>i.str).join(' ');
      // Try to match a known name at the start of this row
      let matched = null;
      for (const name of KNOWN_NAMES) {
        const parts = name.split(' ');
        const startItems = row.items.slice(0, parts.length).map(i=>i.str).join(' ');
        if (startItems === name || rowText.startsWith(name)) { matched = name; break; }
      }
      if (matched) {
        curPerson = DELETED_STAFF.has(matched) ? null : matched;
      }
      if (!curPerson) continue;

      // Collect shift items from this row (skip items that look like a name)
      const skipCount = matched ? curPerson.split(' ').length : 0;
      const shiftItems = row.items.slice(skipCount);
      for (const item of shiftItems) {
        const hrs = shiftToHours(item.str);
        if (!hrs) continue;
        const di = dayIdxOf(item.x);
        const dk = dateKeyFor(di);
        if (dk) addShift(curPerson, dk, hrs, tempAvail);
      }
    }
    pagesParsed++;
  }

  // Only replace dates found in this PDF; leave all other AVAIL dates untouched
  const affectedDates = new Set(
    Object.values(tempAvail).flatMap(dates => Object.keys(dates))
  );
  for (const grp of Object.keys(AVAIL)) {
    for (const dk of affectedDates) {
      if (AVAIL[grp][dk]) delete AVAIL[grp][dk];
    }
  }
  for (const [grp, dates] of Object.entries(tempAvail)) {
    if (!AVAIL[grp]) AVAIL[grp] = {};
    for (const [dk, hours] of Object.entries(dates)) {
      AVAIL[grp][dk] = hours;
    }
  }

  // Persist PDF avail delta so it survives refresh
  try {
    const stored = JSON.parse(localStorage.getItem('hm_avail') || '{}');
    // Clear stored entries for affected dates, then merge new data
    for (const grp of Object.keys(stored)) {
      for (const dk of affectedDates) {
        if (stored[grp][dk]) delete stored[grp][dk];
      }
    }
    for (const [grp, dates] of Object.entries(tempAvail)) {
      if (!stored[grp]) stored[grp] = {};
      Object.assign(stored[grp], dates);
    }
    localStorage.setItem('hm_avail', JSON.stringify(stored));
  } catch(e) { console.warn('localStorage avail save failed:', e); }

  return pagesParsed;
}

function restoreUploads() {
  try {
    const excel = JSON.parse(localStorage.getItem('hm_excel') || 'null');
    if (excel) {
      for (const [g, dates] of Object.entries(excel.opened || {})) {
        if (!DATA.opened[g]) DATA.opened[g] = {};
        Object.assign(DATA.opened[g], dates);
      }
      for (const [g, dates] of Object.entries(excel.resolved || {})) {
        if (!DATA.resolved[g]) DATA.resolved[g] = {};
        Object.assign(DATA.resolved[g], dates);
      }
    }
  } catch(e) { console.warn('localStorage excel restore failed:', e); }

  try {
    const avail = JSON.parse(localStorage.getItem('hm_avail') || 'null');
    if (avail) {
      for (const [grp, dates] of Object.entries(avail)) {
        if (!AVAIL[grp]) AVAIL[grp] = {};
        Object.assign(AVAIL[grp], dates);
      }
    }
  } catch(e) { console.warn('localStorage avail restore failed:', e); }
}

// ── Dark mode ─────────────────────────────────────────────────────────────
let isDark = localStorage.getItem('hm_dark') === '1';
function applyDark() {
  document.body.classList.toggle('dark', isDark);
  document.getElementById('darkToggle').textContent = isDark ? '☀️ Light' : '🌙 Dark';
}
function toggleDark() {
  isDark = !isDark;
  localStorage.setItem('hm_dark', isDark ? '1' : '0');
  applyDark();
}
applyDark();

restoreUploads();
render();
</script>
</body>
