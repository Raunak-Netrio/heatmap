<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cases Heatmap – 2026 Year to Date</title>
<style>
/* Base */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #eef0f4; color: #1a1d23; min-height: 100vh; }

/* Header */
.page-header {
  background: #1e2d3d; padding: 0 20px; height: 52px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-logo {
  width: 32px; height: 32px; background: linear-gradient(135deg, #3498db 0%, #2ecc71 100%);
  border-radius: 7px; display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 900; color: #fff; flex-shrink: 0; letter-spacing: -1px;
}
.brand-name { font-size: 13px; font-weight: 700; color: #e0ecf8; letter-spacing: .2px; }
.brand-sub { font-size: 10.5px; color: #5a80a0; margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 8px; }
#darkToggle {
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12);
  color: #90b8d8; border-radius: 6px; padding: 0 12px; height: 28px;
  cursor: pointer; font-size: 12px; font-weight: 500; font-family: inherit;
  transition: all .15s; white-space: nowrap;
}
#darkToggle:hover { background: rgba(255,255,255,.16); color: #fff; }

/* Filter bar */
.filter-bar {
  background: #fff; border-bottom: 1px solid #dce1e9;
  padding: 8px 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
  position: sticky; top: 52px; z-index: 90;
}
.filter-row {
  display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; overflow-x: auto;
}
.filter-row > * { flex-shrink: 0; }
.filter-spacer { flex: 1 1 8px; min-width: 8px; }
.filter-label {
  font-size: 9.5px; font-weight: 700; color: #8a9ab0;
  text-transform: uppercase; letter-spacing: .6px; white-space: nowrap;
}
.filter-divider {
  width: 1px; height: 22px; background: #dce1e9; flex-shrink: 0;
}

/* Controls — consistent 30px height */
.btn-group { display: flex; border-radius: 6px; overflow: hidden; border: 1px solid #d0d5dd; }
.btn-group button {
  padding: 0 12px; height: 30px; border: none; background: #fff;
  cursor: pointer; font-size: 12px; color: #4a5568; font-family: inherit;
  transition: background .12s, color .12s; white-space: nowrap;
}
.btn-group button:not(:last-child) { border-right: 1px solid #d0d5dd; }
.btn-group button.active { background: #1e2d3d; color: #fff; font-weight: 600; }
.btn-group button:hover:not(.active) { background: #f4f6f8; }

select {
  height: 30px; padding: 0 8px;
  border: 1px solid #d0d5dd; border-radius: 6px;
  background: #fff; color: #2d3748; cursor: pointer;
  font-size: 12px; font-family: inherit;
}
select:hover { border-color: #1e2d3d; }

.compare-toggle {
  height: 30px; padding: 0 12px;
  border: 1px solid #d0d5dd; border-radius: 6px;
  background: #fff; color: #4a5568; cursor: pointer;
  font-size: 12px; font-family: inherit; transition: all .12s; white-space: nowrap;
}
.compare-toggle:hover { border-color: #1e2d3d; background: #f4f6f8; }
.compare-toggle.active { background: #e67e22; color: #fff; border-color: #ca6f1e; font-weight: 600; }

.upload-label {
  display: flex; align-items: center; gap: 5px; height: 30px; padding: 0 11px;
  border-radius: 6px; border: 1px dashed #b8c8d8; background: #f8fafc;
  cursor: pointer; font-size: 11.5px; font-family: inherit;
  color: #6b7a8d; transition: all .12s; white-space: nowrap; user-select: none;
}
.upload-label:hover { border-color: #1e2d3d; background: #f0f4f8; color: #1e2d3d; border-style: solid; }
.upload-label.success { border-style: solid; border-color: #27ae60; background: #f0fdf4; color: #1a7a40; }
.upload-label.error   { border-style: solid; border-color: #e74c3c; background: #fff5f5; color: #c0392b; }
.upload-label.loading { border-style: solid; border-color: #3498db; background: #eff8ff; color: #2471a3; animation: upPulse 1s ease-in-out infinite; }
@keyframes upPulse { 0%,100%{opacity:1} 50%{opacity:.55} }
.upload-label input[type=file] { display: none; }

/* Stats bar */
.stats-bar {
  display: flex; background: #fff;
  border-bottom: 1px solid #dce1e9;
  padding: 0 20px; overflow-x: auto;
}
.stat-item {
  padding: 7px 20px 7px 0; margin-right: 20px;
  border-right: 1px solid #e8ecf0;
  display: flex; flex-direction: column; gap: 2px; flex-shrink: 0;
}
.stat-item:last-child { border-right: none; }
.stat-label {
  font-size: 9px; font-weight: 700; color: #8a9ab0;
  text-transform: uppercase; letter-spacing: .6px;
}
.stat-value { font-size: 13px; font-weight: 700; color: #1e2d3d; white-space: nowrap; }

/* Content area */
.content-area { padding: 14px 20px 20px; }

/* Scroll */
.scroll-wrap {
  overflow: auto; max-height: calc(100vh - 196px);
  border-radius: 8px;
  box-shadow: 0 1px 6px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.06);
}

/* Table */
table {
  border-collapse: collapse; font-size: 11px;
  white-space: nowrap; background: #fff;
  width: 100%; table-layout: fixed;
}
th, td { border: 1px solid #e0e5ec; text-align: center; padding: 0; }
thead th { background: #1e2d3d; color: #8aaac8; font-weight: 600; padding: 5px 4px; }
thead th.group-header { font-size: 11.5px; letter-spacing: .4px; color: #c8d8e8; }

td.day-cell {
  background: #263545; color: #d8e8f4; font-weight: 600;
  padding: 4px 8px; text-align: left; min-width: 78px; font-size: 11px;
}
td.date-cell {
  background: #263545; color: #6a8aaa; min-width: 58px;
  padding: 4px 6px; font-size: 10.5px;
}
td.heat {
  width: 32px; min-width: 32px; height: 26px;
  font-size: 10px; font-weight: 600; cursor: default; transition: opacity .12s;
}
td.heat:hover { outline: 2px solid #1e2d3d; z-index: 1; position: relative; background: #1e2d3d !important; color: #fff !important; }
td.heat.empty { background: #f4f6f9; }
tr.weekend td.day-cell, tr.weekend td.date-cell { background: #3d1d52; color: #d0bce8; }
tr.summary-row td { background: #f4f6f8; font-weight: 700; font-size: 10px; color: #2d3748; }
tr.summary-row td.day-cell, tr.summary-row td.date-cell { background: #1e2d3d; color: #c8d8e8; }

/* Legend */
.legend {
  display: flex; align-items: center; gap: 6px;
  margin: 10px 0 0; font-size: 11px; color: #6b7a8d;
}
.legend-bar { display: flex; gap: 2px; }
.legend-swatch { width: 22px; height: 12px; border-radius: 2px; }

/* Tooltip */
#tooltip {
  position: fixed; background: #1a1d23; color: #e0e8f0;
  padding: 6px 10px; border-radius: 6px; font-size: 11px;
  pointer-events: none; display: none; z-index: 999;
  box-shadow: 0 2px 10px rgba(0,0,0,.35);
  max-width: 320px; white-space: normal;
  font-family: 'Segoe UI', system-ui, sans-serif;
}

/* Modal */
#modal {
  display: none; position: fixed; inset: 0;
  background: rgba(10,15,25,.65); z-index: 1000;
  align-items: center; justify-content: center;
  backdrop-filter: blur(3px);
}
#modalBox {
  background: #fff; border-radius: 10px; padding: 20px;
  max-width: 520px; width: 92%; max-height: 80vh; overflow-y: auto;
  box-shadow: 0 8px 40px rgba(0,0,0,.28);
}
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  font-weight: 700; margin-bottom: 14px; font-size: 13px;
  padding-bottom: 10px; border-bottom: 2px solid #1e2d3d; color: #1e2d3d;
}
.modal-header button { background: none; border: none; cursor: pointer; font-size: 18px; color: #8a9ab0; line-height: 1; }
.modal-header button:hover { color: #2d3748; }
.modal-group-header { font-weight: 700; color: #2563c0; margin: 14px 0 6px; font-size: 12px; letter-spacing: .3px; border-bottom: 1px solid #dce8f8; padding-bottom: 4px; }
.modal-analyst { padding: 4px 6px; font-size: 12px; color: #2d3748; border-bottom: 1px solid #f4f6f8; }
.modal-analyst:last-child { border-bottom: none; }
.modal-empty { color: #b0bec8; font-style: italic; font-size: 12px; padding: 4px 6px; }

td.heat.clickable { cursor: pointer; }
td.heat.clickable:hover { outline: 2px solid #e74c3c; }

/* Resolution ratio */
td.heat.ratio-red  { background: #e74c3c; color: #fff; font-weight: 700; }
td.heat.ratio-good { background: #eaf7ee; color: #1a7a40; }
table.ratio-mode td.heat { min-width: 62px; width: 62px; font-size: 9px; }

/* Freeze panes */
td.day-cell  { position: sticky; left: 0;     z-index: 2; }
td.date-cell { position: sticky; left: 90px;  z-index: 2; }
thead tr:first-child th { position: sticky; top: 0;     z-index: 3; }
#hourHeader th           { position: sticky; top: 29px; z-index: 3; }
thead tr:first-child th:first-child { left: 0; z-index: 5; }
#hourHeader th:nth-child(1) { left: 0;    z-index: 5; }
#hourHeader th:nth-child(2) { left: 90px; z-index: 5; }

/* Compare */
.delta-badge { font-size: 7.5px; font-weight: 700; display: block; line-height: 1.1; }
td.delta-pos .delta-badge { color: #1a7a40; }
td.delta-neg .delta-badge { color: #c0392b; }
td.delta-same .delta-badge { color: #b0bec5; }
body.compare-active td.heat { height: 34px; }

/* Peak cell */
td.heat.peak-cell { outline: 2px solid #f39c12 !important; position: relative; z-index: 1; }
td.heat.peak-cell::before {
  content: '★'; position: absolute; top: 0; right: 1px;
  font-size: 7px; color: #f39c12; line-height: 1; pointer-events: none;
}

/* No-data rows */
tr.no-data-row td.day-cell, tr.no-data-row td.date-cell { opacity: 0.35; }

/* Group breakdown */
tr.grp-breakdown-hdr td { background: #f4f6f8; color: #8a9ab0; font-size: 10px; font-style: italic; text-align: center; padding: 3px; border-top: 2px solid #dce1e9; }
tr.grp-filter-row { cursor: pointer; }
tr.grp-filter-row:hover td { background: #f0f4f8 !important; }
td.grp-filter-name { background: #263545 !important; color: #d8e8f4 !important; font-weight: 700; font-size: 10px; text-align: left; padding: 3px 8px; }
tr.grp-filter-row:hover td.grp-filter-name { background: #324558 !important; }
td.grp-filter-bar { background: #f8fafc; color: #2d3748; font-size: 10px; font-weight: 600; text-align: left; padding: 3px 8px; }

/* Multi-select */
.multi-select { position: relative; }
.ms-trigger {
  display: flex; align-items: center; justify-content: space-between; gap: 6px;
  height: 30px; padding: 0 10px; min-width: 160px;
  border: 1px solid #d0d5dd; border-radius: 6px;
  background: #fff; color: #2d3748; cursor: pointer;
  font-size: 12px; font-family: inherit; user-select: none; white-space: nowrap;
}
.ms-trigger:hover { border-color: #1e2d3d; }
.ms-arrow { font-size: 9px; color: #8a9ab0; transition: transform .15s; }
.multi-select.open .ms-arrow { transform: rotate(180deg); }
.ms-dropdown {
  display: none; position: fixed;
  min-width: 210px; background: #fff; border: 1px solid #d0d5dd; border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,.12); z-index: 9000; padding: 4px 0;
}
.multi-select.open .ms-dropdown { display: block; }
.ms-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px; cursor: pointer; font-size: 12px; color: #2d3748; transition: background .1s;
}
.ms-item:hover { background: #f4f6f8; }
.ms-item input[type=checkbox] { cursor: pointer; accent-color: #1e2d3d; width: 13px; height: 13px; flex-shrink: 0; }
.ms-item.all-item { border-bottom: 1px solid #e4e8ed; font-weight: 600; margin-bottom: 2px; }

/* ── DARK MODE ── */
body.dark { background: #080c12; color: #c8d8e8; }
body.dark .page-header { background: #060a12; box-shadow: 0 2px 10px rgba(0,0,0,.6); }
body.dark .brand-name { color: #c8e0f4; }
body.dark .brand-sub { color: #2a4060; }
body.dark #darkToggle { background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.08); color: #5a8ab0; }
body.dark #darkToggle:hover { background: rgba(255,255,255,.12); color: #c8d8e8; }
body.dark .filter-bar { background: #0e111a; border-bottom-color: #141a26; box-shadow: none; }
body.dark .filter-divider { background: #141a26; }
body.dark .filter-label { color: #2a3a54; }
body.dark .btn-group { border-color: #1e283a; }
body.dark .btn-group button { background: #0e111a; color: #6a8aaa; border-right-color: #1e283a; }
body.dark .btn-group button.active { background: #1a4090; color: #c8e0ff; font-weight: 700; }
body.dark .btn-group button:hover:not(.active) { background: #141a26; color: #c8d8e8; }
body.dark select { background: #0e111a; color: #6a8aaa; border-color: #1e283a; }
body.dark .compare-toggle { background: #0e111a; color: #6a8aaa; border-color: #1e283a; }
body.dark .compare-toggle:hover { background: #141a26; border-color: #3a5a8a; color: #c8d8e8; }
body.dark .compare-toggle.active { background: #ca6f1e; border-color: #b35a10; color: #fff; }
body.dark .upload-label { background: #0e111a; border-color: #1e283a; color: #2a3a54; }
body.dark .upload-label:hover { background: #141a26; border-color: #3a5a8a; color: #6a8aaa; }
body.dark .upload-label.success { background: #061410; border-color: #1a7a40; color: #22c55e; }
body.dark .upload-label.error { background: #140606; border-color: #8a1a1a; color: #f87171; }
body.dark .stats-bar { background: #0e111a; border-bottom-color: #141a26; }
body.dark .stat-item { border-right-color: #141a26; }
body.dark .stat-label { color: #1e2e46; }
body.dark .stat-value { color: #6a9ac8; }
body.dark table { background: #0a0d14; }
body.dark th, body.dark td { border-color: #141a26; }
body.dark thead th { background: #06090f; color: #2a4060; }
body.dark thead th.group-header { color: #3a5a80; }
body.dark td.day-cell { background: #080d16; color: #4a7aaa; font-weight: 700; }
body.dark td.date-cell { background: #080d16; color: #2a4060; }
body.dark td.heat.empty { background: #0a0d14; }
body.dark tr.weekend td.day-cell, body.dark tr.weekend td.date-cell { background: #0e0614; color: #6a4a9a; }
body.dark tr.summary-row td { background: #0e111a; color: #3a5a7a; font-weight: 700; }
body.dark tr.summary-row td.day-cell, body.dark tr.summary-row td.date-cell { background: #06090f; color: #4a7aaa; }
body.dark tr.no-data-row td.day-cell, body.dark tr.no-data-row td.date-cell { opacity: 0.15; }
body.dark .legend { color: #1e2e46; }
body.dark #modal { background: rgba(0,0,0,.85); }
body.dark #modalBox { background: #0a0d14; color: #8aaac8; border: 1px solid #141a26; }
body.dark .modal-header { color: #3a70c0; border-bottom-color: #0e2040; }
body.dark .modal-header button { color: #1e3050; }
body.dark .modal-header button:hover { color: #6a9ac8; }
body.dark .modal-group-header { color: #3a70c0; border-bottom-color: #0e2040; }
body.dark .modal-analyst { color: #3a5a7a; border-bottom-color: #0a0d14; }
body.dark .modal-empty { color: #141a26; }
body.dark tr.grp-breakdown-hdr td { background: #080a10; color: #141a26; border-top-color: #141a26; }
body.dark tr.grp-filter-row:hover td { background: #0e1220 !important; }
body.dark td.grp-filter-name { background: #06090f !important; color: #3a6090 !important; }
body.dark tr.grp-filter-row:hover td.grp-filter-name { background: #0a0e1a !important; }
body.dark td.grp-filter-bar { background: #0a0d14; color: #2a3a54; }
body.dark td.heat:hover { outline-color: #2a60c0; background: #1a3060 !important; color: #e0e8f0 !important; }
body.dark .ms-trigger { background: #0e111a; border-color: #1e283a; color: #6a8aaa; }
body.dark .ms-trigger:hover { border-color: #3a5a8a; }
body.dark .ms-dropdown { background: #0e111a; border-color: #1e283a; box-shadow: 0 4px 16px rgba(0,0,0,.6); }
body.dark .ms-item { color: #6a8aaa; }
body.dark .ms-item:hover { background: #141a26; }
body.dark .ms-item.all-item { border-bottom-color: #141a26; }
body.dark td.delta-pos .delta-badge { color: #22c55e; }
body.dark td.delta-neg .delta-badge { color: #f87171; }
body.dark td.delta-same .delta-badge { color: #141a26; }
body.dark td.heat.ratio-good { background: #061410; color: #22c55e; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

<div id="modal" onclick="if(event.target===this)closeModal()">
  <div id="modalBox">
    <div id="modalBody"></div>
  </div>
</div>

<div class="page-header">
  <div class="brand">
    <div class="brand-logo">N</div>
    <div>
      <div class="brand-name">Netrio Operations</div>
      <div class="brand-sub">Cases Heatmap — 2026 Year to Date</div>
    </div>
  </div>
  <div class="header-right">
    <button id="darkToggle" onclick="toggleDark()">🌙 Dark</button>
  </div>
</div>

<div class="filter-bar">
  <div class="filter-row">
    <span class="filter-label">View</span>
    <div class="btn-group">
      <button id="btnOpened" class="active" onclick="setType('opened')">Opened</button>
      <button id="btnResolved" onclick="setType('resolved')">Resolved</button>
      <button id="btnAvail" onclick="setType('avail')">Availability</button>
      <button id="btnRatio" onclick="setType('ratio')">Ratio</button>
    </div>
    <div class="filter-divider"></div>
    <span class="filter-label">Month</span>
    <select id="monthSelect" onchange="setMonth(this.value)" style="width:110px">
      <option value="all">Entire Year</option>
      <option value="1">January</option>
      <option value="2">February</option>
      <option value="3">March</option>
      <option value="4">April</option>
      <option value="5">May</option>
      <option value="6" selected>June</option>
    </select>
    <div class="filter-divider"></div>
    <span class="filter-label">Group</span>
    <div class="multi-select" id="groupMulti">
      <div class="ms-trigger" onclick="toggleMS()">
        <span id="msLabel">All Groups</span>
        <span class="ms-arrow">▾</span>
      </div>
      <div class="ms-dropdown" id="msDropdown">
        <label class="ms-item all-item">
          <input type="checkbox" id="cbAll" checked onchange="onCbAllChange(this)">
          <span>All Groups</span>
        </label>
        <label class="ms-item">
          <input type="checkbox" class="cb-grp" value="Netrio - Help Desk [AgioNow]" onchange="onCbGrpChange()">
          <span>Help Desk</span>
        </label>
        <label class="ms-item">
          <input type="checkbox" class="cb-grp" value="Netrio - Help Desk Technical Support [AgioNow]" onchange="onCbGrpChange()">
          <span>Help Desk Technical Support</span>
        </label>
        <label class="ms-item">
          <input type="checkbox" class="cb-grp" value="Netrio - End User Engineering [AgioNow]" onchange="onCbGrpChange()">
          <span>End User Engineering</span>
        </label>
        <label class="ms-item">
          <input type="checkbox" class="cb-grp" value="Netrio - Endpoint Experience [AgioNow]" onchange="onCbGrpChange()">
          <span>Endpoint Experience</span>
        </label>
      </div>
    </div>
    <div class="filter-divider"></div>
    <span class="filter-label">Timezone</span>
    <select id="tzSelect" onchange="setTimezone(this.value)" style="width:130px">
      <option value="0">ET (UTC−4)</option>
      <option value="1">GMT (UTC+0)</option>
      <option value="2">IST (UTC+5:30)</option>
      <option value="3">CT (UTC−5)</option>
      <option value="4">MT (UTC−6)</option>
      <option value="5">PT (UTC−7)</option>
    </select>
    <div class="filter-divider"></div>
    <button id="compareBtn" class="compare-toggle" onclick="toggleCompare()">⚡ Compare</button>
    <div class="filter-spacer"></div>
    <label class="upload-label" id="upXlsxLabel">
      <span>📊</span><span id="upXlsxText">Upload Data</span>
      <input type="file" id="upXlsx" accept=".xlsx,.xls,.csv">
    </label>
    <label class="upload-label" id="upPdfLabel">
      <span>📋</span><span id="upPdfText">Upload Roster</span>
      <input type="file" id="upPdf" accept=".pdf" multiple>
    </label>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-item">
    <span class="stat-label" id="totalLabel">Total Cases</span>
    <span class="stat-value" id="totalCount">—</span>
  </div>
  <div class="stat-item">
    <span class="stat-label" id="peakHourLabel">Peak Hour</span>
    <span class="stat-value" id="peakHour">—</span>
  </div>
  <div class="stat-item">

const DAY_NAMES = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
function buildDates(month) {
  const MONTH_DAYS = [0,31,28,31,30,31,30];
  const SHORT_MONTHS = ['','Jan','Feb','Mar','Apr','May','Jun'];
  const months = month === 'all' ? [1,2,3,4,5,6] : [parseInt(month)];
  const result = [];
  for (const m of months) {
    for (let d = 1; d <= MONTH_DAYS[m]; d++) {
      const date = new Date(2026, m-1, d);
      const dow = (date.getDay() + 6) % 7;
      result.push({
        day: DAY_NAMES[dow],
        label: `${d}-${SHORT_MONTHS[m]}`,
        key: `2026-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`,
        isWeekend: dow >= 5
      });
    }
  }
  return result;
}

const PALETTE_BLUE  = ['#eaf3fb','#aed4f0','#5ba3d9','#2171b5','#084594'];
const PALETTE_GREEN = ['#eaf7ee','#a8ddb5','#41ab5d','#238b45','#00441b'];
let PALETTE = PALETTE_BLUE;

function getColor(count, max) {
  if (!count || !max) return null;
  const idx = Math.min(Math.floor((count / max) * PALETTE.length), PALETTE.length - 1);
  return PALETTE[idx];
}
function getTextColor(count, max) {
  return (count / max) > 0.45 ? '#fff' : '#1a1a1a';
}

function isAllGroups() {

}

function mergeGroupData(src) {
  if (isAllGroups()) return src['All'] || {};
  const merged = {};
  for (const grp of selectedGroups) {
    for (const [dk, hours] of Object.entries(src[grp] || {})) {
      if (!merged[dk]) merged[dk] = {};
      for (const [hk, v] of Object.entries(hours)) {
        merged[dk][hk] = (merged[dk][hk] || 0) + v;
      }
    }
  }
  return merged;
}

function setGroup(g) {
  if (g === 'All') {
    selectedGroups = ['All'];
    document.getElementById('cbAll').checked = true;
    document.querySelectorAll('.cb-grp').forEach(c => { c.checked = false; });
  } else {
    selectedGroups = [g];
    document.getElementById('cbAll').checked = false;
    document.querySelectorAll('.cb-grp').forEach(c => { c.checked = c.value === g; });
  }
  updateMsLabel();
  render();
}

// ── Timezone & Compare ────────────────────────────────────────────────────
const TIMEZONES = [
  { label: 'ET (UTC−4)',   abbr: 'ET',  offsetMins: 0    },
  { label: 'GMT (UTC+0)',  abbr: 'GMT', offsetMins: 240  },
  { label: 'IST (UTC+5:30)', abbr: 'IST', offsetMins: 570 },
  { label: 'CT (UTC−5)',   abbr: 'CT',  offsetMins: -60  },
  { label: 'MT (UTC−6)',   abbr: 'MT',  offsetMins: -120 },
  { label: 'PT (UTC−7)',   abbr: 'PT',  offsetMins: -180 },
];
let currentTZIdx = 0;
let compareMode  = false;

function tzHourLabel(h) {
  const totalMins = (h - 1) * 60 + TIMEZONES[currentTZIdx].offsetMins;
  const norm = ((totalMins % 1440) + 1440) % 1440;
  const dispH = Math.floor(norm / 60);
  const dispM = norm % 60;
  return dispM === 0 ? String(dispH) : `${dispH}:${String(dispM).padStart(2,'0')}`;
}

function tzDisp(h) {
  const lbl = tzHourLabel(h);
  return `${lbl.includes(':') ? lbl : lbl + ':00'} ${TIMEZONES[currentTZIdx].abbr}`;
}

function toPriorDateKey(dk) {
  const [y, m, d] = dk.split('-').map(Number);
  if (currentMonth === 'all') return `${y - 1}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const pm = m === 1 ? 12 : m - 1;
  const py = m === 1 ? y - 1 : y;
  return `${py}-${String(pm).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function setTimezone(val) {
  currentTZIdx = parseInt(val);
  rebuildHourHeader();
  document.getElementById('hourTzLabel').textContent = `Hour (${TIMEZONES[currentTZIdx].abbr})`;
  render();
}

function toggleCompare() {

  document.getElementById('compareBtn').classList.toggle('active', compareMode);
  document.body.classList.toggle('compare-active', compareMode);
  render();
}

// ── Render ────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function render() {
  const isAvail = currentType === 'avail';
  const isRatio = currentType === 'ratio';

  document.getElementById('heatTable').classList.toggle('ratio-mode', isRatio);

  // Data sources
  const groupData    = (!isRatio && !isAvail) ? mergeGroupData(DATA[currentType]) : null;
  const availForCalc = (isRatio || isAvail)   ? mergeGroupData(AVAIL)            : null;
  const openedData   = isRatio ? mergeGroupData(DATA['opened'])                   : null;
  const resolvedData = isRatio ? mergeGroupData(DATA['resolved'])                 : null;

  // ── First pass: stats ───────────────────────────────────────────────────
  let globalMax = 1;
  const hourTotals = {}, dayTotals = {};
  let peakDayKey = null, peakDayVal = 0;
  let peakHourKey = null, peakHourVal = 0;
  let grandTotal = 0;
  const emptyDates = new Set();
  let peakCellKey = null, peakCellH = 0, peakCellVal = 0;

  // Ratio accumulators
  const hrOp = {}, hrRv = {}, hrAv = {};
  const dyOp = {}, dyAv = {};
  let totOp = 0, totRv = 0, totAv = 0;

  DATES.forEach(({ key }) => {
    if (isRatio) {
      const dO = openedData[key]   || {};
      const dR = resolvedData[key] || {};
      const dA = availForCalc[key] || {};
      let op = 0, av = 0;
      for (let h = 1; h <= 24; h++) {
        const o = dO[String(h)] || 0;
        const r = dR[String(h)] || 0;
        const a = dA[h] || 0;
        hrOp[h] = (hrOp[h] || 0) + o;
        hrRv[h] = (hrRv[h] || 0) + r;
        hrAv[h] = (hrAv[h] || 0) + a;
        op += o; av += a;
        totOp += o; totRv += r; totAv += a;
      }
      dyOp[key] = op; dyAv[key] = av;
    } else {
      const d = isAvail ? (availForCalc[key] || {}) : (groupData[key] || {});
      let daySum = 0;
      for (let h = 1; h <= 24; h++) {
        const v = d[String(h)] || 0;
        if (v > globalMax) globalMax = v;
        if (v > peakCellVal) { peakCellVal = v; peakCellKey = key; peakCellH = h; }
        hourTotals[h] = (hourTotals[h] || 0) + v;
        if (hourTotals[h] > peakHourVal) { peakHourVal = hourTotals[h]; peakHourKey = String(h); }
        daySum += v;
      }
      dayTotals[key] = daySum;
      grandTotal += daySum;
      if (daySum > peakDayVal) { peakDayVal = daySum; peakDayKey = key; }
      if (daySum === 0) emptyDates.add(key);
    }
  });

  document.getElementById('legendMax').textContent = isRatio ? '' : `max: ${globalMax}`;

  // ── Stats badges ────────────────────────────────────────────────────────
  if (isRatio) {
    const oOR = totAv > 0 ? (totOp / totAv).toFixed(2) : '—';
    const oRR = totAv > 0 ? (totRv / totAv).toFixed(2) : '—';
    document.getElementById('totalLabel').textContent = 'Overall OR | RR';
    document.getElementById('totalCount').textContent = totAv > 0 ? `${oOR} | ${oRR}` : '—';

    let bestH = null, bestHOR = 0;
    for (let h = 1; h <= 24; h++) {
      const a = hrAv[h] || 0;
      if (a > 0) { const or = hrOp[h] / a; if (or > bestHOR) { bestHOR = or; bestH = h; } }
    }
    document.getElementById('peakHourLabel').textContent = 'Peak Load Hour';
    document.getElementById('peakHour').textContent = bestH ? `Hour ${bestH - 1} (OR ${bestHOR.toFixed(2)})` : '—';

    let bestDK = null, bestDOR = 0;
    DATES.forEach(({ key }) => {
      const a = dyAv[key] || 0;
      if (a > 0) { const or = dyOp[key] / a; if (or > bestDOR) { bestDOR = or; bestDK = key; } }
    });
    const bestDObj = bestDK ? DATES.find(d => d.key === bestDK) : null;
    document.getElementById('peakDayLabel').textContent = 'Highest OR Day';
    document.getElementById('peakDay').textContent = bestDObj ? `${bestDObj.label} (${bestDOR.toFixed(2)})` : '—';
  } else {
    const peakDayObj = peakDayKey ? DATES.find(d => d.key === peakDayKey) : null;
    document.getElementById('totalCount').textContent = grandTotal.toLocaleString();
    document.getElementById('totalLabel').textContent  = isAvail ? 'Staff-Hours' : 'Total Cases';
    document.getElementById('peakHour').textContent   = peakHourKey && peakHourVal > 0 ? `Hour ${parseInt(peakHourKey) - 1} (${peakHourVal})` : '—';
    document.getElementById('peakHourLabel').textContent = isAvail ? 'Busiest Hour' : 'Peak Hour';
    document.getElementById('peakDay').textContent    = peakDayObj && peakDayVal > 0 ? `${peakDayObj.label} (${peakDayVal})` : '—';
    document.getElementById('peakDayLabel').textContent  = isAvail ? 'Busiest Day' : 'Peak Day';
  }

  // ── Table body ──────────────────────────────────────────────────────────
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  DATES.forEach(({ day, label, key, isWeekend }) => {
    const tr = document.createElement('tr');
    const rowClasses = [];
    if (isWeekend) rowClasses.push('weekend');
    if (emptyDates.has(key)) rowClasses.push('no-data-row');
    if (rowClasses.length) tr.className = rowClasses.join(' ');
    const tdDay  = document.createElement('td'); tdDay.className  = 'day-cell';  tdDay.textContent  = day;
    const tdDate = document.createElement('td'); tdDate.className = 'date-cell'; tdDate.textContent = label;
    tr.appendChild(tdDay);
    tr.appendChild(tdDate);

    if (isRatio) {
      const dO = openedData[key]   || {};
      const dR = resolvedData[key] || {};
      const dA = availForCalc[key] || {};
      for (let h = 1; h <= 24; h++) {
        const op = dO[String(h)] || 0;
        const rv = dR[String(h)] || 0;
        const av = dA[h] || 0;
        const td = document.createElement('td');
        if (av === 0) {
          td.className = 'heat empty';
        } else {
          const OR = op / av, RR = rv / av;
          td.className = 'heat ' + (OR > RR ? 'ratio-red' : 'ratio-good');
          td.textContent = `${OR.toFixed(1)} | ${RR.toFixed(1)}`;
        }
        td.addEventListener('mouseenter', e => {
          tooltip.style.display = 'block';
          const a = dA[h] || 0;
          if (a === 0) {
            tooltip.textContent = `${label} · ${day} · ${tzDisp(h)}: No availability data`;
          } else {
            const OR2 = (dO[String(h)] || 0) / a, RR2 = (dR[String(h)] || 0) / a;
            tooltip.textContent = `${label} · ${day} · ${tzDisp(h)} — OR: ${OR2.toFixed(2)}, RR: ${RR2.toFixed(2)} (${a} staff on shift)`;
          }
        });
        td.addEventListener('mousemove', e => {
          tooltip.style.left = (e.clientX + 12) + 'px';
          tooltip.style.top  = (e.clientY + 12) + 'px';
        });
        td.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
        tr.appendChild(td);
      }
    } else {
      const d = isAvail ? (availForCalc[key] || {}) : (groupData[key] || {});
      for (let h = 1; h <= 24; h++) {
        const count = d[String(h)] || 0;
        const td = document.createElement('td');
        const isPeak = count > 0 && key === peakCellKey && h === peakCellH;
        const priorCount = (compareMode && !isAvail) ? ((groupData[toPriorDateKey(key)] || {})[String(h)] || 0) : 0;
        const delta = count - priorCount;
        let deltaClass = '';
        if (compareMode && !isAvail) deltaClass = delta > 0 ? ' delta-pos' : delta < 0 ? ' delta-neg' : ' delta-same';
        td.className = 'heat' + (count === 0 ? ' empty' : '') + (isPeak ? ' peak-cell' : '') + deltaClass;
        if (count > 0) {
          td.style.background = getColor(count, globalMax);
          td.style.color = getTextColor(count, globalMax);
          td.textContent = count;
          td.classList.add('clickable');
          td.addEventListener('click', () => showDetailModal(key, h, label, day));
        }
        if (compareMode && !isAvail) {
          const badge = document.createElement('span');
          badge.className = 'delta-badge';
          badge.textContent = delta > 0 ? `▲${delta}` : delta < 0 ? `▼${Math.abs(delta)}` : '=';
          td.appendChild(badge);
        }
        td.addEventListener('mouseenter', e => {
          tooltip.style.display = 'block';
          const base = isAvail
            ? `${label} · ${day} · ${tzDisp(h)}: ${count} staff on shift`
            : `${label} · ${day} · ${tzDisp(h)}: ${count} case${count !== 1 ? 's' : ''}`;
          tooltip.textContent = (compareMode && !isAvail)
            ? `${base} (prior: ${priorCount}, Δ${delta >= 0 ? '+' : ''}${delta})`
            : base;
        });
        td.addEventListener('mousemove', e => {
          tooltip.style.left = (e.clientX + 12) + 'px';
          tooltip.style.top  = (e.clientY + 12) + 'px';
        });
        td.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
        tr.appendChild(td);
      }
    }
    tbody.appendChild(tr);
  });

  // ── Summary row ─────────────────────────────────────────────────────────
  const trTot = document.createElement('tr');
  trTot.className = 'summary-row';
  const tdTotLabel = document.createElement('td'); tdTotLabel.className = 'day-cell';  tdTotLabel.textContent = 'Total';
  const tdTotDate  = document.createElement('td'); tdTotDate.className  = 'date-cell'; tdTotDate.textContent  = '—';
  trTot.appendChild(tdTotLabel);
  trTot.appendChild(tdTotDate);

  if (isRatio) {
    for (let h = 1; h <= 24; h++) {
      const av = hrAv[h] || 0;
      const td = document.createElement('td');
      if (av === 0) {
        td.className = 'heat empty';
      } else {
        const OR = hrOp[h] / av, RR = hrRv[h] / av;
        td.className = 'heat ' + (OR > RR ? 'ratio-red' : 'ratio-good');
        td.textContent = `${OR.toFixed(1)} | ${RR.toFixed(1)}`;
      }
      td.addEventListener('mouseenter', () => {
        tooltip.style.display = 'block';
        const a = hrAv[h] || 0;
        tooltip.textContent = a === 0
          ? `${tzDisp(h)}: No availability data`
          : `${tzDisp(h)} avg — OR: ${(hrOp[h]/a).toFixed(2)}, RR: ${(hrRv[h]/a).toFixed(2)}`;
      });
      td.addEventListener('mousemove', e => {
        tooltip.style.left = (e.clientX + 12) + 'px';
        tooltip.style.top  = (e.clientY + 12) + 'px';
      });
      td.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
      trTot.appendChild(td);
    }
  } else {
    const totMax = Math.max(...Object.values(hourTotals), 1);
    for (let h = 1; h <= 24; h++) {
      const v = hourTotals[h] || 0;
      const td = document.createElement('td');
      td.className = 'heat' + (v === 0 ? ' empty' : '');
      if (v > 0) {
        td.style.background = getColor(v, totMax);
        td.style.color = getTextColor(v, totMax);
        td.textContent = v;
      }
      td.addEventListener('mouseenter', () => {
        tooltip.style.display = 'block';
        tooltip.textContent = isAvail
          ? `${tzDisp(h)} total: ${v} staff-hours`
          : `${tzDisp(h)} total: ${v} cases`;
      });
      td.addEventListener('mousemove', e => {
        tooltip.style.left = (e.clientX + 12) + 'px';
        tooltip.style.top  = (e.clientY + 12) + 'px';
      });
      td.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
      trTot.appendChild(td);
    }
  }
  tbody.appendChild(trTot);

  // ── Group breakdown (All view only) ────────────────────────────────────
  if (isAllGroups() && !isRatio) {
    const trHdr = document.createElement('tr');
    trHdr.className = 'grp-breakdown-hdr';
    const tdHdr = document.createElement('td');
    tdHdr.colSpan = 26;
    tdHdr.textContent = 'Click a group row to zoom in ↓';
    trHdr.appendChild(tdHdr);
    tbody.appendChild(trHdr);

    const shortName = g => g.replace('Netrio - ', '').replace(' [AgioNow]', '');

    for (const grp of GROUPS) {
      const gSrc = isAvail ? (AVAIL[grp] || {}) : (DATA[currentType][grp] || {});
      const hourCounts = {};
      let gTotal = 0;
      DATES.forEach(({ key }) => {
        const d = gSrc[key] || {};
        for (let h = 1; h <= 24; h++) {
          const v = isAvail ? (d[h] || 0) : (d[String(h)] || 0);
          hourCounts[h] = (hourCounts[h] || 0) + v;
          gTotal += v;
        }
      });

      const trG = document.createElement('tr');
      trG.className = 'grp-filter-row';
      trG.title = `Click to filter to ${grp}`;

      const tdName = document.createElement('td');
      tdName.className = 'grp-filter-name';
      tdName.colSpan = 2;
      tdName.textContent = shortName(grp);
      trG.appendChild(tdName);

      const gMax = Math.max(...Object.values(hourCounts), 1);
      for (let h = 1; h <= 24; h++) {
        const v = hourCounts[h] || 0;
        const td = document.createElement('td');
        td.className = 'heat grp-filter-bar' + (v === 0 ? ' empty' : '');
        if (v > 0) {
          td.style.background = getColor(v, gMax);
          td.style.color = getTextColor(v, gMax);
          td.textContent = v;
        }
        trG.appendChild(td);
      }

      trG.addEventListener('click', () => setGroup(grp));

      tbody.appendChild(trG);
    }
  }
}

const GROUPS = [
  'Netrio - Help Desk [AgioNow]',
  'Netrio - Help Desk Technical Support [AgioNow]',
  'Netrio - End User Engineering [AgioNow]',
  'Netrio - Endpoint Experience [AgioNow]'
];

function showDetailModal(date, hour, label, day) {
  const isAvail = currentType === 'avail';
  const groups = isAllGroups() ? GROUPS : selectedGroups;
  const modeLabel = isAvail ? 'Staff on Shift' : 'Cases Resolved';

  let html = `<div class="modal-header"><span>${label} &middot; ${day} &middot; ${tzDisp(hour)} &mdash; ${modeLabel}</span><button onclick="closeModal()">&#x2715;</button></div>`;

  for (const grp of groups) {
    if (groups.length > 1) {
      html += `<div class="modal-group-header">${grp}</div>`;
    }
    if (isAvail) {
      const names = ((STAFF_DETAIL[grp] || {})[date] || {})[hour] || [];
      if (names.length > 0) {
        html += names.map(n => `<div class="modal-analyst">${n}</div>`).join('');
      } else {
        html += `<div class="modal-empty">No staff on shift</div>`;
      }
    } else {
      const analystMap = ((RESOLVED_BY[grp] || {})[date] || {})[hour] || {};
      const entries = Object.entries(analystMap).sort((a, b) => b[1] - a[1]);
      if (entries.length > 0) {
        html += entries.map(([name, count]) => `<div class="modal-analyst">${name}: <strong>${count}</strong></div>`).join('');
      } else {
        html += `<div class="modal-empty">No resolutions recorded</div>`;
      }
    }
  }

  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Upload helpers ────────────────────────────────────────────────────────
function setUploadState(which, state, text) {
  const id = which === 'xlsx' ? 'Xlsx' : 'Pdf';
  document.getElementById('up' + id + 'Label').className = 'upload-label ' + state;
  document.getElementById('up' + id + 'Text').textContent = text;
}

// ── Excel upload (ServiceNow data) ────────────────────────────────────────
document.getElementById('upXlsx').addEventListener('change', function(e) {
  const file = e.target.files[0]; if (!file) return;
  setUploadState('xlsx', 'loading', 'Parsing…');
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(ev.target.result, {type:'array', cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      const r = parseServiceNowRows(rows);
      setUploadState('xlsx', 'success', `✓ ${r.opened} opened · ${r.resolved} resolved`);
      render();
    } catch(err) {
      setUploadState('xlsx', 'error', '✗ ' + err.message.slice(0,50));
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
});

function parseServiceNowRows(rows) {
  if (!rows.length) throw new Error('Empty spreadsheet');
  const cols = Object.keys(rows[0]);
  const findCol = (...terms) => cols.find(c => terms.some(t => c.toLowerCase().includes(t.toLowerCase())));
  const openedCol = findCol('opened at','opened_at','open date','open_at','sys_created','opened','created');
  // Prioritise datetime columns; explicitly exclude person/note columns (resolved by, resolver, notes)
  const resolvedCol = findCol('resolved at','resolved_at','resolve date','closed at','closed_at','resolve_at','resolution date')
    || cols.find(c => {
         const lc = c.toLowerCase();
         return (lc.includes('resolved') || lc.includes('closed') || lc.includes('resolve'))
           && !lc.includes('by') && !lc.includes('note') && !lc.includes('comment') && !lc.includes('code') && !lc.includes('reason');
       });
  const groupCol = findCol('assignment group','assignment_group','group','team','queue');
  if (!openedCol) throw new Error('Cannot find Opened column');
  console.log('[upload] cols:', cols.join(' | '));
  console.log('[upload] openedCol:', openedCol, '| resolvedCol:', resolvedCol, '| groupCol:', groupCol);

  const GROUP_MAP = {
    'netrio - help desk [agionow]':                   'Netrio - Help Desk [AgioNow]',
    'netrio - help desk technical support [agionow]': 'Netrio - Help Desk Technical Support [AgioNow]',
    'netrio - end user engineering [agionow]':        'Netrio - End User Engineering [AgioNow]',
    'netrio - endpoint experience [agionow]':         'Netrio - Endpoint Experience [AgioNow]',
  };

  function parseDT(val) {
    // Times in the file are already ET — parse as-is, no offset conversion
    if (val == null || val === '') return null;
    let dateKey = '', hour = -1;
    if (val instanceof Date) {
      // SheetJS with cellDates:true stores the raw cell time as UTC values
      dateKey = `${val.getUTCFullYear()}-${String(val.getUTCMonth()+1).padStart(2,'0')}-${String(val.getUTCDate()).padStart(2,'0')}`;
      hour = val.getUTCHours();
    } else if (typeof val === 'number') {
      const d = new Date(Math.round((val - 25569) * 86400000));
      dateKey = d.toISOString().slice(0,10);
      hour = d.getUTCHours();
    } else {
      const s = String(val);
      let m = s.match(/^(\d{4})-(\d{2})-(\d{2})[T ]\s*(\d{1,2}):/);
      if (m) { dateKey=`${m[1]}-${m[2]}-${m[3]}`; hour=parseInt(m[4]); }
      else {
        m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{1,2}):/);
        if (m) { dateKey=`${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`; hour=parseInt(m[4]); }
      }
    }
    if (!dateKey || hour < 0) return null;
    return { dateKey, hourKey: String(hour + 1) }; // 1-based key
  }

  function inc(obj, grp, date, hour) {
    if (!obj[grp]) obj[grp] = {};
    if (!obj[grp][date]) obj[grp][date] = {};
    obj[grp][date][hour] = (obj[grp][date][hour]||0) + 1;
  }

  let cntO = 0, cntR = 0;
  const newOpened = {}, newResolved = {};

  for (const row of rows) {
    const rawGroup = String(row[groupCol]||'').trim();
    const grp = GROUP_MAP[rawGroup.toLowerCase()] || rawGroup;

    const op = parseDT(row[openedCol]);
    if (op) { inc(newOpened,'All',op.dateKey,op.hourKey); inc(newOpened,grp,op.dateKey,op.hourKey); cntO++; }

    if (resolvedCol) {
      const rv = parseDT(row[resolvedCol]);
      if (rv) { inc(newResolved,'All',rv.dateKey,rv.hourKey); inc(newResolved,grp,rv.dateKey,rv.hourKey); cntR++; }
    }
  }

  // Merge into DATA — replace affected dates per group
  for (const [g, dates] of Object.entries(newOpened)) {
    if (!DATA.opened[g]) DATA.opened[g] = {};
    Object.assign(DATA.opened[g], dates);
  }
  for (const [g, dates] of Object.entries(newResolved)) {
    if (!DATA.resolved[g]) DATA.resolved[g] = {};
    Object.assign(DATA.resolved[g], dates);
  }

  // Persist delta so it survives refresh
  try {
    const stored = JSON.parse(localStorage.getItem('hm_excel') || '{"opened":{},"resolved":{}}');
    for (const [g, dates] of Object.entries(newOpened)) {
      if (!stored.opened[g]) stored.opened[g] = {};
      Object.assign(stored.opened[g], dates);
    }
    for (const [g, dates] of Object.entries(newResolved)) {
      if (!stored.resolved[g]) stored.resolved[g] = {};
      Object.assign(stored.resolved[g], dates);
    }
    localStorage.setItem('hm_excel', JSON.stringify(stored));
  } catch(e) { console.warn('localStorage save failed:', e); }

  return {opened:cntO, resolved:cntR};
}

function shiftToHours(text) {
  text = text.trim();
  if (/^(PTO|Sick|Off|OT|O\/T|Overtime|Training|Comp|Holiday|Moving|Day off|DELETED|\d+\.?\d*\s*Hrs?|Mon|Tue|Wed|Thu|Fri|Sat|Sun|June|July|Aug|Week:|NYC|Help|End User|Centiva|Endpoint|Technical|On.?[Ss]ite|Regional|Open shift)/i.test(text)) return null;
  for (const [pat, hrs] of SHIFT_TO_HOURS) {
    if (pat.test(text)) return hrs;
  }
  // Generic HH AM/PM - HH AM/PM
  const m = text.match(/(\d{1,2})(?::(\d{2}))?\s*(AM|PM)\s*[-–]\s*(\d{1,2})(?::(\d{2}))?\s*(AM|PM)/i);
  if (m) {
    let sh = parseInt(m[1]), eh = parseInt(m[4]);
    if (m[3].toUpperCase()==='PM' && sh!==12 && sh<12) sh+=12;
    if (m[3].toUpperCase()==='AM' && sh===12) sh=0;
    if (m[6].toUpperCase()==='PM' && eh!==12 && eh<13) eh+=12;
    if (m[6].toUpperCase()==='AM' && eh===12) eh=0;
    const hrs=[]; let h=sh, safety=0;
    while (h!==eh && safety++<25) { hrs.push((h%24)+1); h=(h+1)%24; }
    return hrs.length ? hrs : null;
  }
  return null;
}

function availInc(target, grp, dateKey, hourKey) {
  const hk = String(hourKey);
  if (!target['All']) target['All']={};
  if (!target['All'][dateKey]) target['All'][dateKey]={};
  target['All'][dateKey][hk] = (target['All'][dateKey][hk]||0)+1;
  if (!target[grp]) target[grp]={};
  if (!target[grp][dateKey]) target[grp][dateKey]={};
  target[grp][dateKey][hk] = (target[grp][dateKey][hk]||0)+1;
}

function addShift(person, dateKey, hours, target) {
  if (DELETED_STAFF.has(person)) return;
  const grp = PERSON_GROUP[person]; if (!grp) return;
  const [y,mo,d] = dateKey.split('-').map(Number);
  for (const hk of hours) {
    if (typeof hk === 'string' && hk.startsWith('n')) {
      const nextH = parseInt(hk.slice(1));
      const nd = new Date(y, mo-1, d+1);
      const ndk = nd.toISOString().slice(0,10);
      availInc(target, grp, ndk, nextH);
    } else {
      availInc(target, grp, dateKey, hk);
    }
  }
}

async function parseRosterPDF(arrayBuffer) {
  if (typeof pdfjsLib === 'undefined') throw new Error('PDF.js library not loaded');
  const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
  console.log(`[PDF] ${pdf.numPages} page(s)`);
  let pagesParsed = 0, totalSlots = 0;
  const tempAvail = {};

  for (let pn = 1; pn <= pdf.numPages; pn++) {
    const page = await pdf.getPage(pn);
    const tc = await page.getTextContent();

    const items = tc.items
      .filter(it => it.str && it.str.trim().length)
      .map(it => ({str: it.str.trim(), x: Math.round(it.transform[4]), y: Math.round(it.transform[5])}))
      .sort((a,b) => b.y - a.y || a.x - b.x);

    if (!items.length) continue;

    // Log first page items for debugging
    if (pn === 1) console.log(`[PDF p1] items:`, items.slice(0,40).map(i=>`"${i.str}"@(${i.x},${i.y})`).join(' '));

    // Group items into rows (±8px y-tolerance)
    const rows = [];
    for (const item of items) {
      const row = rows.find(r => Math.abs(r.y - item.y) <= 8);
      if (row) row.items.push(item);
      else rows.push({y: item.y, items:[item]});
    }
    rows.forEach(r => r.items.sort((a,b) => a.x - b.x));

    // Find row containing >= 3 day-name words (handles "21 Mon" combined items)
    let headerRow = null, weekDates = [], year = 2026, month = 6;
    for (const row of rows) {
      const combined = row.items.map(i=>i.str).join(' ');
      if ((combined.match(/\b(Mon|Tue|Wed|Thu|Fri|Sat|Sun)\b/gi)||[]).length >= 3) { headerRow = row; break; }
    }

    // Find year/month from any row on this page
    for (const row of rows) {
      const full = row.items.map(i=>i.str).join(' ');
      const mm = full.match(/(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\w*\s+(\d{4})/i);
      if (mm) {
        year = parseInt(mm[2]);
        month = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12}[mm[1].toLowerCase().slice(0,3)];
        break;
      }
    }

    if (!headerRow) { console.log(`[PDF p${pn}] no day-header → skip`); continue; }

    // Parse header items left-to-right to extract day columns and their calendar dates.
    // Format: "DD [HH] DayName DD [HH] DayName ..."  (DD=date 1-31, HH=headcount)
    // Items may be split ("27","21","Mon") or combined ("21 Mon" or "27 21 Mon").
    const DAY_WORD = /\b(Mon|Tue|Wed|Thu|Fri|Sat|Sun)\b/i;
    const colItems = []; // {x, str (day abbrev), dateNum}
    let pendingNums = [];
    for (const item of headerRow.items) {
      const dm = item.str.match(DAY_WORD);
      if (dm) {
        const inline = [...item.str.matchAll(/\b(\d{1,2})\b/g)].map(m=>+m[1]).filter(n=>n>=1&&n<=31);
        const all = [...pendingNums, ...inline];
        colItems.push({x: item.x, str: dm[1], dateNum: all.length ? all[0] : null});
        pendingNums = [];
      } else {
        pendingNums.push(...[...item.str.matchAll(/\b(\d{1,2})\b/g)].map(m=>+m[1]).filter(n=>n>=1&&n<=31));
      }
    }
    weekDates = colItems.map(c=>c.dateNum).filter(n=>n!=null);

    // Fallback: dates may be in a separate row just above the header (different y-band).
    // In Teams Shifts PDFs, dates (y=740) and day names (y=731) are ~9px apart — just outside
    // the 8px row-grouping tolerance — so they land in separate rows. Use x-proximity to match.
    if (weekDates.length < 3) {
      const nearNums = rows
        .filter(r => r !== headerRow && Math.abs(r.y - headerRow.y) <= 25)
        .flatMap(r => r.items)
        .filter(i => /^\d{1,2}$/.test(i.str) && +i.str >= 1 && +i.str <= 31);
      colItems.forEach(col => {
        if (col.dateNum != null) return;
        const byX = nearNums.slice().sort((a,b) => Math.abs(a.x-col.x) - Math.abs(b.x-col.x));
        if (byX.length) col.dateNum = +byX[0].str;
      });
      weekDates = colItems.map(c=>c.dateNum).filter(n=>n!=null);
    }

    console.log(`[PDF p${pn}] ${month}/${year} cols=[${colItems.map(c=>c.str)}] dates=[${weekDates}]`);
    if (weekDates.length < 3) { console.log(`[PDF p${pn}] too few dates → skip`); continue; }

    // Column x-bounds for mapping shift items to dates
    const colBounds = colItems.map((ci, idx) => ({
      x0: idx===0 ? 0 : Math.floor((colItems[idx-1].x + ci.x)/2),
      x1: idx===colItems.length-1 ? 9999 : Math.floor((ci.x + colItems[idx+1].x)/2),
    }));
    function dayIdxOf(x) { return colBounds.findIndex(b => x>=b.x0 && x<b.x1); }

    // Precompute date keys — count ALL previous rollovers so Sat/Sun after a month-boundary
    // week (e.g. Apr30→May1) get the correct month, not just the base month.
    const dateKeys = weekDates.map((d, dayIdx) => {
      let m = month, y = year;
      for (let i = 1; i <= dayIdx; i++) {
        if (weekDates[i] < weekDates[i-1]) { m++; if (m>12){m=1;y++;} }
      }
      const leap = y%4===0&&(y%100!==0||y%400===0);
      const dMax=[0,31,leap?29:28,31,30,31,30,31,31,30,31,30,31];
      return (d>=1&&d<=dMax[m]) ? `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}` : null;
    });
    function dateKeyFor(dayIdx) { return (dayIdx>=0&&dayIdx<dateKeys.length) ? dateKeys[dayIdx] : null; }

    // Walk rows below header: identify person name rows then their shift rows
    const belowHeader = rows.filter(r => r.y < headerRow.y - 8);
    const KNOWN_NAMES = Object.keys(PERSON_GROUP);
    let curPerson = null;
    let pageShifts = 0;

    for (const row of belowHeader) {
      const rowText = row.items.map(i=>i.str).join(' ');

      // "(DELETED)" on the hours row → mark person as deleted
      if (/\(DELETED\)/i.test(rowText)) { curPerson = null; continue; }

      // Exact name match, then fuzzy first+last word fallback
      let matched = null;
      for (const name of KNOWN_NAMES) {
        const parts = name.split(' ');
        const startItems = row.items.slice(0, parts.length).map(i=>i.str).join(' ');
        if (startItems === name || rowText === name || rowText.startsWith(name + ' ')) { matched = name; break; }
      }
      if (!matched) {
        const rowWords = row.items.map(i=>i.str);
        for (const name of KNOWN_NAMES) {
          const parts = name.split(' ');
          if (parts.length < 2) continue;
          if (rowWords[0] === parts[0] && rowWords.some(w => w === parts[parts.length-1])) { matched = name; break; }
        }
      }

      if (matched) {
        curPerson = DELETED_STAFF.has(matched) ? null : matched;
        if (curPerson) console.log(`[PDF p${pn}] person: ${curPerson} → ${PERSON_GROUP[curPerson]}`);
      } else if (row.items.length >= 2 && /^[A-Z]/.test(row.items[0].str) && row.items.some(i => /^[A-Z][a-z]/.test(i.str))) {
        const candidate = row.items.slice(0, 3).map(i => i.str).join(' ');
        if (!/^\d|^(Mon|Tue|Wed|Thu|Fri|Sat|Sun|Week|Help|End|Endpoint|Technical|Netrio)/i.test(candidate)) {
          console.log(`[PDF p${pn}] UNRECOGNIZED NAME candidate: "${candidate}" — add to PERSON_GROUP if real`);
        }
      }
      if (!curPerson) continue;

      const skipCount = matched ? curPerson.split(' ').length : 0;
      for (const item of row.items.slice(skipCount)) {
        const hrs = shiftToHours(item.str);
        if (!hrs) continue;
        const di = dayIdxOf(item.x);
        const dk = dateKeyFor(di);
        if (dk) { addShift(curPerson, dk, hrs, tempAvail); pageShifts++; }
        else console.log(`[PDF p${pn}] shift "${item.str}" x=${item.x} → col=${di} → no date`);
      }
    }
    console.log(`[PDF p${pn}] ${pageShifts} shift-slots`);
    if (pageShifts > 0) pagesParsed++;
    totalSlots += pageShifts;
  }

  // Merge tempAvail into AVAIL (only replace affected dates)
  const affectedDates = new Set(Object.values(tempAvail).flatMap(d => Object.keys(d)));
  for (const grp of Object.keys(AVAIL)) {
    for (const dk of affectedDates) { if (AVAIL[grp][dk]) delete AVAIL[grp][dk]; }
  }
  for (const [grp, dates] of Object.entries(tempAvail)) {
    if (!AVAIL[grp]) AVAIL[grp] = {};
    for (const [dk, hours] of Object.entries(dates)) AVAIL[grp][dk] = hours;
  }

  // Persist to localStorage
  try {
    const stored = JSON.parse(localStorage.getItem('hm_avail') || '{}');
    for (const grp of Object.keys(stored)) {
      for (const dk of affectedDates) { if (stored[grp][dk]) delete stored[grp][dk]; }
    }
    for (const [grp, dates] of Object.entries(tempAvail)) {
      if (!stored[grp]) stored[grp] = {};
      Object.assign(stored[grp], dates);
    }
    localStorage.setItem('hm_avail', JSON.stringify(stored));
  } catch(e) { console.warn('localStorage avail save failed:', e); }

  console.log(`[PDF] done: ${pagesParsed} pages parsed, ${totalSlots} staff-hour slots across ${affectedDates.size} dates`);
  return {pages: pagesParsed, slots: totalSlots};
}

function restoreUploads() {
  try {
    const excel = JSON.parse(localStorage.getItem('hm_excel') || 'null');
    if (excel) {
      for (const [g, dates] of Object.entries(excel.opened || {})) {
        if (!DATA.opened[g]) DATA.opened[g] = {};
        Object.assign(DATA.opened[g], dates);
      }
      for (const [g, dates] of Object.entries(excel.resolved || {})) {
        if (!DATA.resolved[g]) DATA.resolved[g] = {};
        Object.assign(DATA.resolved[g], dates);
      }
    }
  } catch(e) { console.warn('localStorage excel restore failed:', e); }

  try {
    const avail = JSON.parse(localStorage.getItem('hm_avail') || 'null');
    if (avail) {
      for (const [grp, dates] of Object.entries(avail)) {
        if (!AVAIL[grp]) AVAIL[grp] = {};
        Object.assign(AVAIL[grp], dates);
      }
    }
  } catch(e) { console.warn('localStorage avail restore failed:', e); }
}
